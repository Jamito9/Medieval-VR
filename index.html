<!DOCTYPE html><html>
<head>
<meta charset="utf-8">
<title>Medieval Scriptorium (Fixed)</title><script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script><script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script><script src="https://unpkg.com/super-hands@4.0.2/dist/super-hands.min.js"></script><script>

// STEP 1: SAFE ROTATION (MOUSE + VR CLAMP)
AFRAME.registerComponent('drag-rotate', {
  init: function () {
    this.dragging = false;
    this.prev = {x:0,y:0};

    this.el.addEventListener('mousedown', (e)=>{
      if (this.el.sceneEl.is('vr-mode')) return;
      this.dragging = true;
      this.prev.x = e.clientX;
      this.prev.y = e.clientY;
    });

    window.addEventListener('mouseup', ()=> this.dragging = false);

    window.addEventListener('mousemove', (e)=>{
      if (!this.dragging || this.el.sceneEl.is('vr-mode')) return;

      const dx = (e.clientX - this.prev.x)*0.2;
      const dy = (e.clientY - this.prev.y)*0.2;

      const r = this.el.getAttribute('rotation');
      this.el.setAttribute('rotation', {
        x: r.x + dy,
        y: r.y + dx,
        z: 0
      });

      this.prev.x = e.clientX;
      this.prev.y = e.clientY;
    });
  }
});

AFRAME.registerComponent('clamp-rotation', {
  tick: function () {
    const r = this.el.getAttribute('rotation');
    const max = 30;
    this.el.setAttribute('rotation', {
      x: Math.max(-max, Math.min(max, r.x)),
      y: Math.max(-max, Math.min(max, r.y)),
      z: 0
    });
  }
});

const MANUSCRIPTS = [
{
  title: "Liber Chronicarum, 1493, Hartmann Schedel",
  img: "#manuscript1",
  lat: `De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta...`,
  eng: `Concerning Scotland\n\nScotland is of the island in which England is the upper part...`
},
{
  title: "Liber Pluscardensis, before 1500",
  img: "#manuscript2",
  lat: `Quorum cateruis sic gloriose circumuallatus...`,
  eng: `Surrounded so gloriously by his companies...`
}
];

AFRAME.registerComponent('page-controller', {
init: function () {
this.index = 0;
this.folio = document.querySelector('#folio-object');
this.transcr = document.querySelector('#transcr-text');
this.transl = document.querySelector('#transl-text');
this.info = document.querySelector('#info-text');

this.update();

document.querySelector('#swap-button').addEventListener('click', () => this.turn());

const corner = document.querySelector('#page-corner');
corner.addEventListener('grab-end', () => this.turn());
},

turn: function () {
this.folio.setAttribute('animation__turn', {
property: 'rotation', to: '0 -160 0', dur: 400
});

setTimeout(() => {
this.index = (this.index + 1) % MANUSCRIPTS.length;
this.update();
this.folio.setAttribute('rotation', '0 0 0');
}, 200);
},

update: function () {
const m = MANUSCRIPTS[this.index];
this.folio.setAttribute('src', m.img);
this.transcr.setAttribute('value', m.lat);
this.transl.setAttribute('value', m.eng);
this.info.setAttribute('value', m.title);
}
});

AFRAME.registerComponent('zoom-controller', {
init: function () {
const anchor = document.querySelector('#zoom-anchor');
const ui = document.querySelector('#ui-group');
let z = false;

document.querySelector('#zoom-button').addEventListener('click', () => {
z = !z;
anchor.setAttribute('animation', { property: 'position', to: z ? '0 1.5 -0.7' : '0 1.1 -1.4', dur: 800 });
ui.setAttribute('animation', { property: 'position', to: z ? '0.6 0.3 0' : '0.9 1.1 -1.2', dur: 800 });
});
}
});

AFRAME.registerComponent('audio-controller', {
init: function () {
const sound = document.querySelector('#ambient-sound');
const btn = document.querySelector('#mute-button');
let muted = false;

btn.addEventListener('click', () => {
const s = sound.components.sound;
if (!s) return;
muted = !muted;
muted ? s.pauseSound() : s.playSound();
});

window.addEventListener('click', () => {
const s = sound.components.sound;
if (s) s.playSound();
}, { once: true });
}
});

</script></head><body>
<a-scene page-controller zoom-controller audio-controller><a-assets>
<img id="manuscript1" src="folio.jpg">
<img id="manuscript2" src="folio2.jpg">
<audio id="music" src="chant.mp3"></audio>
</a-assets><a-entity environment="preset: starry"></a-entity> <a-entity light="type: ambient; intensity: 0.6"></a-entity>

<a-entity id="ambient-sound" sound="src: #music; loop: true; volume: 0.5"></a-entity>

<a-entity id="zoom-anchor" position="0 1.1 -1.4"><a-plane id="folio-object" class="grabbable clickable" drag-rotate clamp-rotation width="1.1" height="0.8"></a-plane>

<a-plane id="page-corner" class="grabbable" position="0.5 -0.35 0.01" width="0.2" height="0.2" opacity="0"></a-plane>

<a-entity id="ui-group" position="0.9 1.1 -1.2">
<a-sphere id="zoom-button" class="clickable" radius="0.05" color="#FFD700"></a-sphere>
<a-sphere id="swap-button" class="clickable" position="0 -0.15 0" radius="0.05" color="#cd7f32"></a-sphere>
<a-box id="mute-button" class="clickable" position="0 -0.3 0" depth="0.06" height="0.06" width="0.06" color="#FF4500"></a-box>
</a-entity></a-entity><a-entity position="-1.0 1.1 -1.2">
<a-plane width="0.6" height="0.3" color="#111"></a-plane>
<a-text id="info-text" value="" width="0.55" align="center" position="0 0 0.02"></a-text>
</a-entity><a-entity position="-1.9 1.1 -0.5">
<a-plane width="0.9" height="1.8" color="#111"></a-plane>
<a-text id="transl-text" width="0.8" wrap-count="30" position="-0.4 0 0.02"></a-text>
</a-entity><a-entity position="-2.2 1.1 0.5">
<a-plane width="0.9" height="1.8" color="#111"></a-plane>
<a-text id="transcr-text" width="0.8" wrap-count="30" position="-0.4 0 0.02"></a-text>
</a-entity><a-entity hand-controls="left" super-hands></a-entity> <a-entity hand-controls="right" super-hands></a-entity>

<a-entity camera look-controls position="0 1.6 0">
<a-cursor raycaster="objects: .clickable" fuse="true"></a-cursor>
</a-entity></a-scene>
</body>
</html>
