<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium – Test Cockpit Build</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
   <script src="https://unpkg.com/aframe-environment-component@1.3.7/dist/aframe-environment-component.min.js"></script>
    <script>

      // ── model-error-handler ───────────────────────────────────────────────────
      // Graceful fallback for GLB load failures on Quest 2.
      // If a model fails to load (404, CORS block, memory limit, malformed file),
      // A-Frame fires 'model-error' on the entity.  Without a listener this is
      // silent — the model slot stays empty and anything depending on it may
      // hang or behave unexpectedly.
      // This component logs the failure to the console and hides the entity so
      // nothing downstream breaks.  The assets timeout (30 s) ensures the scene
      // starts regardless; this ensures the entity itself is cleaned up.
      AFRAME.registerComponent('model-error-handler', {
        init: function () {
          this.el.addEventListener('model-error', (evt) => {
            console.warn('[model-error-handler] Failed to load model on',
              this.el.id || this.el.tagName, '—', evt.detail && evt.detail.src);
            this.el.setAttribute('visible', false);
          });
        }
      });

      AFRAME.registerComponent('look-at-user', {
        init: function () {
          this.targetPos  = new THREE.Vector3();
          this.panelPos   = new THREE.Vector3();
          this._tickCount = 0;   // throttle counter — update every 4th frame
        },
        tick: function () {
          // Throttle: run every 4th frame (~18 Hz at 72 Hz).
          // Panels move slowly so the update cadence is imperceptible.
          // Skip entirely when the entity is invisible — saves 3 out of 4
          // calls even when visible, and 4 out of 4 when hidden.
          this._tickCount++;
          if (this._tickCount < 4) return;
          this._tickCount = 0;
          if (!this.el.object3D.visible) return;
          const sceneEl  = this.el.sceneEl;
          const cameraEl = sceneEl.camera ? sceneEl.camera.el : null;
          if (!cameraEl) return;
          cameraEl.object3D.getWorldPosition(this.targetPos);
          this.el.object3D.getWorldPosition(this.panelPos);
          this.el.object3D.lookAt(this.targetPos.x, this.panelPos.y, this.targetPos.z);
        }
      });

      // ── Shared haptic helper ──────────────────────────────────────────────────
      // Two-attempt strategy for reliable haptics with hand-controls on Quest 2.
      //
      // Attempt 1 — tracked-controls component chain:
      //   hand-controls dynamically injects oculus-touch-controls, which injects
      //   tracked-controls.  tracked-controls.controller is the XRInputSource;
      //   controller.gamepad is the Gamepad.  Wrapped in try/catch because the
      //   hapticActuators API can throw on some Meta browser versions.
      //   Both the older hapticActuators[0].pulse() and the newer
      //   vibrationActuator.playEffect() are tried in order.
      //
      // Attempt 2 — navigator.getGamepads() scan:
      //   If the component chain is not yet populated (can happen in the first
      //   few frames after entering VR), fall back to iterating the raw Gamepad
      //   array and matching by the 'Left'/'Right' substring in the gamepad id.
      //   getAttribute('hand-controls') returns the parsed schema object, so
      //   .hand is 'left' or 'right' directly.
      function pulseHaptic (ctrlEl, intensity, duration) {
        if (!ctrlEl) return;

        // Attempt 1: tracked-controls component path
        const tc = ctrlEl.components && ctrlEl.components['tracked-controls'];
        if (tc && tc.controller) {
          const gp = tc.controller.gamepad;
          if (gp) {
            if (gp.hapticActuators && gp.hapticActuators.length > 0) {
              try { gp.hapticActuators[0].pulse(intensity, duration); return; } catch (e) {}
            }
            if (gp.vibrationActuator) {
              try {
                gp.vibrationActuator.playEffect('dual-rumble', {
                  startDelay: 0, duration: duration,
                  weakMagnitude: intensity, strongMagnitude: intensity
                });
                return;
              } catch (e) {}
            }
          }
        }

        // Attempt 2: navigator.getGamepads() scan matched by hand label
        const handData = ctrlEl.getAttribute('hand-controls');
        if (!handData) return;
        const hand = handData.hand;
        if (!hand) return;
        const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
        for (let i = 0; i < gamepads.length; i++) {
          const gp = gamepads[i];
          if (!gp || !gp.connected) continue;
          const idLower = gp.id.toLowerCase();
          const matches = hand === 'left' ? idLower.includes('left') : idLower.includes('right');
          if (!matches) continue;
          if (gp.hapticActuators && gp.hapticActuators.length > 0) {
            try { gp.hapticActuators[0].pulse(intensity, duration); return; } catch (e) {}
          }
          if (gp.vibrationActuator) {
            try {
              gp.vibrationActuator.playEffect('dual-rumble', {
                startDelay: 0, duration: duration,
                weakMagnitude: intensity, strongMagnitude: intensity
              });
              return;
            } catch (e) {}
          }
        }
      }

      // ── Three-button combo gate ───────────────────────────────────────────────
      // Returns the analog squeeze value (0–1) ONLY when index trigger (buttons[0]),
      // side grip (buttons[1]), AND the face thumb button (A = right / X = left,
      // buttons[4]) are ALL simultaneously active at or above 0.5.
      //
      // Any single press in isolation — including an accidental trigger pull —
      // returns 0. This means:
      //   • Raycaster clicks on UI buttons and hotspots work normally (trigger alone).
      //   • Page-curl and grab-rotate ONLY activate on the deliberate three-finger
      //     full-hand gesture, exactly matching the physical sensation of gripping a page.
      //
      // Return value: Math.min(index, grip) so the analog magnitude still reflects
      // how hard the user is squeezing, used for release hysteresis thresholds.
      function comboVal(gp) {
        if (!gp) return 0;
        var index = gp.buttons[0] ? Math.max(0, Math.min(1, gp.buttons[0].value)) : 0;
        var grip  = gp.buttons[1] ? Math.max(0, Math.min(1, gp.buttons[1].value)) : 0;
        // Fix 4: require .pressed (not .touched) for the A/X thumb gate.
        // Quest 2 capacitive sensors register .touched from light incidental contact.
        // Using .pressed requires a deliberate button depression, preventing accidental
        // combo formation when the thumb merely rests near the button while gripping.
        var thumb = (gp.buttons[4] && gp.buttons[4].pressed) ? 1.0 : 0.0;
        return (index >= 0.5 && grip >= 0.5 && thumb > 0) ? Math.min(index, grip) : 0;
      }

      AFRAME.registerComponent('vr-locomotion', {
        init: function () {
          this.isVR      = false;
          this.leftCtrl  = null;
          this.rightCtrl = null;
          this._forward  = new THREE.Vector3();
          this._right    = new THREE.Vector3();
          // Fix 6: pre-allocated world-up vector — avoids new THREE.Vector3 per tick.
          this._up       = new THREE.Vector3(0, 1, 0);

          // ── AABB obstacle list ────────────────────────────────────────────────
          // Each entry is the world-space (X, Z) centre and half-extents (rx, rz)
          // of a rectangular no-go zone.  Y is ignored — the player is always on
          // the ground plane and furniture is never above head height.
          //
          // Lectern: centred at (0, −2.2), ~0.5 m wide, ~0.5 m deep.
          //   rx=0.35, rz=0.35 gives a comfortable buffer around the pedestal base.
          //   The 0.35 m player radius is added per-axis inside _resolveCollision,
          //   so the effective blocked zone is (0.35 + 0.35) = 0.70 m wide total.
          //
          // Table: centred at (1.2, −1.6), ~1.0 m wide, ~0.6 m deep.
          //   rx=0.55, rz=0.35 blocks the full tabletop footprint including legs.
          //   Using the full footprint (not per-leg) is standard for WebXR —
          //   the player cannot walk under the table either, but the table sits
          //   against the right wall so this is never a path the user would want.
          //
          // PLAYER_RADIUS: treated as a circular capsule footprint.  0.22 m is
          // a tight but natural personal-space radius for seated/standing VR.
          this._obstacles = [
            { cx:  0.0, cz: -2.2, rx: 0.28, rz: 0.28 },  // lectern
            { cx:  1.2, cz: -1.6, rx: 0.55, rz: 0.35 },  // table
          ];
          this._PLAYER_RADIUS = 0.22;

          const scene = this.el.sceneEl;
          scene.addEventListener('enter-vr', () => { this.isVR = true;  });
          scene.addEventListener('exit-vr',  () => { this.isVR = false; });
          scene.addEventListener('loaded', () => {
            this.leftCtrl  = document.querySelector('#left-hand');
            this.rightCtrl = document.querySelector('#right-hand');
          });
        },

        // ── _resolveCollision ─────────────────────────────────────────────────
        // Tests the rig position (px, pz) against every AABB obstacle.
        // If the player's circular footprint (radius PLAYER_RADIUS) overlaps an
        // obstacle box, the position is pushed out along the shortest separation
        // axis (minimum translation vector — MTV).
        //
        // Algorithm: expand the AABB by PLAYER_RADIUS on all sides (Minkowski sum
        // of the box with the player circle — approximated as a larger box).
        // If the player centre is inside the expanded box, compute overlap on each
        // axis and push out on the axis with the smaller overlap (MTV).
        //
        // This runs in O(n) where n = number of obstacles (currently 2).
        // All arithmetic is on plain numbers — zero object allocation.
        _resolveCollision: function (px, pz) {
          const r = this._PLAYER_RADIUS;
          for (var i = 0; i < this._obstacles.length; i++) {
            var obs = this._obstacles[i];
            var exRx = obs.rx + r;   // expanded half-extent X
            var exRz = obs.rz + r;   // expanded half-extent Z
            var dx   = px - obs.cx;
            var dz   = pz - obs.cz;
            var ox   = exRx - Math.abs(dx);  // overlap on X axis
            var oz   = exRz - Math.abs(dz);  // overlap on Z axis
            if (ox > 0 && oz > 0) {
              // Player is inside the expanded box — push out on the smaller axis.
              if (ox < oz) {
                px += (dx > 0 ? ox : -ox);
              } else {
                pz += (dz > 0 ? oz : -oz);
              }
            }
          }
          return { x: px, z: pz };
        },

        _getGamepad: function (ctrl) {
          if (!ctrl) return null;
          const tc = ctrl.components && ctrl.components['tracked-controls'];
          return (tc && tc.controller && tc.controller.gamepad) || null;
        },

        tick: function (t, dt) {
          if (!this.isVR) return;
          // Fix 7: guard dt — A-Frame can emit dt=0 on the first tick frame.
          const safeDt = dt || 16;
          const leftGP  = this._getGamepad(this.leftCtrl);
          const rightGP = this._getGamepad(this.rightCtrl);
          if (leftGP) {
            const stickX   = leftGP.axes[2] || 0;
            const stickY   = leftGP.axes[3] || 0;
            const deadzone = 0.2;
            if (Math.abs(stickX) > deadzone || Math.abs(stickY) > deadzone) {
              const camEl = this.el.sceneEl.camera ? this.el.sceneEl.camera.el : null;
              if (camEl) {
                camEl.object3D.getWorldDirection(this._forward);
                this._forward.y = 0;
                this._forward.negate();
                this._forward.normalize();
                this._right.crossVectors(this._forward, this._up).normalize();
                const speed = 0.004;
                const pos   = this.el.object3D;
                pos.position.addScaledVector(this._forward, -stickY * speed * safeDt);
                pos.position.addScaledVector(this._right,    stickX * speed * safeDt);

                // ── Collision resolution ──────────────────────────────────────
                // After applying movement, test the new position against all
                // obstacles and push back out if penetrating.
                // Only runs when the thumbstick is active — zero cost when still.
                const resolved = this._resolveCollision(
                  pos.position.x, pos.position.z
                );
                pos.position.x = resolved.x;
                pos.position.z = resolved.z;
              }
            }
          }
          if (rightGP) {
            const stickX  = rightGP.axes[2] || 0;
            const deadzone = 0.2;
            if (Math.abs(stickX) > deadzone) {
              const TURN_SPEED = 0.0015;
              this.el.object3D.rotation.y -= stickX * TURN_SPEED * safeDt;
            }
          }
        }
      });

      AFRAME.registerComponent('vr-grab-rotate', {
        // ── VR behaviour ─────────────────────────────────────────────────────────
        // In VR, grab-rotate is driven by the three-button combo (comboVal) plus
        // controller proximity to the folio centre — NOT by raycaster mousedown.
        // This means the raycaster being disabled during a combo does not break
        // grab-rotate; the two systems are fully decoupled.
        //
        // Mutual exclusion (Fix 2 & 3):
        //   • On every tick, if page-curl.isCurling is true the grab is immediately
        //     released — a curl at a corner always takes full ownership of the folio.
        //   • page-curl.tick() Phase 1 mirrors this: it bails out if grab-rotate is
        //     already grabbing, so the two components never race for the same controller.
        //
        // Desktop behaviour is unchanged: drag-rotate handles right-click drag;
        // this component is a no-op on desktop (isVR guard at top of tick).
        init: function () {
          this.grabbing              = false;
          this.isVR                  = false;
          this.activeController      = null;
          this.previousControllerPos = new THREE.Vector3();
          this.currentControllerPos  = new THREE.Vector3();
          this._leftCtrl             = null;
          this._rightCtrl            = null;
          // Scratch vectors — pre-allocated, never reallocated in tick().
          this._folioWorldPos        = new THREE.Vector3();
          this._ctrlWorldPos         = new THREE.Vector3();

          this.triggerHaptic = (intensity, duration) => {
            pulseHaptic(this.activeController, intensity, duration);
          };

          // Pre-allocated gamepad resolver — two-attempt strategy matching pulseHaptic.
          this._getGP = function (ctrl) {
            if (!ctrl) return null;
            var tc = ctrl.components && ctrl.components['tracked-controls'];
            if (tc && tc.controller && tc.controller.gamepad) return tc.controller.gamepad;
            if (!navigator.getGamepads) return null;
            var hd   = ctrl.getAttribute('hand-controls');
            var hand = hd && hd.hand;
            if (!hand) return null;
            var pads = navigator.getGamepads();
            for (var i = 0; i < pads.length; i++) {
              var gp = pads[i];
              if (!gp || !gp.connected) continue;
              var id = gp.id.toLowerCase();
              if (hand === 'left'  && id.indexOf('left')  !== -1) return gp;
              if (hand === 'right' && id.indexOf('right') !== -1) return gp;
            }
            return null;
          };

          this.el.sceneEl.addEventListener('enter-vr', () => { this.isVR = true;  });
          this.el.sceneEl.addEventListener('exit-vr',  () => {
            this.isVR     = false;
            this.grabbing = false;
            this.activeController = null;
          });

          // Resolve controller refs once the scene is fully loaded.
          this.el.sceneEl.addEventListener('loaded', () => {
            this._leftCtrl  = document.querySelector('#left-hand');
            this._rightCtrl = document.querySelector('#right-hand');
          });
          // In VR the raycaster is disabled during combo, so mousedown never fires.
          // Desktop mousedown is handled by the drag-rotate component (right-click).
          // Nothing to do here for either mode — tick() manages VR grab exclusively.
        },

        tick: function () {
          // ── Desktop: drag-rotate handles rotation; this component is VR-only ──
          if (!this.isVR) return;

          // ── Fix 2 & 3: Mutual exclusion — page-curl owns the folio when curling ─
          // If a page curl has started (at a corner) while we were mid-grab, release
          // immediately. The curl's own guard (Fix 4) prevents it starting while we
          // are grabbing, so this branch only fires for edge-case timing overlaps.
          const pc = this.el.components['page-curl'];
          if (pc && pc.isCurling) {
            if (this.grabbing) {
              this.grabbing         = false;
              this.activeController = null;
            }
            return;
          }

          // ── Not grabbing: try to start a grab via three-button combo ─────────────
          if (!this.grabbing) {
            // 30 cm reach from folio centre — broad enough for comfortable arm extension,
            // narrow enough that the user has to intentionally reach for the page.
            const REACH = 0.30;
            const tryGrab = (ctrl) => {
              if (!ctrl || this.grabbing) return;
              const gp = this._getGP(ctrl);
              if (!gp || comboVal(gp) < 0.50) return;
              // Proximity to the folio's world-space centre.
              this.el.object3D.getWorldPosition(this._folioWorldPos);
              ctrl.object3D.getWorldPosition(this._ctrlWorldPos);
              if (this._folioWorldPos.distanceTo(this._ctrlWorldPos) > REACH) return;
              this.grabbing         = true;
              this.activeController = ctrl;
              ctrl.object3D.getWorldPosition(this.previousControllerPos);
              this.triggerHaptic(0.6, 50);
            };
            tryGrab(this._rightCtrl);
            tryGrab(this._leftCtrl);
            return;
          }

          // ── Grabbing: check for combo release (hysteresis = 0.15) ────────────────
          const gp = this._getGP(this.activeController);
          if (!gp || comboVal(gp) < 0.15) {
            this.grabbing         = false;
            this.activeController = null;
            return;
          }

          // ── Apply rotation from lateral + vertical controller delta ───────────────
          this.activeController.object3D.getWorldPosition(this.currentControllerPos);
          const deltaX      = this.currentControllerPos.x - this.previousControllerPos.x;
          const deltaY      = this.currentControllerPos.y - this.previousControllerPos.y;
          const sensitivity = 300;
          const rot         = this.el.getAttribute('rotation');
          const nextX       = Math.max(-30, Math.min(30, rot.x + deltaY * sensitivity));
          const nextY       = Math.max(-30, Math.min(30, rot.y - deltaX * sensitivity));
          this.el.setAttribute('rotation', { x: nextX, y: nextY, z: 0 });
          this.previousControllerPos.copy(this.currentControllerPos);
          const movement = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
          if (movement > 0.0001) { this.triggerHaptic(Math.min(0.5, Math.max(0.1, movement * 500)), 20); }
        }
      });

      AFRAME.registerComponent('haptic-button', {
        init: function () {
          this.el.addEventListener('mousedown', (evt) => {
            pulseHaptic(evt.detail && evt.detail.cursorEl, 0.4, 30);
          });
        }
      });

      // ── wrist-offset ─────────────────────────────────────────────────────────
      // Corrects the hand model's position and rotation so the virtual wrist sits
      // at the Quest 2 controller's physical tracking origin rather than floating
      // above it.  Fires once after model-loaded (and again on any hot-reload) by
      // nudging the first non-Bone child of the entity's object3D — the pivot Object3D
      // that oculus-touch-controls creates to hold the GLB hand mesh.
      //
      // oculus-touch-controls already applies a base pivot rotation (≈40°) to match
      // the controller grip angle; our offset is additive, so it does not overwrite
      // the base pose — it only fine-tunes the wrist seat.
      //
      // Quest 2 empirical values (matching Meta's reference controller geometry):
      //   posOffset  (0, −0.015, 0.04) m  — 1.5 cm down, 4 cm forward from grip origin
      //   rotOffset  −35° on X           — tilts the model forward along the controller body
      //
      // GC notes: posOffset and rotOffsetX are pre-allocated in init() and never
      // reallocated.  _apply() is allocation-free.
      AFRAME.registerComponent('wrist-offset', {
        init: function () {
          // Pre-allocate — reused in _apply(), never reallocated.
          this._posOffset  = new THREE.Vector3(0, -0.015, 0.04);
          this._rotOffsetX = THREE.MathUtils.degToRad(-35);

          this._apply = this._apply.bind(this);
          this.el.addEventListener('model-loaded', this._apply);
          // Defensive: apply immediately if the model is already loaded (hot-reload).
          this._apply();
        },

        _apply: function () {
          const root = this.el.object3D;
          if (!root.children.length) return;
          for (let i = 0; i < root.children.length; i++) {
            const child = root.children[i];
            // Skip skeleton bones — they are not the model pivot.
            if (child.isBone) continue;
            // Apply additive correction to the pivot.
            // position.add() and rotation.x += are both mutation-free allocations.
            child.position.add(this._posOffset);
            child.rotation.x += this._rotOffsetX;
            return; // Only the first non-Bone child is the model pivot.
          }
        },

        remove: function () {
          this.el.removeEventListener('model-loaded', this._apply);
        }
      });

      // ── hand-finger-curl ──────────────────────────────────────────────────────
      // Reads analog gamepad values each tick and drives individual finger bone
      // rotations so finger curl is proportional to how hard the user squeezes.
      //
      // Quest 2 Oculus Touch button layout (WebXR Gamepad API):
      //   buttons[0].value  — index trigger   ANALOG 0–1
      //   buttons[1].value  — grip trigger     ANALOG 0–1
      //   buttons[3].touched— thumbstick touch CAPACITIVE BOOL
      //   buttons[4].touched— A (right) / X (left) CAPACITIVE BOOL
      //   buttons[5].touched— B (right) / Y (left) CAPACITIVE BOOL
      //
      // Finger ↔ input:
      //   Index             → buttons[0].value  (index trigger, analog)
      //   Middle/Ring/Pinky → buttons[1].value  (side grip, analog)
      //   Thumb             → capacitive: any of buttons[3/4/5] touched or pressed
      //
      // Bone discovery:
      //   On model-loaded, traverses the entity's object3D looking for THREE.Bone
      //   nodes whose names contain recognisable finger keywords (case-insensitive).
      //   Works for all A-Frame 1.x GLB hand model naming conventions:
      //     thumb0_l / thumb1_l / thumb2_l
      //     f_index.01 / f_index.02
      //     index_proximal / index_intermediate / index_distal
      //   Bones are sorted proximal→distal by extracting the first integer from the
      //   name, falling back to keyword detection (proximal/intermediate/distal).
      //   A console.log lists what was found so the mapping can be verified.
      //   If no bones are found (legacy OBJ lowPoly without skeleton), a warning
      //   is logged and the component no-ops safely.
      //
      // Curl direction:
      //   A-Frame's GLB hand models follow the Blender Y-up bone convention: each
      //   finger bone's long axis is local +Y.  Curling toward the palm is a
      //   rotation around local +Z.  Sign is −1 for the right hand (+1 for left)
      //   because the left-hand model is the right-hand model mirrored on X,
      //   reversing the Z-curl chirality.
      //   If the curl goes the wrong way on your specific model, swap
      //   this._sign in init(), or swap the axis to (1,0,0).
      //
      // GC notes:
      //   All THREE scratch objects are pre-allocated in init().  The hot path
      //   (tick + _applyCurl) is allocation-free.
      AFRAME.registerComponent('hand-finger-curl', {

        init: function () {
          this.bones = { thumb: [], index: [], middle: [], ring: [], pinky: [] };
          this.ready = false;

          const hc    = this.el.getAttribute('hand-controls');
          this.hand   = (hc && hc.hand) ? hc.hand : 'right';

          // Pre-allocate scratch objects — reused every tick, never reallocated.
          this._curlQuat   = new THREE.Quaternion();
          this._targetQuat = new THREE.Quaternion();
          // Curl axis is always local Z.  Set once here, never mutated.
          this._axis       = new THREE.Vector3(0, 0, 1);
          // Right-hand curl is negative Z (inward toward palm).
          // Left-hand GLB is mirrored, so positive Z curls inward.
          this._sign = (this.hand === 'right') ? -1 : 1;

          this.el.addEventListener('model-loaded', () => { this._findBones(); });
          // Defensive fallback: if model is already present when this component
          // is attached (e.g. hot-reload), _findBones will find bones immediately.
          this._findBones();
        },

        _findBones: function () {
          // Reset from any previous model.
          for (const k of Object.keys(this.bones)) this.bones[k] = [];
          this.ready = false;

          const PATTERNS = {
            thumb:  /thumb/i,
            index:  /index/i,
            middle: /middle/i,
            ring:   /ring/i,
            pinky:  /pinky|little/i
          };

          // Walk the full scene graph; collect every THREE.Bone by finger.
          this.el.object3D.traverse(function (node) {
            if (!node.isBone) return;
            var name = node.name;
            for (var finger in PATTERNS) {
              if (PATTERNS[finger].test(name)) {
                this.bones[finger].push(node);
                break;
              }
            }
          }.bind(this));

          // Sort proximal → distal within each finger.
          // Primary key: first integer in the name (thumb0 < thumb1 < thumb2).
          // Fallback key: anatomical keyword (metacarpal < proximal < intermediate
          //               < distal < tip) for names like 'index_proximal'.
          var WORD_PRI = {
            meta: 0, carpal: 0, proximal: 1,
            intermediate: 2, distal: 3, tip: 4
          };
          var sortKey = function (name) {
            var m = name.match(/\d+/);
            if (m) return parseInt(m[0]);
            var lo = name.toLowerCase();
            for (var w in WORD_PRI) {
              if (lo.indexOf(w) !== -1) return WORD_PRI[w];
            }
            return 99;
          };
          for (var finger in this.bones) {
            this.bones[finger].sort(function (a, b) {
              return sortKey(a.name) - sortKey(b.name);
            });
          }

          // Snapshot the rest-pose quaternion for every bone immediately after
          // model load, before hand-controls has ticked and animated anything.
          // Curl is always computed relative to this rest pose so the two
          // systems don't drift over time.
          for (var finger in this.bones) {
            var arr = this.bones[finger];
            for (var i = 0; i < arr.length; i++) {
              arr[i].userData.restQuat = arr[i].quaternion.clone();
            }
          }

          var total = 0;
          for (var k in this.bones) total += this.bones[k].length;

          if (total > 0) {
            this.ready = true;
            var summary = {};
            for (var f in this.bones) {
              summary[f] = this.bones[f].map(function (b) { return b.name; });
            }
            console.log('[hand-finger-curl] ' + this.hand + ' — ' + total +
              ' bones mapped:', summary);
          } else {
            console.warn('[hand-finger-curl] ' + this.hand +

        },

        // Resolve the Gamepad for this hand.  Mirrors pulseHaptic's two-attempt
        // strategy: tracked-controls chain first, navigator.getGamepads() scan
        // second (handles the first few frames before XR input sources are bound).
        _getGamepad: function () {
          var tc = this.el.components['tracked-controls'];
          if (tc && tc.controller && tc.controller.gamepad) {
            return tc.controller.gamepad;
          }
          if (!navigator.getGamepads) return null;
          var pads = navigator.getGamepads();
          for (var i = 0; i < pads.length; i++) {
            var gp = pads[i];
            if (!gp || !gp.connected) continue;
            var id = gp.id.toLowerCase();
            if (this.hand === 'left'  && id.indexOf('left')  !== -1) return gp;

        //   bones — THREE.Bone[] ordered proximal→distal

        //   dt    — frame delta ms (for frame-rate-independent slerp)

          if (!bones.length) return;

          // Max curl angle per joint (radians).
          // Proximal phalanx curls most (~74°); distal/tip curls least (~46°).
          var MAX_ANGLE = [1.3, 1.15, 1.0, 0.8];

          // At 72 Hz lerps 25% per frame → smooth ~4 frame reach.
          // At 90 Hz slightly faster, which is fine for a responsive feel.
          var lerpFactor = Math.min(1.0, 0.25 * (dt / 13.89));

          for (var i = 0; i < bones.length; i++) {
            var bone = bones[i];
            var rest = bone.userData.restQuat;
            if (!rest) continue;

              MAX_ANGLE[i < MAX_ANGLE.length ? i : MAX_ANGLE.length - 1] *
              this._sign;

            // Build the curl quaternion in-place (no allocation).
            this._curlQuat.setFromAxisAngle(this._axis, angle);

            // Post-multiplying applies curl in the bone's own local frame,
            // which is the correct space for anatomical finger rotation.
            this._targetQuat.multiplyQuaternions(rest, this._curlQuat);

            bone.quaternion.slerp(this._targetQuat, lerpFactor);

        tick: function (t, dt) {
          if (!this.ready) return;
          var gp = this._getGamepad();
          if (!gp) return;

          // Analog values clamped 0–1.
          var trigger = gp.buttons[0] ? Math.max(0, Math.min(1, gp.buttons[0].value)) : 0;
          var grip    = gp.buttons[1] ? Math.max(0, Math.min(1, gp.buttons[1].value)) : 0;

          // Capacitive thumb: curl whenever the thumbstick (3), A/X (4), or B/Y (5)
          // registers a touch OR press event.  This mirrors the Quest 2's capacitive
          // sensor behaviour — the thumb curls as soon as it rests on any surface.
          // The binary 0/1 target is slerped by _applyCurl for smooth transitions.
          var thumb = (
            (gp.buttons[3] && (gp.buttons[3].touched || gp.buttons[3].pressed)) ||
            (gp.buttons[4] && (gp.buttons[4].touched || gp.buttons[4].pressed)) ||
            (gp.buttons[5] && (gp.buttons[5].touched || gp.buttons[5].pressed))
          ) ? 1.0 : 0.0;

          this._applyCurl(this.bones.thumb,  thumb,   dt);
          this._applyCurl(this.bones.index,  trigger, dt);
          this._applyCurl(this.bones.middle, grip,    dt);
          this._applyCurl(this.bones.ring,   grip,    dt);
          this._applyCurl(this.bones.pinky,  grip,    dt);

      });

      AFRAME.registerComponent('page-curl', {

        init: function () {
          const folio = this.el;
          const scene = folio.sceneEl;

          this.isCurling        = false;
          this.curlSide         = null;
          this.activeController = null;
          this.startX           = 0;
          this.startMouseX      = 0;      // Fix 11: declare here — used in _onMouseMoveCurl
          this.peelProgress     = 0;
          this.isVR             = false;
          this._ctrlPos         = new THREE.Vector3();
          this.R                = 0.04;
          this._animAborted       = false;
          this._watchdog          = null;
          this._mouseX            = 0;
          this._savedTexMap       = null;
          this._skipFirstCurlTick = false;

          // These are populated on scene load and used by tick() for proximity-based
          // curl initiation and continuous haptic feedback.

          this._cornerWorldPos    = new THREE.Vector3();  // scratch — corner proximity test

          this._audioPanelPos     = new THREE.Vector3();  // scratch — audio panel world pos (distance guard)
          this._grabCooldown      = 0;                    // ms remaining — prevents instant re-grab
          this._rightCtrl         = null;                 // resolved on scene 'loaded'
          this._leftCtrl          = null;
          this._audioPanelEls     = [];                   // [panel-audio] entity refs — populated at scene load
          this._isHotspotTargeted = null;                 // interaction-guard helpers

            if (tc && tc.controller && tc.controller.gamepad) return tc.controller.gamepad;
            if (!navigator.getGamepads) return null;

            var hand = hd && hd.hand;
            if (!hand) return null;
            var pads = navigator.getGamepads();
            for (var i = 0; i < pads.length; i++) {
              var gp = pads[i];
              if (!gp || !gp.connected) continue;
              var id = gp.id.toLowerCase();

              if (hand === 'right' && id.indexOf('right') !== -1) return gp;

          // cursor pipeline (UI button clicks, hotspot interaction).

          // and the release hysteresis threshold both behave correctly.
          this._squeezeVal = function (gp) { return comboVal(gp); };

          // combo gate.  Stored separately from the raycaster component itself so
          // we can guard against redundant setAttribute calls (which are expensive
          // in A-Frame's component update cycle).
          this._rcEnabled = { left: true, right: true };

          // ── Folio hover state ─────────────────────────────────────────────────

          // interaction envelope.  Gating on entry/exit means the haptic pulse
          // fires exactly once per approach, not every tick while inside.
          this._folioHoverActive = { left: false, right: false };

          // Uses Three.js layer masking on the underlying THREE.Raycaster instance
          // rather than A-Frame's 'enabled' attribute.  This is the key architectural
          // improvement over the previous approach:
          //
          //   Old approach: setAttribute('raycaster', 'enabled', false)
          //     → completely kills the raycaster — no cursor events at all,
          //       including for UI buttons and audio zones.
          //
          //   New approach: rc.raycaster.layers.disable(2)  [State B — near]
          //     → the folio mesh (layer 2 only) becomes invisible to the raycaster.
          //       UI buttons and audio zone planes remain on layer 0, so point-select
          //       for the side panel still works at any distance.
          //
          // Layer assignment (set once at scene load, persists for the session):
          //   Layer 0 — all UI geometry (buttons, audio zones, hotspot planes, cursor)

          // The THREE.Raycaster starts with all layers enabled (mask = 0xFFFFFFFF).

            const pages = scene.pages;

              const imgEl = document.querySelector(page.src);
              if (!imgEl) return;

          this.origY = new Float32Array(vCount);

            side: THREE.FrontSide, roughness: 0.8, metalness: 0.1, transparent: false
          });
          this.curlMesh          = new THREE.Mesh(this.curlGeo, this.curlMat);
          this.curlMesh.position.z = 0.001;
          this.curlMesh.visible    = false;
          folio.object3D.add(this.curlMesh);

          this.backCurlMat = new THREE.MeshStandardMaterial({
            side: THREE.BackSide, roughness: 0.85, metalness: 0.05,
            color: new THREE.Color(0.88, 0.82, 0.68), transparent: false
          });
          this.backCurlMesh          = new THREE.Mesh(this.curlGeo, this.backCurlMat);
          this.backCurlMesh.position.z = 0.001;
          this.backCurlMesh.visible    = false;
          folio.object3D.add(this.backCurlMesh);

          this.shadowMat  = new THREE.MeshBasicMaterial({
            color: 0x000000, transparent: true, opacity: 0, depthWrite: false
          });
          this.shadowMesh          = new THREE.Mesh(shadowGeo, this.shadowMat);
          this.shadowMesh.position.z = 0.0025;
          this.shadowMesh.visible    = false;
          folio.object3D.add(this.shadowMesh);

          this.backPage.setAttribute('width',    '1.1');
          this.backPage.setAttribute('height',   '0.8');
          this.backPage.setAttribute('position', '0 0 -0.004');
          this.backPage.setAttribute('material',
            'shader: standard; metalness: 0.1; roughness: 0.8; side: double');
          this.backPage.setAttribute('visible', 'false');
          folio.appendChild(this.backPage);

          this.rightCorner = document.createElement('a-plane');
          this.rightCorner.setAttribute('position', '0.4 -0.3 0.01');
          this.rightCorner.setAttribute('width',    '0.25');
          this.rightCorner.setAttribute('height',   '0.25');

          this.leftCorner.setAttribute('position', '-0.4 -0.3 0.01');
          this.leftCorner.setAttribute('width',    '0.25');
          this.leftCorner.setAttribute('height',   '0.25');

          // Three-tier fallback to be maximally robust on Quest 2 WebXR:

          //      to be ready by the time any page turn can be triggered.

          // even when needsUpdate=true, because the XR compositor uploads on its own
          // schedule. initTexture() bypasses that and makes the upload synchronous.
          const applyDestTex = (destSrc) => {
            const fMesh = folio.getObject3D('mesh');

              fMesh.material.needsUpdate = true;

              // assignment from scene 'loaded' is lost.  The camera has layer 2

            const startProg      = this.peelProgress;
            const capturedSide   = this.curlSide;
            const startTime      = performance.now();
            const duration       = 450;

            const pages      = scene.pages;
            const currentIdx = (scene.currentAudioPage || 1) - 1;
            const dir        = capturedSide === 'right' ? 1 : -1;

            const capturedDestSrc = pages[nextIdx].src;

              const raw   = Math.min((now - startTime) / duration, 1);
              const eased = easeInOut(raw);

              } else {
                setTimeout(() => {
                  if (this._animAborted) return;

                  // Step 1: Restore folio mesh visibility.
                  // curlMesh is still visible and covers the folio, so no flash.
                  const fMesh = folio.getObject3D('mesh');
                  if (fMesh) { fMesh.visible = true; fMesh.layers.set(2); }

                  // Step 2: Update panels silently.
                  if (scene.doSwap) scene.doSwap(dir, true);

                  // material. This is synchronous and the GPU upload already happened
                  // at scene load via initTexture() — the Quest 2 XR compositor sees

                  // material pipeline.

                  // On Quest 2 WebXR, setAttribute triggers A-Frame's material

                  // bypasses A-Frame's tracking) before the async load completes —

                  // the curl pipeline reads folio.getAttribute('src'), so omitting

            const capturedCtrl   = this.activeController;
            this.activeController = null;

            // of paper tension releasing — felt as a high-frequency "flutter" effect.
            pulseHaptic(capturedCtrl, 0.25, 15);
            setTimeout(() => pulseHaptic(capturedCtrl, 0.20, 12),  45);
            setTimeout(() => pulseHaptic(capturedCtrl, 0.15, 10),  90);
            setTimeout(() => pulseHaptic(capturedCtrl, 0.10,  8), 135);
            const startProg    = this.peelProgress;
            const capturedSide = this.curlSide;
            const startTime    = performance.now();
            const duration     = 350;
            const animate = (now) => {
              if (this._animAborted) return;
              const raw   = Math.min((now - startTime) / duration, 1);
              const eased = easeOut(raw);
              this.peelProgress = startProg * (1 - eased);
              this.updateCurl(this.peelProgress, capturedSide);
              if (raw < 1) {
                requestAnimationFrame(animate);
              } else {
                setTimeout(() => {
                  if (!this._animAborted) {
                    const fMesh = folio.getObject3D('mesh');
                    if (fMesh) { fMesh.visible = true; fMesh.layers.set(2); }

                  }
                }, 50);
              }
            };
            requestAnimationFrame(animate);
          };

            const pages      = scene.pages;

            const nextIdx    = (currentIdx + dir + pages.length) % pages.length;

            // Save the current page src so snapBack can restore it via setAttribute.
            this._savedSrc = pages[currentIdx].src;

            const folioMesh = folio.getObject3D('mesh');
            if (folioMesh && folioMesh.material) {
              // Snapshot current texture for curlMesh (the peeling surface).
              this._savedTexMap = folioMesh.material.map || null;

                this.curlMat.map             = folioMesh.material.map;
                this.curlMat.map.minFilter   = THREE.LinearFilter;
                this.curlMat.map.anisotropy  = Math.min(16,
                  folio.sceneEl.renderer ? folio.sceneEl.renderer.capabilities.getMaxAnisotropy() : 16);

                this.curlMat.needsUpdate     = true;

            }

            // Hide the folio mesh directly — Three.js visibility flag, completely
            // invisible to A-Frame's material component.  The backPage (z=-0.004)
            // is now visible through the peeled area of the curlMesh.
            // We restore mesh.visible BEFORE calling setAttribute in the completion
            // path so A-Frame processes the texture load on a visible entity.
            if (folioMesh) folioMesh.visible = false;

            // backPage provides the visual destination texture backdrop during
            // the animation AND is a secondary source for applyDestTex (Tier 2).
            const _bpDestSrc = pages[nextIdx].src;
            this.backPage.setAttribute('src', _bpDestSrc);
            this.backPage.setAttribute('visible', 'true');
            // Quest 2 WebXR: setAttribute('src') is async — the texture will not be on
            // backPage.material.map in time for the first rendered frame of the curl.
            // Push the pre-cached texture onto the Three.js material immediately, and
            // again on the next frame in case the mesh was not yet initialised this frame.
            const _applyBPTex = () => {
              const bpMesh = this.backPage.getObject3D('mesh');
              if (bpMesh && bpMesh.material && this._texCache[_bpDestSrc]) {
                bpMesh.material.map = this._texCache[_bpDestSrc];
                bpMesh.material.needsUpdate = true;
              }
            };
            _applyBPTex();
            requestAnimationFrame(_applyBPTex);
            this.curlMesh.visible     = true;
            this.backCurlMesh.visible = true;
            this.shadowMesh.visible   = true;
            this._animAborted         = false;
            this._skipFirstCurlTick   = true;
            this.isCurling            = true;
            this.curlSide             = side;
            this.peelProgress         = 0;
            this.activeController     = controllerEl || null;
            // Short, sharp pulse the moment the grab registers — initial contact confirmation.
            pulseHaptic(this.activeController, 0.5, 20);

            if (this.activeController) {
              this.activeController.object3D.getWorldPosition(this._ctrlPos);
              this.startX = this._ctrlPos.x;
            } else {
              this.startMouseX = this._mouseX;
            }

            this.updateCurl(0, side);
            this._watchdog = setTimeout(() => { if (this.isCurling) { this.resetCurl(); } }, 3500);
          };
          // Expose startCurl so the tick() gesture-detection loop can call it.
          this._startCurl = startCurl;

          this._onMouseMoveCurl = (e) => {
            if (!this.isCurling || this.isVR) return;
            const dx          = this.startMouseX - e.clientX;
            const sensitivity = 1 / (window.innerWidth * 0.4);
            let newProgress;
            if (this.curlSide === 'right') {
              newProgress = Math.max(0, Math.min(1,  dx * sensitivity));
            } else {
              newProgress = Math.max(0, Math.min(1, -dx * sensitivity));
            }
            this.peelProgress = newProgress;
            this.updateCurl(this.peelProgress, this.curlSide);
          };
          this._onMouseUpCurl = () => {
            if (!this.isCurling || this.isVR) return;
            if (this.peelProgress >= 0.25) { this._completeCurl(); } else { this._snapBack(); }
          };
          window.addEventListener('mousemove', this._onMouseMoveCurl);
          window.addEventListener('mouseup',   this._onMouseUpCurl);

          this.rightCorner.addEventListener('mousedown', (evt) => {
            evt.stopPropagation();
            if (this.isVR) return;
            startCurl('right', null);
          });
          this.leftCorner.addEventListener('mousedown', (evt) => {
            evt.stopPropagation();
            if (this.isVR) return;
            startCurl('left', null);
          });

          // Gesture-grab setup: store controller refs and interaction-guard helpers
          // that tick() needs. The A/X button listeners for curl are intentionally
          // removed — curl initiation is now driven purely by physical proximity and
          // trigger/grip squeeze, detected every tick in the VR grab-detection phase.
          scene.addEventListener('loaded', () => {
            const rightCtrl = document.querySelector('#right-hand');
            const leftCtrl  = document.querySelector('#left-hand');
            this._rightCtrl = rightCtrl;
            this._leftCtrl  = leftCtrl;

            // ── Three.js layer assignment ─────────────────────────────────────────
            // Move the folio mesh exclusively to layer 2.
            // Layer 0 is the default for all geometry; by removing the folio from
            // layer 0 and placing it on layer 2 only, we can selectively mask it
            // from a raycaster by calling raycaster.layers.disable(2) without
            // affecting any other clickable entity (which remain on layer 0).
            //
            // The rendering camera must also have layer 2 enabled, otherwise the
            // folio mesh becomes invisible.  scene.camera is the THREE.PerspectiveCamera;
            // layers.enable() is additive — layer 0 stays enabled for all other geometry.
            //
            // Geometry added later (curlMesh, backCurlMesh, backPage) is never in the
            // raycaster's .objects selector so it does not need layer assignment.
            // The corner a-planes are .clickable but only on desktop (removed in enter-vr);
            // they remain on their default layer 0 for the desktop cursor.
            const folioMesh = folio.getObject3D('mesh');
            if (folioMesh) {
              folioMesh.layers.set(2);          // layer 2 only — removes layer 0
            }
            if (scene.camera) {
              scene.camera.layers.enable(2);    // camera renders both layer 0 and layer 2
            }

            // ── Audio panel element refs ──────────────────────────────────────────
            // Cache all [panel-audio] entities once at load time.
            // Used by _isAudioHovered() to run a distance check each tick without
            // querying the DOM or traversing raycaster intersection arrays.
            this._audioPanelEls = Array.from(document.querySelectorAll('[panel-audio]'));

            // Guard: blocks curl grab while any hotspot info panel is currently open.
            // Fix 2: replaced targetedPanel check (which is always null in VR because
            // the folio is on layer 2 and invisible to the raycaster in State B) with a
            // direct panelOpen scan across all zones.  Works in both VR and desktop.
            this._isHotspotTargeted = () => {
              const hs = folio.components['folio-hotspots'];
              if (!hs || !hs.zones) return false;
              return hs.zones.some(z => z.panelOpen);
            };

            // Guard: blocks curl grab while either controller is within reach of an
            // audio panel so the audio toggle takes priority over page curl.
            //
            // Rewritten as a world-space distance check (replacing the previous
            // raycaster intersection traversal).  Motivation: with State B layer
            // masking, the folio is invisible to the raycaster when near — but that
            // doesn't affect audio panel planes (layer 0).  The intersection approach
            // would still technically work, but it requires traversing rc.intersectedEls
            // and walking the DOM parentNode chain on every tick, which is allocation-
            // heavy.  A direct distance check is allocation-free and more robust when
            // the raycaster is in a transitional state between layers.
            //
            // Threshold 0.80 m covers comfortable arm reach toward either side panel
            // without triggering from across the room (panels are at x = -1.5 m,
            // folio is at x ≈ 0 m — the dead zones do not overlap).
            this._isAudioHovered = () => {
              if (!this._audioPanelEls.length) return false;
              const ctrls = [rightCtrl, leftCtrl];
              for (const ctrl of ctrls) {
                if (!ctrl) continue;
                ctrl.object3D.getWorldPosition(this._ctrlPos);
                for (const panelEl of this._audioPanelEls) {
                  panelEl.object3D.getWorldPosition(this._audioPanelPos);
                  if (this._audioPanelPos.distanceTo(this._ctrlPos) <= 0.80) return true;
                }
              }
              return false;
            };
          });
        },

        updateCurl: function (peelProgress, side) {
          const R_base  = this.R;
          const posAttr = this.curlGeo.attributes.position;
          const basePeelX = side === 'right'
            ?  0.55 - peelProgress * 1.1
            : -0.55 + peelProgress * 1.1;

          for (let i = 0; i < posAttr.count; i++) {
            const x0 = this.origX[i];
            const y0 = this.origY[i];
            const yN = (y0 + 0.4) / 0.8;
            const diagOffset = 0.09 * peelProgress * (1.0 - yN);
            const localPeelX = side === 'right'
              ? basePeelX - diagOffset
              : basePeelX + diagOffset;
            const R   = R_base * (0.60 + 0.40 * yN);
            const piR = Math.PI * R;
            const bW  = piR * 0.10;
            const d   = side === 'right' ? x0 - localPeelX : localPeelX - x0;
            let nx, ny, nz;
            if (d <= 0) {
              nx = x0; ny = y0; nz = 0;
            } else if (d <= piR) {
              const a = d / R;
              nx = side === 'right' ? localPeelX + R * Math.sin(a) : localPeelX - R * Math.sin(a);
              nz = R * (1.0 - Math.cos(a));
              const liftFrac = nz / (2.0 * R);
              const sagPeak  = Math.sin(peelProgress * Math.PI) * 0.03;
              ny = y0 - liftFrac * sagPeak * yN;
            } else if (d <= piR + bW) {
              const t     = (d - piR) / bW;
              const blend = t * t * (3.0 - 2.0 * t);
              const flatNx = 2.0 * localPeelX - x0;
              nx = localPeelX + (flatNx - localPeelX) * blend;
              nz = 2.0 * R * (1.0 - blend) + (-0.002) * blend;
              ny = y0;
            } else {
              nx = 2.0 * localPeelX - x0;
              ny = y0;
              nz = -0.002;
            }
            posAttr.setXYZ(i, nx, ny, nz);
          }

          posAttr.needsUpdate = true;
          this.curlGeo.computeVertexNormals();
          this.shadowMat.opacity     = Math.sin(peelProgress * Math.PI) * 0.45;
          this.shadowMesh.visible    = peelProgress > 0.005;
          const sweepW               = peelProgress * 1.1;
          const sweepCx              = side === 'right' ? 0.55 - sweepW * 0.5 : -0.55 + sweepW * 0.5;
          this.shadowMesh.scale.x    = Math.max(0.001, sweepW / 1.1);
          this.shadowMesh.position.x = sweepCx;
        },

        resetCurl: function () {
          clearTimeout(this._watchdog);
          this._watchdog    = null;
          this._animAborted = true;

          // Ensure folio mesh is always visible — safety net for watchdog and
          // exit-vr abort paths where completeCurl's revealFolio never ran.
          const fMesh = this.el.getObject3D('mesh');
          if (fMesh) { fMesh.visible = true; fMesh.layers.set(2); }

          this.curlMesh.visible     = false;
          this.backCurlMesh.visible = false;
          this.shadowMesh.visible   = false;
          this.backPage.setAttribute('visible', 'false');

          const posAttr = this.curlGeo.attributes.position;
          for (let i = 0; i < posAttr.count; i++) {
            posAttr.setXYZ(i, this.origX[i], this.origY[i], 0);
          }
          posAttr.needsUpdate = true;

          this.isCurling         = false;
          this.curlSide          = null;
          this.activeController  = null;
          this.peelProgress      = 0;
          this._savedTexMap      = null;
          // Cooldown prevents the gesture-grab in tick() from immediately re-triggering
          // if the user's hand is still near a corner and squeeze is still > threshold.
          this._grabCooldown     = 400;
          this.shadowMat.opacity     = 0;
          this.shadowMesh.scale.x    = 1;
          this.shadowMesh.position.x = 0;
        },

        tick: function (t, dt) {
          if (!this.isVR) return;

          // ── Grab cooldown ─────────────────────────────────────────────────────────
          // Prevents the proximity detector from immediately re-triggering a new curl
          // the instant resetCurl() fires (user's hand may still be near the corner).
          if (this._grabCooldown > 0) {
            this._grabCooldown -= (dt || 16);
            return;
          }

          // ── Raycaster combo gate ──────────────────────────────────────────────────
          // The combo state (index + grip + A/X) is read by _squeezeVal / comboVal
          // and drives Phase 1 grab detection below.  Layer switching (State A ↔ B)
          // is now driven by HOVER_REACH proximity in checkHover — not by the combo —
          // so the folio is masked from the raycaster as soon as the hand is near,
          // regardless of whether the buttons are pressed.  No _setRC calls here.

          // ── Folio proximity hover pulse + State A/B layer switching ───────────────
          // Entry (outside → inside HOVER_REACH):
          //   • Single haptic confirmation pulse — "you are close enough to act"
          //   • _setRC(ctrl, false) → State B: disable layer 2 on this controller's
          //     raycaster so the folio mesh is masked.  UI buttons (layer 0) are
          //     unaffected.  Visual beam is hidden for immersion.
          // Exit (inside → outside HOVER_REACH):
          //   • _setRC(ctrl, true) → State A: re-enable layer 2.  Folio is hittable
          //     again from a distance.  Visual beam is restored.
          // Transition-only — _setRC is idempotent so no-ops if already in correct state.
          // Fix 3: HOVER_REACH reduced from 0.40 to 0.30 to match vr-grab-rotate's
          // REACH (0.30 m).  Previously HOVER_REACH > REACH meant the raycaster was
          // masked (State B, folio invisible) before a grab was geometrically possible,
          // creating a 10 cm dead zone where neither system was active.
          // Now State B starts exactly when grab becomes possible.
          const HOVER_REACH = 0.30;
          const checkHover = (ctrl, handKey) => {
            if (!ctrl) return;
            this.el.object3D.getWorldPosition(this._folioWorldPos);
            ctrl.object3D.getWorldPosition(this._ctrlPos);
            const inside = this._folioWorldPos.distanceTo(this._ctrlPos) <= HOVER_REACH;
            if (inside && !this._folioHoverActive[handKey]) {
              pulseHaptic(ctrl, 0.45, 50);
              this._folioHoverActive[handKey] = true;
              this._setRC(ctrl, false);   // → State B: mask folio layer, hide beam
            } else if (!inside && this._folioHoverActive[handKey]) {
              this._folioHoverActive[handKey] = false;
              this._setRC(ctrl, true);    // → State A: unmask folio layer, restore beam
            }
          };
          checkHover(this._rightCtrl, 'right');
          checkHover(this._leftCtrl,  'left');

          // ── Phase 1: Not curling — detect a fresh gesture grab ────────────────────
          // A grab registers when a controller is within CORNER_REACH of a folio
          // corner entity AND squeezing above GRAB_THRESHOLD.  No raycaster
          // intersection required — physical proximity drives initiation so the user
          // can reach out and grab the page naturally in 6DoF space.
          if (!this.isCurling) {
            if (!this._startCurl || (!this._rightCtrl && !this._leftCtrl)) return;

            // ── Fix 4: Mutual exclusion — vr-grab-rotate owns the folio centre ──────
            // If the user has already grabbed the folio for rotation (not at a corner),
            // don't also start a curl.  The user must release the grab-rotate first.
            const gr = this.el.components['vr-grab-rotate'];
            if (gr && gr.grabbing) return;

            const GRAB_THRESHOLD = 0.50; // 50 % squeeze — deliberate grab, not accidental
            const CORNER_REACH   = 0.18; // 18 cm world-space radius around each corner

            const tryGrab = (ctrl, cornerEl, side) => {
              if (!ctrl || !cornerEl) return;
              const gp = this._getGP(ctrl);
              if (!gp || this._squeezeVal(gp) < GRAB_THRESHOLD) return;
              // Guard: hotspot and audio interactions take priority over page curl.
              if (this._isHotspotTargeted && this._isHotspotTargeted()) return;
              if (this._isAudioHovered    && this._isAudioHovered())    return;
              // Proximity test in world space.
              cornerEl.object3D.getWorldPosition(this._cornerWorldPos);
              ctrl.object3D.getWorldPosition(this._ctrlPos);
              if (this._cornerWorldPos.distanceTo(this._ctrlPos) <= CORNER_REACH) {
                this._startCurl(side, ctrl);
              }
            };

            tryGrab(this._rightCtrl, this.rightCorner, 'right');
            // Only check left if right didn't already initiate a curl.
            if (!this.isCurling) tryGrab(this._leftCtrl, this.leftCorner, 'left');
            return;
          }

          // ── Phase 2: Active curl — guard controller availability ──────────────────
          if (!this.activeController) return;

          // ── Phase 3: One-frame skip after startCurl ───────────────────────────────
          // On the frame startCurl fires, squeezeVal is already ≥ GRAB_THRESHOLD.
          // Skipping one tick lets analog values settle so we don't misread a transient
          // dip as a release and immediately fire _completeCurl on the entry frame.
          if (this._skipFirstCurlTick) {
            this._skipFirstCurlTick = false;
            return;
          }

          // ── Phase 4: Release detection (hysteresis threshold = 0.15) ─────────────
          // Threshold is lower than GRAB_THRESHOLD (0.50) to prevent jitter at the
          // boundary and give the user a clear squeeze → hold → release gesture model.
          const gp = this._getGP(this.activeController);
          if (!gp || this._squeezeVal(gp) < 0.15) {
            // Null the controller first — prevents queued events from double-firing.
            this.activeController = null;
            if (this.peelProgress >= 0.25) { this._completeCurl(); } else { this._snapBack(); }
            return;
          }

          // ── Phase 5: Curl progress from lateral hand displacement ─────────────────
          this.activeController.object3D.getWorldPosition(this._ctrlPos);
          const deltaX      = this._ctrlPos.x - this.startX;
          const sensitivity = 4.0;
          const newProgress = this.curlSide === 'right'
            ? Math.max(0, Math.min(1, -deltaX * sensitivity))
            : Math.max(0, Math.min(1,  deltaX * sensitivity));
          this.peelProgress = newProgress;
          this.updateCurl(this.peelProgress, this.curlSide);

          // ── Phase 6: Peel-resistance haptic ──────────────────────────────────────
          // Throttled to ≥60 ms between pulses to avoid saturating the Quest 2
          // haptic actuator.  Intensity scales with peelProgress: the more page is
          // lifted, the heavier the resistance feels in the hand.
          //   progress 0.0 → 0.10 intensity  (barely perceptible initial peel)
          //   progress 0.5 → 0.25 intensity  (clear mid-turn paper resistance)
          //   progress 1.0 → 0.40 intensity  (maximum pre-commit tension)
          if (t - this._lastHapticTime >= 60) {
            this._lastHapticTime = t;
            pulseHaptic(this.activeController, 0.1 + (this.peelProgress * 0.3), 50);
          }
        },

        remove: function () {
          window.removeEventListener('mousemove', this._trackMouse);
          window.removeEventListener('mousemove', this._onMouseMoveCurl);
          window.removeEventListener('mouseup',   this._onMouseUpCurl);
          // Fix 12: dispose GPU-uploaded Three.js objects to prevent VRAM leaks
          // during hot-reload cycles in development.
          if (this.curlGeo)     this.curlGeo.dispose();
          if (this.curlMat)     this.curlMat.dispose();
          if (this.backCurlMat) this.backCurlMat.dispose();
          if (this.shadowMat)   this.shadowMat.dispose();
        }
      });

      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          this.isVR        = false;
          this.el.sceneEl.addEventListener('enter-vr', () => { this.isVR = true;  });
          this.el.sceneEl.addEventListener('exit-vr',  () => { this.isVR = false; });
          this.onMouseDown   = (e) => { if (!this.isVR && e.button === 2) this.ifMouseDown = true; };
          this.onMouseUp     = ()  => { this.ifMouseDown = false; };
          this.onMouseMove   = (e) => {
            if (!this.ifMouseDown) return;
            const rotation = this.el.getAttribute('rotation');
            const deltaX   = (e.movementX !== undefined ? e.movementX : 0) * 0.15;
            const deltaY   = (e.movementY !== undefined ? e.movementY : 0) * 0.15;
            this.el.setAttribute('rotation', {
              x: Math.max(-30, Math.min(30, rotation.x + deltaY)),
              y: Math.max(-30, Math.min(30, rotation.y + deltaX)),
              z: 0
            });
          };
          this.onContextMenu = (e) => e.preventDefault();
          window.addEventListener('mousedown',   this.onMouseDown);
          window.addEventListener('mouseup',     this.onMouseUp);
          window.addEventListener('mousemove',   this.onMouseMove);
          window.addEventListener('contextmenu', this.onContextMenu);
        },
        remove: function () {
          window.removeEventListener('mousedown',   this.onMouseDown);
          window.removeEventListener('mouseup',     this.onMouseUp);
          window.removeEventListener('mousemove',   this.onMouseMove);
          window.removeEventListener('contextmenu', this.onContextMenu);
        }
      });

      AFRAME.registerComponent('flicker', {
        // brightness: scales the whole intensity output.  Default 1.0 = original
        // desk-candle behaviour (range 0.9–1.8).  Set e.g. brightness:0.28 for
        // bookcase candles (range ≈0.25–0.50) — subtle without a code fork.
        schema: { brightness: { type: 'number', default: 1.0 } },
        init: function () {
          const p      = this.el.getAttribute('position');
          this.baseX   = p ? p.x : 0;
          this.baseY   = p ? p.y : 0.5;
          this.baseZ   = p ? p.z : 0.5;
          this.phaseX  = Math.random() * Math.PI * 2;
          this.phaseY  = Math.random() * Math.PI * 2;
          this.lastLightUpdate = 0;
        },
        tick: function (t) {
          const driftX = Math.sin(t*0.0007+this.phaseX)*0.015 + Math.sin(t*0.0019+this.phaseX)*0.008 + (Math.random()-0.5)*0.004;
          const driftY = Math.sin(t*0.0005+this.phaseY)*0.012 + Math.sin(t*0.0023+this.phaseY)*0.006 + (Math.random()-0.5)*0.003;
          this.el.object3D.position.set(this.baseX+driftX, this.baseY+driftY, this.baseZ);
          if (t - this.lastLightUpdate > 50) {
            this.lastLightUpdate = t;
            const base = Math.max(0.9, Math.min(1.8,
              1.2 + Math.sin(t*0.00035)*0.25+0.25 + Math.sin(t*0.0023)*0.10 + (Math.random()-0.5)*0.15));
            const intensity = base * this.data.brightness;
            const t_col = (base - 0.9) / 0.9;
            this.el.setAttribute('light', {
              intensity: intensity,
              color: 'rgb(255,'+Math.round(119+t_col*119)+','+Math.round(51+t_col*85)+')'
            });
          }
        }
      });

      // ── finger-poke ──────────────────────────────────────────────────────────
      // VR-only physical fingertip interactor.  Tests the index distal bone world
      // position (from hand-finger-curl) against folio hotspot zones and side
      // buttons, firing toggles/clicks without requiring the raycaster.
      //
      // Fingertip resolution — two-tier:
      //   Tier 1: hand-finger-curl.bones.index last bone (distal phalanx origin).
      //           Accurate when the lowPoly GLB has a skeleton.
      //   Tier 2: controller world pos + fixed local offset (0, 0.10, 0.02)
      //           approximating an extended index finger from the grip origin.
      //
      // Hotspot poke (folio-local space test):
      //   Fingertip transformed into folio-local space.
      //   XY must fall inside zone bounds; |Z| must be ≤ POKE_DEPTH (4 cm).
      //   |Z| ≤ HOVER_DEPTH (12 cm) gives a pre-contact highlight.
      //
      // Button poke (world-space sphere test):
      //   BUTTON_POKE_RADIUS 0.06 m.  Hover starts at 1.8× that radius (~10.8 cm).
      //   Dispatches a native MouseEvent('click') on the element so existing
      //   scriptorium-logic listeners fire unchanged.  pulseHaptic is called
      //   directly (bypasses haptic-button's mousedown dependency).
      //
      // Highlight:
      //   Hover state  → dim gold emissive (#332200) on the zone bg / button mesh.
      //   Contact state → bright gold emissive (#997700) flash before action fires.
      //   All highlight ops are direct Three.js material mutations — no setAttribute.
      //
      // Debounce:
      //   Per-hand POKE_COOLDOWN 600 ms prevents re-firing while the finger lingers.
      //   _zoneState / _btnState arrays (Int8Array) collect both hands' intent each
      //   tick before applying highlights — avoids two-hand race conditions.
      //
      // VR-only — isVR gate exits tick() immediately on desktop.
      AFRAME.registerComponent('finger-poke', {

        init: function () {
          this.isVR       = false;
          this._rightCtrl = null;
          this._leftCtrl  = null;
          this._folio     = null;
          this._buttons   = [];  // [{el, isHovered}]

          // Per-hand poke cooldown in ms.
          this._pokeCooldown = { left: 0, right: 0 };

          // Pre-allocated scratch — never reallocated in tick().
          this._tipWorld  = new THREE.Vector3();
          this._tipLocal  = new THREE.Vector3();
          this._btnWorld  = new THREE.Vector3();
          this._offsetLoc = new THREE.Vector3();
          this._ctrlQuat  = new THREE.Quaternion();

          // Emissive colours — allocated once in init().
          this._eHover   = new THREE.Color(0.20, 0.15, 0.00);  // dim gold
          this._eContact = new THREE.Color(0.60, 0.45, 0.00);  // bright gold
          this._eOff     = new THREE.Color(0, 0, 0);

          // State arrays — 0 = off, 1 = hover, 2 = contact.
          // Size 8 covers 4 zones + 5 buttons with margin.
          this._zoneState = new Int8Array(8);
          this._btnState  = new Int8Array(8);

          this.el.addEventListener('enter-vr', () => { this.isVR = true;  });
          this.el.addEventListener('exit-vr',  () => {
            this.isVR = false;
            this._clearAll();
          });

          this.el.addEventListener('loaded', () => {
            this._rightCtrl = document.querySelector('#right-hand');
            this._leftCtrl  = document.querySelector('#left-hand');
            this._folio     = document.querySelector('#folio-object');
            const ids = ['zoom-button', 'mat-button', 'swap-button', 'scale-button', 'mute-button'];
            this._buttons = ids.map(id => {
              const el = document.querySelector('#' + id);
              return el ? { el, isHovered: false } : null;
            }).filter(Boolean);
          });

        // ── _getTip: write index fingertip world pos into `out` ────────────────
        _getTip: function (ctrl, out) {
          const hfc = ctrl.components && ctrl.components['hand-finger-curl'];
          if (hfc && hfc.ready && hfc.bones.index && hfc.bones.index.length > 0) {
            const distal = hfc.bones.index[hfc.bones.index.length - 1];
            distal.getWorldPosition(out);
            return;
          }
          // Fallback: controller origin + fixed finger-extension offset.
          ctrl.object3D.getWorldPosition(out);
          this._offsetLoc.set(0, 0.10, 0.02);
          ctrl.object3D.getWorldQuaternion(this._ctrlQuat);
          this._offsetLoc.applyQuaternion(this._ctrlQuat);
          out.add(this._offsetLoc);

        _setEmissive: function (el, colour) {
          var mesh = el.getObject3D('mesh');

            mesh.material.emissive.copy(colour);

        _clearAll: function () {
          for (var i = 0; i < this._buttons.length; i++) {
            this._setEmissive(this._buttons[i].el, this._eOff);
            this._buttons[i].isHovered = false;
          }
          var hs = this._folio && this._folio.components['folio-hotspots'];
          if (hs) {
            for (var j = 0; j < (hs.zones ? hs.zones.length : 0); j++) {

        // Mirrors the two-attempt strategy used by pulseHaptic and page-curl:
        // tracked-controls component chain first, navigator.getGamepads() scan
        // second (handles the first few frames before XR sources are bound).
        _getGP: function (ctrl) {
          if (!ctrl) return null;
          var tc = ctrl.components && ctrl.components['tracked-controls'];
          if (tc && tc.controller && tc.controller.gamepad) return tc.controller.gamepad;
          if (!navigator.getGamepads) return null;
          var hd   = ctrl.getAttribute('hand-controls');
          var hand = hd && hd.hand;
          if (!hand) return null;
          var pads = navigator.getGamepads();
          for (var i = 0; i < pads.length; i++) {
            var gp = pads[i];
            if (!gp || !gp.connected) continue;
            var id = gp.id.toLowerCase();
            if (hand === 'left'  && id.indexOf('left')  !== -1) return gp;
            if (hand === 'right' && id.indexOf('right') !== -1) return gp;

        tick: function (t, dt) {
          if (!this.isVR || !this._folio) return;

          // Tick down per-hand cooldowns.
          if (this._pokeCooldown.left  > 0) this._pokeCooldown.left  -= (dt || 16);
          if (this._pokeCooldown.right > 0) this._pokeCooldown.right -= (dt || 16);

          var POKE_DEPTH         = 0.04;   // 4 cm contact depth against folio
          var HOVER_DEPTH        = 0.12;   // 12 cm pre-contact hover zone
          var BUTTON_POKE_RADIUS = 0.06;   // 6 cm contact radius for buttons
          var BUTTON_HOVER_MULT  = 1.8;    // hover at 1.8× contact radius ≈ 10.8 cm

          var hs          = this._folio.components['folio-hotspots'];
          var currentPage = this._folio.sceneEl.currentAudioPage || 1;
          var nZones      = hs && hs.zones ? hs.zones.length : 0;
          var nBtns       = this._buttons.length;

          // Reset state arrays before collecting both hands' contribution.
          for (var z = 0; z < nZones; z++) this._zoneState[z] = 0;
          for (var b = 0; b < nBtns;  b++) this._btnState[b]  = 0;

          var hands = [
            { ctrl: this._rightCtrl, key: 'right' },
            { ctrl: this._leftCtrl,  key: 'left'  }

            var ctrl = hands[h].ctrl;
            var key  = hands[h].key;
            if (!ctrl) continue;

            this._getTip(ctrl, this._tipWorld);

            // pokeArmed is true when grip (buttons[1]) ≥ 0.5 AND the full
            // three-button grab combo is NOT active (comboVal < 0.5).
            //
            // This cleanly partitions the input space:
            //   grip alone           → pokeArmed = true  (poke fires on contact)
            //   grip + trigger + A/X → pokeArmed = false (grab/curl owns the folio)
            //   no grip              → pokeArmed = false (hover only, no action)
            //
            // Hover highlights are shown regardless of pokeArmed so the user
            // gets spatial feedback even before curling their fingers.
            var gp       = this._getGP(ctrl);
            var gripVal  = gp && gp.buttons[1] ? Math.max(0, Math.min(1, gp.buttons[1].value)) : 0;
            var pokeArmed = gripVal >= 0.5 && comboVal(gp) < 0.5;

            // ── Hotspot zones (folio-local space) ─────────────────────────────
            if (hs && nZones > 0) {
              this._tipLocal.copy(this._tipWorld);
              this._folio.object3D.worldToLocal(this._tipLocal);

              for (var zi = 0; zi < nZones; zi++) {
                var zone = hs.zones[zi];
                if (zone.page !== currentPage) continue;
                var inXY = Math.abs(this._tipLocal.x - zone.cx) <= zone.halfW &&
                           Math.abs(this._tipLocal.y - zone.cy) <= zone.halfH;
                if (!inXY) continue;
                var absZ = Math.abs(this._tipLocal.z);
                if (absZ <= POKE_DEPTH) {
                  // Promote to contact (never downgrade within this tick).
                  if (this._zoneState[zi] < 2) this._zoneState[zi] = 2;
                  // Action only fires when grip is held but full combo is not.
                  if (pokeArmed && this._pokeCooldown[key] <= 0) {
                    hs.pokeToggle(zi, ctrl);
                    this._pokeCooldown[key] = 600;
                  }
                } else if (absZ <= HOVER_DEPTH) {
                  if (this._zoneState[zi] < 1) this._zoneState[zi] = 1;
                }
              }
            }

            // ── Side buttons (world-space proximity) ──────────────────────────
            for (var bi = 0; bi < nBtns; bi++) {
              this._buttons[bi].el.object3D.getWorldPosition(this._btnWorld);
              var dist = this._tipWorld.distanceTo(this._btnWorld);
              if (dist <= BUTTON_POKE_RADIUS) {
                if (this._btnState[bi] < 2) this._btnState[bi] = 2;
                // Action only fires when grip is held but full combo is not.
                if (pokeArmed && this._pokeCooldown[key] <= 0) {

                    new MouseEvent('click', { bubbles: true })

                  this._pokeCooldown[key] = 600;

                if (this._btnState[bi] < 1) this._btnState[bi] = 1;
              }
            }
          }

          // ── Apply zone highlights ───────────────────────────────────────────
          if (hs) {
            for (var zi2 = 0; zi2 < nZones; zi2++) {
              var zs = this._zoneState[zi2];
              if      (zs === 2) hs.setZoneHighlight(zi2, this._eContact);
              else if (zs === 1) hs.setZoneHighlight(zi2, this._eHover);

          for (var bi2 = 0; bi2 < nBtns; bi2++) {
            var bs = this._btnState[bi2];

            else if (bs === 1) this._setEmissive(this._buttons[bi2].el, this._eHover);
            else               this._setEmissive(this._buttons[bi2].el, this._eOff);
          }
        }
