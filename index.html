<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      // 1. STABLE ROTATION (From your working sample)
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          this.x_cord = 0; this.y_cord = 0;
          this.el.addEventListener('mousedown', (e) => {
            this.ifMouseDown = true;
            this.x_cord = e.clientX; this.y_cord = e.clientY;
          });
          window.addEventListener('mouseup', () => { this.ifMouseDown = false; });
          window.addEventListener('mousemove', (e) => {
            if (this.ifMouseDown) {
              var rotation = this.el.getAttribute('rotation');
              var deltaX = (e.clientX - this.x_cord) * 0.1;
              var deltaY = (e.clientY - this.y_cord) * 0.1;
              this.el.setAttribute('rotation', {
                x: Math.max(-60, Math.min(10, rotation.x + deltaY)),
                y: rotation.y + deltaX,
                z: 0
              });
              this.x_cord = e.clientX; this.y_cord = e.clientY;
            }
          });
        }
      });

      // 2. APP LOGIC
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          const folio = document.querySelector('#folio-object');
          const transcrText = document.querySelector('#transcr-text');
          const translText = document.querySelector('#transl-text');
          const muteBtn = document.querySelector('#mute-button');
          const muteLabel = document.querySelector('#mute-label');
          const soundEl = document.querySelector('#ambient-sound');
          
          let scaleState = 0;
          let isMuted = false;
          let currentPage = 1;

          const lat1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus . xi . annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes... Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";
          const eng1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. [King] James [IV] reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household... This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";
          const lat2 = "Quorum cateruis sic gloriose circumuallatus... Cui rex robertus cum paucis respectu multitudinis eius in domino confidens... cum dicto rege anglie mortale commisit bellum ac ipsum cum omni pompa sua et innumerabili potencia auxiliante altissimo cuius est victoriam dare... ubi comes glouernie et multi nobles anglie ceciderunt interfecti… alii fugati . alii capti . alii occisi… per captiuos enim non solum regina scocie cum suis liberati sunt... Ac eciam omnes alii in dicto bello existentes inestimabiliter sunt ditati.";
          const eng2 = "Surrounded so gloriously by his companies... he came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men... trusting in the Lord and taking strength in God... joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting... he turned to flight. There the Earl of Gloucester and many nobles of England fell slain…. Others were put to flight; others were captured; others were killed.";

          // Initial Load
          transcrText.setAttribute('value', lat1);
          translText.setAttribute('value', eng1);

          // SCALE
          document.querySelector('#scale-button').addEventListener('click', () => {
            scaleState = (scaleState + 1) % 3;
            const scales = ['1 1 1', '1.5 1.5 1.5', '0.6 0.6 0.6'];
            folio.setAttribute('scale', scales[scaleState]);
          });

          // MUTE (With Color Change)
          muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            if (isMuted) {
              soundEl.components.sound.pauseSound();
              muteLabel.setAttribute('value', 'UNMUTE');
              muteBtn.setAttribute('color', '#8B0000');
            } else {
              soundEl.components.sound.playSound();
              muteLabel.setAttribute('value', 'MUTE');
              muteBtn.setAttribute('color', '#FF4500');
            }
          });

          // SWAP
          document.querySelector('#swap-button').addEventListener('click', () => {
            currentPage = (currentPage === 1) ? 2 : 1;
            folio.setAttribute('src', (currentPage === 1) ? '#manuscript1' : '#manuscript2');
            transcrText.setAttribute('value', (currentPage === 1) ? lat1 : lat2);
            translText.setAttribute('value', (currentPage === 1) ? eng1 : eng2);
          });
          
          window.addEventListener('click', () => { if (soundEl.components.sound) soundEl.components.sound.playSound(); document.querySelector('#sound-ui').setAttribute('visible', 'false'); }, { once: true });
        }
      });
    </script>
  </head>

  <body>
    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="music-track" src="chant.mp3" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: starry; lighting: none;"></a-entity>
      <a-entity light="type: ambient; intensity: 0.4;"></a-entity>
      <a-entity light="type: point; intensity: 1.5; position: 0 2 -1; color: #ffcc77;"></a-entity>
      
      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.4;"></a-entity>
      <a-text id="sound-ui" value="CLICK TO START" position="0 2.2 -2" align="center" color="#FFD700" width="4"></a-text>

      <a-plane id="folio-object" class="clickable" drag-rotate src="#manuscript1"
               position="0 1.1 -1.5" rotation="-20 0 0" width="1.1" height="0.8"
               material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">
      </a-plane>

      <a-entity id="button-group" position="0.8 1.1 -1.4" rotation="0 -25 0">
          <a-sphere id="zoom-button" class="clickable" position="0 0.25 0" radius="0.045" color="#FFD700"><a-text value="ZOOM" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-sphere>
          <a-sphere id="mat-button" class="clickable" position="0 0.12 0" radius="0.045" color="#C0C0C0"><a-text value="MATERIAL" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-sphere>
          <a-sphere id="swap-button" class="clickable" position="0 0 0" radius="0.045" color="#cd7f32"><a-text value="SWAP" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-sphere>
          <a-sphere id="scale-button" class="clickable" position="0 -0.12 0" radius="0.045" color="#4CC3D9"><a-text value="SCALE" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-sphere>
          <a-box id="mute-button" class="clickable" position="0 -0.25 0" width="0.07" height="0.07" depth="0.07" color="#FF4500"><a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-box>
      </a-entity>

      <a-entity id="info-panel" position="-0.8 1.1 -1.2" rotation="0 25 0">
          <a-plane width="0.5" height="0.4" color="#111" opacity="0.9"></a-plane>
          <a-text value="MANUSCRIPT DATA\n\n1493 Edition\nHartmann Schedel" align="center" width="0.7" position="0 0 0.02" color="#FFD700"></a-text>
      </a-entity>

      <a-entity id="translation-panel" position="-1.5 1.1 -1.0" rotation="0 60 0">
          <a-plane width="0.9" height="1.6" color="#111" opacity="0.9"></a-plane>
          <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="0.9" position="0 0.7 0.02"></a-text>
          <a-text id="transl-text" color="white" align="left" width="0.8" position="-0.4 0 0.02" wrap-count="28"></a-text>
      </a-entity>

      <a-entity id="transcription-panel" position="-1.9 1.1 -0.5" rotation="0 105 0">
          <a-plane width="0.9" height="1.6" color="#111" opacity="0.9"></a-plane>
          <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="0.9" position="0 0.7 0.02"></a-text>
          <a-text id="transcr-text" color="white" align="left" width="0.8" position="-0.4 0 0.02" wrap-count="28"></a-text>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor id="cursor" raycaster="objects: .clickable" color="#FFD700" fuse="true" fuse-timeout="1500"
                  animation__fusing="property: scale; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500; startEvents: fusing;"
                  animation__reset="property: scale; to: 1 1 1; dur: 100; startEvents: mouseleave;">
        </a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
