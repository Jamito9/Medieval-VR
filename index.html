<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium - Immersive Cockpit Build</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script>
      /**
       * ============================================================
       * COMPONENT: LOOK AT USER
       * ============================================================
       * This component forces an entity to rotate its face toward the 
       * active camera. It is used here to create the 'imaginary line'
       * effect where text panels tilt dynamically to stay readable.
       */
      AFRAME.registerComponent('look-at-user', {
        tick: function () {
          const sceneEl = this.el.sceneEl;
          const cameraEl = sceneEl.camera ? sceneEl.camera.el : null;
          
          if (!cameraEl) return;
          // Target is the user's head position (camera rig)
          const targetPos = new THREE.Vector3();
          cameraEl.object3D.getWorldPosition(targetPos);
          // Rotate the panel to face the user on all axes continuously
          this.el.object3D.lookAt(targetPos.x, targetPos.y, targetPos.z);
        }
      });
      /**
       * ============================================================
       * COMPONENT: VR GRAB ROTATION
       * ============================================================
       * Enables VR controller users to rotate the folio by holding 
       * the trigger. Includes tilt clamping to prevent disorientation 
       * and hides the standard cursor to avoid double-inputs.
       */
      AFRAME.registerComponent('vr-grab-rotate', {
        init: function () {
          this.grabbing = false;
          // Hide desktop cursor in VR mode
          this.el.sceneEl.addEventListener('enter-vr', () => {
            this.isVR = true;
            const cursor = document.querySelector('#cursor');
            if(cursor) cursor.setAttribute('visible', false);
          });
          // Restore desktop cursor when exiting VR mode
          this.el.sceneEl.addEventListener('exit-vr', () => {
            this.isVR = false;
            const cursor = document.querySelector('#cursor');
            if(cursor) cursor.setAttribute('visible', true);
          });
          // Begin grab interaction
          this.el.addEventListener('mousedown', () => {
            if (this.isVR) this.grabbing = true;
          });
          // End grab interaction globally
          window.addEventListener('mouseup', () => {
            this.grabbing = false;
          });
        },
        tick: function () {
          if (!this.grabbing) return;
          let rot = this.el.getAttribute('rotation');
          let nextY = rot.y + 0.3;
          // Clamp the X rotation so the book doesn't flip completely upside down
          this.el.setAttribute('rotation', {
            x: Math.max(-80, Math.min(80, rot.x)),
            y: nextY,
            z: 0
          });
        }
      });
      /**
       * ============================================================
       * COMPONENT: PAGE CORNER TRIGGERS
       * ============================================================
       * Injects invisible clickable planes into the corners of the 
       * manuscript, allowing for intuitive page-flipping interactions 
       * by simply clicking the lower edges of the book.
       */
      AFRAME.registerComponent('page-corners', {
        init: function () {
          const folio = this.el;
          // Setup Left Corner Plane
          this.leftCorner = document.createElement('a-plane');
          this.leftCorner.setAttribute('position', '-0.5 -0.35 0.01');
          this.leftCorner.setAttribute('width', '0.2');
          this.leftCorner.setAttribute('height', '0.2');
          this.leftCorner.setAttribute('material', 'opacity: 0; transparent: true');
          this.leftCorner.classList.add('clickable');
          // Setup Right Corner Plane
          this.rightCorner = document.createElement('a-plane');
          this.rightCorner.setAttribute('position', '0.5 -0.35 0.01');
          this.rightCorner.setAttribute('width', '0.2');
          this.rightCorner.setAttribute('height', '0.2');
          this.rightCorner.setAttribute('material', 'opacity: 0; transparent: true');
          this.rightCorner.classList.add('clickable');
          // Append triggers to the main folio object
          folio.appendChild(this.leftCorner);
          folio.appendChild(this.rightCorner);
          // Route the corner click directly into the swap logic
          const triggerFlip = () => {
            const swapBtn = document.querySelector('#swap-button');
            if (swapBtn) swapBtn.click();
          };
          this.leftCorner.addEventListener('click', triggerFlip);
          this.rightCorner.addEventListener('click', triggerFlip);
        }
      });
      /**
       * ============================================================
       * COMPONENT: DRAG ROTATE (DESKTOP)
       * ============================================================
       * Uses movement deltas to allow the folio to be tilted and 
       * rotated even when the camera is zoomed in extremely close. 
       * Relying on absolute screen coordinates causes "freezing" 
       * during proximity zooms.
       */
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          
          this.el.addEventListener('mousedown', () => {
            this.ifMouseDown = true;
          });
          
          window.addEventListener('mouseup', () => { 
            this.ifMouseDown = false; 
          });
          
          window.addEventListener('mousemove', (e) => {
            if (this.ifMouseDown) {
              let rotation = this.el.getAttribute('rotation');
              
              // deltaX/Y ensures rotation works during near-field zoom
              let deltaX = (e.movementX !== undefined ? e.movementX : 0) * 0.15;
              let deltaY = (e.movementY !== undefined ? e.movementY : 0) * 0.15;
              // Apply the rotation with clamps on the X axis
              this.el.setAttribute('rotation', {
                x: Math.max(-80, Math.min(80, rotation.x + deltaY)),
                y: rotation.y + deltaX,
                z: 0
              });
            }
          });
        }
      });
      /**
       * ============================================================
       * COMPONENT: CANDLE FLICKER
       * ============================================================
       * Procedural lighting effect to simulate firelight on the page.
       * Adds to the immersive atmosphere of the scriptorium.
       */
      AFRAME.registerComponent('flicker', {
        tick: function () {
          // 20% chance every frame to change the light intensity slightly
          if (Math.random() > 0.8) {
            this.el.setAttribute('light', 'intensity', 1.0 + (Math.random() * 0.6));
          }
        }
      });
      /**
       * ============================================================
       * COMPONENT: SCRIPTORIUM LOGIC
       * ============================================================
       * The central engine for state, text data, and audio triggers.
       * Handles all button presses and coordinates the UI.
       */
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          // --- Element Selection ---
          const folio = document.querySelector('#folio-object');
          const zoomAnchor = document.querySelector('#zoom-anchor');
          const soundEl = document.querySelector('#ambient-sound');
          const clickSound = document.querySelector('#click-sound');
          const transcrText = document.querySelector('#transcr-text');
          const translText = document.querySelector('#transl-text');
          const muteBtn = document.querySelector('#mute-button');
          const muteLabel = document.querySelector('#mute-label');
          const hoverTooltip = document.querySelector('#hover-tooltip');
          
          // --- State Variables ---
          let zoomed = false; 
          let materialityMode = false;
          let currentPage = 1; 
          let isMuted = false;
          // --- Historical Text Content ---
          const lat1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus . xi . annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes... Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";
          const eng1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. [King] James [IV] reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household... This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";
          
          const lat2 = "Quorum cateruis sic gloriose circumuallatus... Cui rex robertus cum paucis respectu multitudinis eius in domino confidens... cum dicto rege anglie mortale commisit bellum ac ipsum cum omni pompa sua et innumerabili potencia auxiliante altissimo cuius est victoriam dare... ubi comes glouernie et multi nobles anglie ceciderunt interfecti… alii fugati . alii capti . alii occisi… per captiuos enim non solum regina scocie cum suis liberati sunt... Ac eciam omnes alii in dicto bello existentes inestimabiliter sunt ditati.";
          const eng2 = "Surrounded so gloriously by his companies... he came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men... trusting in the Lord and taking strength in God... joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting... he turned to flight. There the Earl of Gloucester and many nobles of England fell slain…. Others were put to flight; others were captured; others were killed.";
          // Populate initial text on load
          transcrText.setAttribute('value', lat1);
          translText.setAttribute('value', eng1);
          // --- Interaction Listeners ---
          // Generic Click Sound Listener (Applies to all UI elements)
          document.querySelectorAll('.clickable').forEach(el => {
            el.addEventListener('click', () => {
              if (clickSound && clickSound.components.sound) {
                // Ensure the click sound plays from the beginning on rapid clicks
                clickSound.components.sound.stopSound();
                clickSound.components.sound.playSound();
              }
            });
          });
          // Hover Interactivity for Tooltips
          folio.addEventListener('mouseenter', () => hoverTooltip.setAttribute('visible', 'true'));
          folio.addEventListener('mouseleave', () => hoverTooltip.setAttribute('visible', 'false'));
          // Zoom Toggle Logic
          document.querySelector('#zoom-button').addEventListener('click', () => {
            zoomed = !zoomed;
            zoomAnchor.setAttribute('animation', {
              property: 'position', 
              to: zoomed ? '0 1.5 -0.6' : '0 1.1 -1.4', 
              dur: 800,
              easing: 'easeInOutQuad'
            });
          });
          // Materiality Toggle Logic
          document.querySelector('#mat-button').addEventListener('click', () => {
            materialityMode = !materialityMode;
            folio.setAttribute('material', { 
              metalness: materialityMode ? 0.9 : 0.1, 
              roughness: materialityMode ? 0.1 : 0.8 
            });
          });
          // Swap Page Logic
          document.querySelector('#swap-button').addEventListener('click', () => {
            currentPage = (currentPage === 1) ? 2 : 1;
            folio.setAttribute('src', currentPage === 1 ? '#manuscript1' : '#manuscript2');
            document.querySelector('#hover-text').setAttribute('value', currentPage === 1 ? 'Liber Chronicarum' : 'Liber Pluscardensis');
            
            transcrText.setAttribute('value', currentPage === 1 ? lat1 : lat2);
            translText.setAttribute('value', currentPage === 1 ? eng1 : eng2);
            document.querySelector('#info-text').setAttribute(
              'value',
              currentPage === 1
                ? 'Liber Chronicarum, 1493,\nHartmann Schedel'
                : 'Liber Pluscardensis,\nbefore 1500'
            );
          });
          // Manual Scale Toggle Logic
          document.querySelector('#scale-button').addEventListener('click', () => {
            let s = folio.getAttribute('scale');
            let nextScale = s.x > 1.3 ? "0.7 0.7 0.7" : (s.x < 0.8 ? "1 1 1" : "1.5 1.5 1.5");
            folio.setAttribute('scale', nextScale);
          });
          // Audio Muting Logic
          muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            if (soundEl.components.sound) {
              isMuted ? soundEl.components.sound.pauseSound() : soundEl.components.sound.playSound();
            }
            muteBtn.setAttribute('color', isMuted ? '#8B0000' : '#FF4500'); 
            muteLabel.setAttribute('value', isMuted ? 'UNMUTE' : 'MUTE');
          });
          // First Interaction Global Audio Trigger (Bypasses Browser Auto-Play Blocks)
          window.addEventListener('click', () => { 
            if (soundEl.components.sound) soundEl.components.sound.playSound(); 
            document.querySelector('#sound-ui').setAttribute('visible', 'false'); 
          }, { once: true });
        }
      });
    </script>
  </head>
  <body>
    <a-scene 
      scriptorium-logic 
      renderer="antialias: true; colorManagement: true; logarithmicDepthBuffer: true;">
      
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="music-track" src="chant.mp3" preload="auto"></audio>
        <audio id="click-effect" src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3" preload="auto"></audio>
      </a-assets>
      <a-entity environment="preset: starry; lighting: none;"></a-entity>
      <a-entity light="type: ambient; intensity: 0.4;"></a-entity>
      
      <a-entity 
        id="ambient-sound" 
        sound="src: #music-track; loop: true; volume: 0.5;">
      </a-entity>
      <a-entity 
        id="click-sound" 
        sound="src: #click-effect; volume: 0.8; poolSize: 5;">
      </a-entity>
      
      <a-text 
        id="sound-ui" 
        value="CLICK TO START" 
        position="0 2.2 -2" 
        align="center" 
        color="#FFD700" 
        width="3">
      </a-text>
      <a-entity id="rig" position="0 0 0">
        <a-entity 
          camera 
          look-controls 
          wasd-controls 
          position="0 1.6 0">
          
          <a-cursor 
            id="cursor" 
            position="0 0 -0.4" 
            scale="0.4 0.4 0.4" 
            raycaster="objects: .clickable" 
            color="#FFD700"
            animation__fusing="property: scale; from: 0.4 0.4 0.4; to: 0.04 0.04 0.04; dur: 1500; startEvents: fusing;"
            animation__reset="property: scale; to: 0.4 0.4 0.4; dur: 500; startEvents: mouseleave;">
          </a-cursor>
        </a-entity>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 10;"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 10;"></a-entity>
      </a-entity>
      <a-entity id="zoom-anchor" position="0 1.1 -1.4">
          
          <a-plane 
            id="folio-object" 
            class="clickable" 
            drag-rotate 
            vr-grab-rotate 
            page-corners 
            src="#manuscript1"
            position="0 0 0" 
            rotation="0 0 0" 
            width="1.1" 
            height="0.8"
            material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">
              
              <a-entity 
                id="candle" 
                light="type: point; color: #ffcc77; intensity: 1.6; distance: 4;" 
                position="0 0.5 0.5" 
                flicker>
              </a-entity>
              <a-entity id="hover-tooltip" position="0 0.55 0.05" visible="false">
                  <a-plane width="0.8" height="0.15" color="black" opacity="0.8"></a-plane>
                  <a-text id="hover-text" value="Liber Chronicarum" color="white" align="center" width="0.8" position="0 0 0.01"></a-text>
              </a-entity>
          </a-plane>
          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -25 0">
              <a-sphere id="zoom-button" class="clickable" position="0 0.25 0" radius="0.04" color="#FFD700">
                <a-text value="ZOOM/RESET" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-sphere>
              <a-sphere id="mat-button" class="clickable" position="0 0.12 0" radius="0.04" color="#C0C0C0">
                <a-text value="MATERIAL" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-sphere>
              <a-sphere id="swap-button" class="clickable" position="0 0 0" radius="0.04" color="#cd7f32">
                <a-text value="SWAP PAGE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-sphere>
              <a-sphere id="scale-button" class="clickable" position="0 -0.12 0" radius="0.04" color="#4CC3D9">
                <a-text value="SCALE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-sphere>
              <a-box id="mute-button" class="clickable" position="0 -0.25 0" width="0.06" height="0.06" depth="0.06" color="#FF4500">
                  <a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-box>
          </a-entity>
          <a-entity id="info-panel" position="-0.9 0 0.1" rotation="0 35 0">
              <a-plane width="0.6" height="0.4" color="#111" opacity="0.9"></a-plane>
              <a-text id="info-text" value="Liber Chronicarum, 1493,\nHartmann Schedel" color="#FFD700" align="center" width="0.7" position="0 0 0.02"></a-text>
          </a-entity>
      </a-entity>
      <a-entity 
        id="translation-panel" 
        position="-1.4 1.5 -0.8" 
        look-at-user>
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>
          
          <a-text 
            id="transl-text" 
            color="white" 
            align="center" 
            width="1.05" 
            position="0 -0.15 0.02" 
            wrap-count="65">
          </a-text>
      </a-entity>
      <a-entity 
        id="transcription-panel" 
        position="-1.3 1.5 0.1" 
        look-at-user>
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>
          
          <a-text 
            id="transcr-text" 
            color="white" 
            align="center" 
            width="1.05" 
            position="0 -0.15 0.02" 
            wrap-count="65">
          </a-text>
      </a-entity>
    </a-scene>
  </body>
</html>
