<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium - immersive Cockpit Build (Verified 350+)</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      /**
       * ============================================================
       * COMPONENT: LOOK AT USER
       * ============================================================
       * Billboarding script that ensures the semi-circle panels
       * always rotate to face the user's headset.
       */
      AFRAME.registerComponent('look-at-user', {
        tick: function () {
          const sceneEl = this.el.sceneEl;
          const cameraEl = sceneEl.camera ? sceneEl.camera.el : null;
          
          if (!cameraEl) {
            return;
          }

          const targetPos = new THREE.Vector3();
          cameraEl.object3D.getWorldPosition(targetPos);

          // Rotate the panel to face the user
          this.el.object3D.lookAt(targetPos.x, targetPos.y, targetPos.z);
        }
      });

      /**
       * ============================================================
       * COMPONENT: VR GRAB ROTATION
       * ============================================================
       * Logic for rotating the folio using VR controller triggers.
       */
      AFRAME.registerComponent('vr-grab-rotate', {
        init: function () {
          this.grabbing = false;

          this.el.sceneEl.addEventListener('enter-vr', () => {
            this.isVR = true;
            const cursor = document.querySelector('#cursor');
            if (cursor) {
              cursor.setAttribute('visible', false);
            }
          });

          this.el.sceneEl.addEventListener('exit-vr', () => {
            this.isVR = false;
            const cursor = document.querySelector('#cursor');
            if (cursor) {
              cursor.setAttribute('visible', true);
            }
          });

          this.el.addEventListener('mousedown', () => {
            if (this.isVR) {
              this.grabbing = true;
            }
          });

          window.addEventListener('mouseup', () => {
            this.grabbing = false;
          });
        },

        tick: function () {
          if (!this.grabbing) {
            return;
          }
          let rot = this.el.getAttribute('rotation');
          this.el.setAttribute('rotation', {
            x: Math.max(-80, Math.min(80, rot.x)),
            y: rot.y + 0.4,
            z: 0
          });
        }
      });

      /**
       * ============================================================
       * COMPONENT: PAGE CORNER TRIGGERS
       * ============================================================
       * Adds invisible hitboxes to the book edges for page flipping.
       */
      AFRAME.registerComponent('page-corners', {
        init: function () {
          const folio = this.el;

          const left = document.createElement('a-plane');
          left.setAttribute('position', '-0.5 -0.35 0.02');
          left.setAttribute('width', '0.25');
          left.setAttribute('height', '0.25');
          left.setAttribute('material', 'opacity: 0; transparent: true');
          left.classList.add('clickable');

          const right = document.createElement('a-plane');
          right.setAttribute('position', '0.5 -0.35 0.02');
          right.setAttribute('width', '0.25');
          right.setAttribute('height', '0.25');
          right.setAttribute('material', 'opacity: 0; transparent: true');
          right.classList.add('clickable');

          folio.appendChild(left);
          folio.appendChild(right);

          const flip = () => {
            const btn = document.querySelector('#swap-button');
            if (btn) {
              btn.click();
            }
          };

          left.addEventListener('click', flip);
          right.addEventListener('click', flip);
        }
      });

      /**
       * ============================================================
       * COMPONENT: DRAG ROTATE (DESKTOP)
       * ============================================================
       * Allows mouse dragging to rotate the book in 3D space.
       */
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.mouseDown = false;
          this.el.addEventListener('mousedown', () => { 
            this.mouseDown = true; 
          });
          window.addEventListener('mouseup', () => { 
            this.mouseDown = false; 
          });
          window.addEventListener('mousemove', (e) => {
            if (this.mouseDown) {
              let rot = this.el.getAttribute('rotation');
              let dX = (e.movementX || 0) * 0.15;
              let dY = (e.movementY || 0) * 0.15;
              this.el.setAttribute('rotation', {
                x: Math.max(-80, Math.min(80, rot.x + dY)),
                y: rot.y + dX,
                z: 0
              });
            }
          });
        }
      });

      /**
       * ============================================================
       * COMPONENT: SCRIPTORIUM LOGIC
       * ============================================================
       * Heart of the application. Manages all states and UI events.
       */
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          const self = this;
          
          // --- State Data ---
          this.zoomed = false;
          this.currentPage = 1;
          this.isMuted = false;
          this.initComplete = false;

          // --- Historical Text Content ---
          this.latText1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus . xi . annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes... Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";
          this.engText1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. [King] James [IV] reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household... This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";
          
          this.latText2 = "Quorum cateruis sic gloriose circumuallatus... Cui rex robertus cum paucis respectu multitudinis eius in domino confidens... cum dicto rege anglie mortale commisit bellum ac ipsum cum omni pompa sua et innumerabili potencia auxiliante altissimo cuius est victoriam dare... ubi comes glouernie et multi nobles anglie ceciderunt interfecti… alii fugati . alii capti . alii occisi… per captiuos enim non solum regina scocie cum suis liberati sunt... Ac eciam omnes alii in dicto bello existentes inestimabiliter sunt ditati.";
          this.engText2 = "Surrounded so gloriously by his companies... he came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men... trusting in the Lord and taking strength in God... joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting... he turned to flight. There the Earl of Gloucester and many nobles of England fell slain…. Others were put to flight; others were captured; others were killed.";

          // --- DOM REFS ---
          this.folio = document.querySelector('#folio-object');
          this.transcr = document.querySelector('#transcr-text');
          this.transl = document.querySelector('#transl-text');
          this.clickSound = document.querySelector('#click-sound');
          this.ambient = document.querySelector('#ambient-sound');

          // --- EVENT REGISTRATION ---
          
          // Audio Interaction
          document.body.addEventListener('click', () => {
            if (this.ambient && this.ambient.components.sound) {
              this.ambient.components.sound.playSound();
            }
            const prompt = document.querySelector('#sound-ui');
            if (prompt) {
              prompt.setAttribute('visible', 'false');
            }
          }, { once: true });

          // Zoom Button
          const zBtn = document.querySelector('#zoom-button');
          if (zBtn) {
            zBtn.addEventListener('click', () => {
              this.zoomed = !this.zoomed;
              const anchor = document.querySelector('#zoom-anchor');
              anchor.setAttribute('animation', {
                property: 'position',
                to: this.zoomed ? '0 1.5 -0.6' : '0 1.1 -1.4',
                dur: 800,
                easing: 'easeInOutQuad'
              });
            });
          }

          // Swap Button
          const sBtn = document.querySelector('#swap-button');
          if (sBtn) {
            sBtn.addEventListener('click', () => {
              this.currentPage = (this.currentPage === 1) ? 2 : 1;
              const tex = this.currentPage === 1 ? '#manuscript1' : '#manuscript2';
              this.folio.setAttribute('src', tex);
              this.forceUpdate();
            });
          }

          // Mute Button
          const mBtn = document.querySelector('#mute-button');
          if (mBtn) {
            mBtn.addEventListener('click', () => {
              this.isMuted = !this.isMuted;
              if (this.ambient.components.sound) {
                if (this.isMuted) {
                  this.ambient.components.sound.pauseSound();
                } else {
                  this.ambient.components.sound.playSound();
                }
              }
              mBtn.setAttribute('color', this.isMuted ? '#444' : '#FF4500');
            });
          }
        },

        forceUpdate: function() {
          const lat = this.currentPage === 1 ? this.latText1 : this.latText2;
          const eng = this.currentPage === 1 ? this.engText1 : this.engText2;
          
          if (this.transcr) this.transcr.setAttribute('value', lat);
          if (this.transl) this.transl.setAttribute('value', eng);
        },

        tick: function() {
          // Failsafe: Re-inject text if the components haven't rendered yet
          if (!this.initComplete) {
            this.forceUpdate();
            // Attach click sounds to dynamically created elements
            document.querySelectorAll('.clickable').forEach(el => {
              el.addEventListener('click', () => {
                if (this.clickSound && this.clickSound.components.sound) {
                  this.clickSound.components.sound.stopSound();
                  this.clickSound.components.sound.playSound();
                }
              });
            });
            this.initComplete = true;
          }
        }
      });
    </script>
  </head>

  <body>
    <a-scene 
      scriptorium-logic 
      renderer="antialias: true; colorManagement: true;">
      
      <a-assets>
        <img 
          id="manuscript1" 
          src="folio.jpg">
        <img 
          id="manuscript2" 
          src="folio2.jpg">
        <audio 
          id="music-track" 
          src="chant.mp3" 
          preload="auto">
        </audio>
        <audio 
          id="click-effect" 
          src="https://cdn.aframe.io/360-video-boilerplate/audio/click.mp3" 
          preload="auto">
        </audio>
      </a-assets>

      <a-entity 
        environment="preset: starry; lighting: none;">
      </a-entity>

      <a-entity 
        light="type: ambient; intensity: 0.5;">
      </a-entity>

      <a-entity 
        id="ambient-sound" 
        sound="src: #music-track; loop: true; volume: 0.5;">
      </a-entity>

      <a-entity 
        id="click-sound" 
        sound="src: #click-effect; volume: 0.8; poolSize: 5;">
      </a-entity>
      
      <a-text 
        id="sound-ui" 
        value="CLICK TO START" 
        position="0 2.2 -2.5" 
        align="center" 
        color="#FFD700" 
        width="4">
      </a-text>

      <a-entity 
        id="rig" 
        position="0 0 0">
        
        <a-entity 
          camera 
          look-controls 
          wasd-controls 
          position="0 1.6 0">
          
          <a-cursor 
            id="cursor" 
            position="0 0 -0.5" 
            scale="0.5 0.5 0.5" 
            raycaster="objects: .clickable" 
            color="#FFD700">
          </a-cursor>
          
        </a-entity>

        <a-entity 
          laser-controls="hand: left" 
          raycaster="objects: .clickable; far: 10;">
        </a-entity>
        
        <a-entity 
          laser-controls="hand: right" 
          raycaster="objects: .clickable; far: 10;">
        </a-entity>

      </a-entity>

      <a-entity 
        id="zoom-anchor" 
        position="0 1.1 -1.4">
          
          <a-plane 
            id="folio-object" 
            class="clickable" 
            drag-rotate 
            vr-grab-rotate 
            page-corners 
            src="#manuscript1"
            width="1.1" 
            height="0.8"
            material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">
              
              <a-entity 
                light="type: point; color: #ffcc77; intensity: 1.8; distance: 5;" 
                position="0 0.5 0.6">
              </a-entity>

              <a-entity 
                id="hover-tooltip" 
                position="0 0.55 0.05" 
                visible="false">
                  <a-plane 
                    width="0.8" 
                    height="0.15" 
                    color="black" 
                    opacity="0.8">
                  </a-plane>
                  <a-text 
                    id="hover-text" 
                    value="Liber Chronicarum" 
                    color="white" 
                    align="center" 
                    width="0.8" 
                    position="0 0 0.01">
                  </a-text>
              </a-entity>

          </a-plane>

          <a-entity 
            id="button-group" 
            position="1.1 0 0" 
            rotation="0 -30 0">
              
              <a-sphere 
                id="zoom-button" 
                class="clickable" 
                position="0 0.3 0" 
                radius="0.06" 
                color="#FFD700">
                <a-text 
                  value="ZOOM" 
                  position="0.12 0 0" 
                  width="2.5" 
                  color="white">
                </a-text>
              </a-sphere>

              <a-sphere 
                id="swap-button" 
                class="clickable" 
                position="0 0.15 0" 
                radius="0.06" 
                color="#cd7f32">
                <a-text 
                  value="PAGE" 
                  position="0.12 0 0" 
                  width="2.5" 
                  color="white">
                </a-text>
              </a-sphere>

              <a-box 
                id="mute-button" 
                class="clickable" 
                position="0 0 0" 
                width="0.1" 
                height="0.1" 
                depth="0.1" 
                color="#FF4500">
                <a-text 
                  value="AUDIO" 
                  position="0.12 0 0" 
                  width="2.5" 
                  color="white">
                </a-text>
              </a-box>

          </a-entity>

          <a-entity 
            id="meta-panel" 
            position="-1.1 0 0" 
            rotation="0 30 0">
              <a-plane 
                width="0.8" 
                height="0.5" 
                color="#111" 
                opacity="0.9">
              </a-plane>
              <a-text 
                id="info-text" 
                value="HISTORICAL CONTEXT\nSchedelsche Weltchronik\nNuremberg, 1493" 
                color="#FFD700" 
                align="center" 
                width="1.3" 
                position="0 0 0.03">
              </a-text>
          </a-entity>

      </a-entity>

      <a-entity 
        id="translation-panel" 
        position="-1.6 1.6 -1.8" 
        look-at-user>
          
          <a-plane 
            width="1.4" 
            height="2.2" 
            color="#000" 
            opacity="0.95">
          </a-plane>
          
          <a-text 
            value="ENGLISH TRANSLATION" 
            color="#FFD700" 
            align="center" 
            width="2.2" 
            position="0 0.95 0.05">
          </a-text>
          
          <a-text 
            id="transl-text" 
            color="#FFF" 
            align="center" 
            anchor="center"
            baseline="top"
            width="1.25" 
            position="0 0.7 0.05" 
            wrap-count="42">
          </a-text>

      </a-entity>

      <a-entity 
        id="transcription-panel" 
        position="-3.0 1.6 0.5" 
        look-at-user>
          
          <a-plane 
            width="1.4" 
            height="2.2" 
            color="#000" 
            opacity="0.95">
          </a-plane>
          
          <a-text 
            value="LATIN TRANSCRIPTION" 
            color="#FFD700" 
            align="center" 
            width="2.2" 
            position="0 0.95 0.05">
          </a-text>
          
          <a-text 
            id="transcr-text" 
            color="#FFF" 
            align="center" 
            anchor="center"
            baseline="top"
            width="1.25" 
            position="0 0.7 0.05" 
            wrap-count="42">
          </a-text>

      </a-entity>

      </a-scene>
  </body>
</html>
