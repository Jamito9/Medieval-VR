<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium - 360 Immersive</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          this.x_cord = 0; this.y_cord = 0;
          this.el.addEventListener('mousedown', (e) => {
            this.ifMouseDown = true;
            this.x_cord = e.clientX; this.y_cord = e.clientY;
          });
          window.addEventListener('mouseup', () => { this.ifMouseDown = false; });
          window.addEventListener('mousemove', (e) => {
            if (this.ifMouseDown) {
              var rotation = this.el.getAttribute('rotation');
              // Restored X and Y axis tilting/rotating
              this.el.setAttribute('rotation', {
                x: Math.max(-45, Math.min(45, rotation.x + (e.clientY - this.y_cord) * 0.2)),
                y: rotation.y + (e.clientX - this.x_cord) * 0.2,
                z: rotation.z
              });
              this.x_cord = e.clientX; this.y_cord = e.clientY;
            }
          });
        }
      });

      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          const wrapper = document.querySelector('#manuscript-wrapper');
          const folio = document.querySelector('#folio-object');
          const ambientSound = document.querySelector('#ambient-sound');
          const clickSound = document.querySelector('#click-sound-el');
          
          const infoPanel = document.querySelector('#info-panel');
          const transcrPanel = document.querySelector('#transcription-panel');
          const translPanel = document.querySelector('#translation-panel');
          const btnGroup = document.querySelector('#button-group');
          
          const infoText = document.querySelector('#info-text');
          const transcrText = document.querySelector('#transcr-text');
          const translText = document.querySelector('#transl-text');
          const muteLabel = document.querySelector('#mute-label');
         
          let zoomed = false; let materialityMode = false;
          let currentPage = 1; let scaleState = 0; let isMuted = false;

          const lat1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis...";
          const eng1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours...";

          const lat2 = "Quorum cateruis sic gloriose circumuallatus... Cui rex robertus cum paucis respectu multitudinis eius in domino confidens... joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting... he turned to flight.";
          const eng2 = "Surrounded so gloriously by his companies... he came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men... trusting in the Lord and taking strength in God...";

          // INITIAL TEXT POPULATION
          transcrText.setAttribute('value', lat1);
          translText.setAttribute('value', eng1);
          infoText.setAttribute('value', 'Liber Chronicarum\n1493\nHartmann Schedel');

          const playClick = () => { if (clickSound.components.sound) clickSound.components.sound.playSound(); };

          // SCALE LOGIC (Updated for thinner panels)
          document.querySelector('#scale-button').addEventListener('click', () => {
            playClick();
            scaleState = (scaleState + 1) % 3;
            const scales = ['1 1 1', '1.4 1.4 1.4', '0.7 0.7 0.7'];
            folio.setAttribute('animation__scale', {property: 'scale', to: scales[scaleState], dur: 500});
          });

          document.querySelector('#swap-button').addEventListener('click', () => {
            playClick();
            currentPage = (currentPage === 1) ? 2 : 1;
            if (currentPage === 1) {
              folio.setAttribute('src', '#manuscript1');
              infoText.setAttribute('value', 'Liber Chronicarum\n1493\nHartmann Schedel');
              transcrText.setAttribute('value', lat1);
              translText.setAttribute('value', eng1);
            } else {
              folio.setAttribute('src', '#manuscript2');
              infoText.setAttribute('value', 'Liber Pluscardensis\nBefore 1500');
              transcrText.setAttribute('value', lat2);
              translText.setAttribute('value', eng2);
            }
          });

          document.querySelector('#zoom-button').addEventListener('click', () => { playClick(); zoomed = !zoomed; wrapper.setAttribute('animation', {property: 'position', to: zoomed ? '0 1.5 -0.6' : '0 1.1 -1.4', dur: 800}); });
          document.querySelector('#mat-button').addEventListener('click', () => { playClick(); materialityMode = !materialityMode; folio.setAttribute('material', {metalness: materialityMode ? 0.9 : 0.1, roughness: materialityMode ? 0.1 : 0.8}); });
          document.querySelector('#mute-button').addEventListener('click', () => {
            playClick();
            isMuted = !isMuted;
            if (isMuted) { ambientSound.components.sound.pauseSound(); muteLabel.setAttribute('value', 'UNMUTE'); } 
            else { ambientSound.components.sound.playSound(); muteLabel.setAttribute('value', 'MUTE'); }
          });

          window.addEventListener('click', () => { if (ambientSound.components.sound) ambientSound.components.sound.playSound(); document.querySelector('#sound-ui').setAttribute('visible', 'false'); }, { once: true });
        }
      });
    </script>
  </head>

  <body>
    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="music-track" src="chant.mp3" preload="auto"></audio>
        <audio id="click-asset" src="click.mp3" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: starry; lighting: none;"></a-entity>
      <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.4;"></a-entity>
      <a-entity id="click-sound-el" sound="src: #click-asset; volume: 0.4; poolSize: 5;"></a-entity>
      
      <a-text id="sound-ui" value="CLICK TO START" position="0 2.2 -2" align="center" color="#FFD700" width="4"></a-text>

      <a-entity id="manuscript-wrapper" position="0 1.1 -1.4" rotation="-10 0 0">
          
          <a-plane id="folio-object" class="clickable" drag-rotate src="#manuscript1" width="1.1" height="0.8" position="0 0 0">
              <a-entity light="type: point; color: #ffcc77; intensity: 1.5; distance: 3;" position="0 0 0.4"></a-entity>
          </a-plane>

          <a-entity id="button-group" position="0.75 0 0.1" rotation="0 -30 0">
              <a-sphere id="zoom-button" class="clickable" position="0 0.25 0" radius="0.045" color="#FFD700"><a-text value="ZOOM" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-sphere>
              <a-sphere id="mat-button" class="clickable" position="0 0.12 0" radius="0.045" color="#C0C0C0"><a-text value="MATERIAL" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-sphere>
              <a-sphere id="swap-button" class="clickable" position="0 0 0" radius="0.045" color="#cd7f32"><a-text value="SWAP PAGE" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-sphere>
              <a-sphere id="scale-button" class="clickable" position="0 -0.12 0" radius="0.045" color="#4CC3D9"><a-text value="SCALE" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-sphere>
              <a-box id="mute-button" class="clickable" position="0 -0.25 0" width="0.07" height="0.07" depth="0.07" color="#FF4500"><a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.25 0.25 0.25"></a-text></a-box>
          </a-entity>

          <a-entity id="info-panel" class="clickable" position="-0.85 0 0.15" rotation="0 25 0">
              <a-plane width="0.7" height="0.6" color="#111" opacity="0.9"></a-plane>
              <a-text id="info-text" color="#FFD700" align="center" width="0.8" position="0 0 0.03"></a-text>
          </a-entity>

          <a-entity id="translation-panel" class="clickable" position="-1.4 0 0.7" rotation="0 65 0">
              <a-plane width="0.9" height="1.8" color="#111" opacity="0.9"></a-plane>
              <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="0.9" position="0 0.8 0.03"></a-text>
              <a-text id="transl-text" color="#FFFFFF" align="left" width="0.8" position="-0.4 0 0.03" wrap-count="28"></a-text>
          </a-entity>

          <a-entity id="transcription-panel" class="clickable" position="-1.8 0 1.6" rotation="0 110 0">
              <a-plane width="0.9" height="1.8" color="#111" opacity="0.9"></a-plane>
              <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="0.9" position="0 0.8 0.03"></a-text>
              <a-text id="transcr-text" color="#FFFFFF" align="left" width="0.8" position="-0.4 0 0.03" wrap-count="28"></a-text>
          </a-entity>

      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor position="0 0 -0.7" raycaster="objects: .clickable" color="#FFD700" fuse="true" fuse-timeout="1500"></a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
