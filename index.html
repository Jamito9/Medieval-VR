<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval VR - Dynamic Controls Fixed</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      // 1. The Bulletproof Logic Wrapper
      // This ensures the scene is fully loaded before attaching button clicks
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          var folio = document.querySelector('#folio-object');
          var info = document.querySelector('#info-panel');
          var btns = document.querySelector('#button-group');
          var folioText = document.querySelector('#folio-text');
          var desk = document.querySelector('#desk');
          
          var zoomed = false;
          var materialityMode = false;
          var currentPage = 1;
          var scaleState = 0; 
          var audioStarted = false;

          // Safe audio starter
          function startAudio() {
            if (!audioStarted && desk.components.sound) {
              desk.components.sound.playSound();
              audioStarted = true;
            }
          }

          // Zoom Logic
          document.querySelector('#zoom-button').addEventListener('click', function () {
            startAudio();
            if (!zoomed) {
              folio.setAttribute('animation', {property: 'position', to: '0 1.3 -0.7', dur: 1000, easing: 'easeInOutQuad'});
              folio.setAttribute('animation__rot', {property: 'rotation', to: '0 0 0', dur: 1000, easing: 'easeInOutQuad'});
              btns.setAttribute('animation', {property: 'position', to: '1.2 0 -0.6', dur: 1000, easing: 'easeInOutQuad'});
              info.setAttribute('visible', 'true');
              this.setAttribute('color', '#AA0000'); 
              zoomed = true;
            } else {
              folio.setAttribute('animation', {property: 'position', to: '0 0.95 -1.5', dur: 1000, easing: 'easeInOutQuad'});
              folio.setAttribute('animation__rot', {property: 'rotation', to: '-25 0 0', dur: 1000, easing: 'easeInOutQuad'});
              btns.setAttribute('animation', {property: 'position', to: '0.9 0 -1.2', dur: 1000, easing: 'easeInOutQuad'});
              info.setAttribute('visible', 'false');
              this.setAttribute('color', '#FFD700'); 
              zoomed = false;
            }
          });

          // Materiality Logic
          document.querySelector('#mat-button').addEventListener('click', function () {
            startAudio();
            if (!materialityMode) {
              folio.setAttribute('material', {color: '#888', metalness: 0.8, roughness: 0.2});
              this.setAttribute('color', '#333');
              materialityMode = true;
            } else {
              folio.setAttribute('material', {color: '#FFF', metalness: 0.3, roughness: 0.5});
              this.setAttribute('color', '#C0C0C0');
              materialityMode = false;
            }
          });

          // Swap Logic
          document.querySelector('#swap-button').addEventListener('click', function () {
            startAudio();
            if (currentPage === 1) {
              folio.setAttribute('src', '#manuscript2');
              folioText.setAttribute('value', 'Liber Pluscardensis\n\n- GOLD: Zoom View\n- SILVER: Surface Analysis\n- BRONZE: Toggle Page\n- BLUE: Change Scale');
              currentPage = 2;
            } else {
              folio.setAttribute('src', '#manuscript1');
              folioText.setAttribute('value', 'Liber Chronicarum\n\n- GOLD: Zoom View\n- SILVER: Surface Analysis\n- BRONZE: Toggle Page\n- BLUE: Change Scale');
              currentPage = 1;
            }
          });

          // Scale Logic
          document.querySelector('#scale-button').addEventListener('click', function () {
            startAudio();
            scaleState = (scaleState + 1) % 3;
            if (scaleState === 0) {
              folio.setAttribute('scale', '1 1 1'); 
              this.setAttribute('color', '#4CC3D9');
            } else if (scaleState === 1) {
              folio.setAttribute('scale', '1.8 1.8 1.8'); 
              this.setAttribute('color', '#0000FF');
            } else {
              folio.setAttribute('scale', '0.6 0.6 0.6'); 
              this.setAttribute('color', '#ADD8E6');
            }
          });
        }
      });

      // 2. Candle Flicker Component (Cleaner way to do lighting)
      AFRAME.registerComponent('flicker', {
        tick: function () {
          if (Math.random() > 0.8) {
            this.el.setAttribute('light', 'intensity', 2.2 + (Math.random() * 0.5));
          }
        }
      });
    </script>
  </head>

  <body>
    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true; shadowMapEnabled: true;">
      
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="chant" src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Gregorian_Chant.ogg" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: library; lighting: none; groundColor: #1a1a1a; grid: none;"></a-entity>
      <a-circle position="0 0.01 0" radius="10" rotation="-90 0 0" color="#222" 
                material="src: url(https://cdn.aframe.io/a-painter/images/floor.jpg); repeat: 20 20;"></a-circle>

      <a-box id="desk" position="0 0.8 -1.5" width="2" height="0.1" depth="1.2" color="#2b1d14"
             sound="src: #chant; loop: true; volume: 0.8; rolloffFactor: 2;"></a-box>

      <a-plane id="folio-object" 
               src="#manuscript1" 
               position="0 0.95 -1.5" 
               rotation="-25 0 0" 
               width="1.2" 
               height="0.85" 
               material="shader: standard; metalness: 0.3; roughness: 0.5;">
      </a-plane>

      <a-entity id="info-panel" position="-1.2 1.3 -0.7" visible="false">
          <a-plane width="0.85" height="0.7" color="#111" opacity="0.95"></a-plane>
          <a-text id="folio-text" 
                  value="Liber Chronicarum\n\n- GOLD: Zoom View\n- SILVER: Surface Analysis\n- BRONZE: Toggle Page\n- BLUE: Change Scale" 
                  color="white" align="center" width="0.7" position="0 0 0.02"></a-text>
      </a-entity>

      <a-entity id="button-group" position="0.9 0 -1.2">
          <a-sphere id="zoom-button" class="clickable" position="0 1.15 0" radius="0.04" color="#FFD700">
            <a-text value="ZOOM" align="center" position="0 0.1 0" scale="0.2 0.2 0.2" color="white"></a-text>
          </a-sphere>
          <a-sphere id="mat-button" class="clickable" position="0 1.05 0" radius="0.04" color="#C0C0C0">
            <a-text value="MAT" align="center" position="0 0.1 0" scale="0.2 0.2 0.2" color="white"></a-text>
          </a-sphere>
          <a-sphere id="swap-button" class="clickable" position="0 0.95 0" radius="0.04" color="#cd7f32">
            <a-text value="PAGE" align="center" position="0 0.1 0" scale="0.2 0.2 0.2" color="white"></a-text>
          </a-sphere>
          <a-sphere id="scale-button" class="clickable" position="0 0.85 0" radius="0.04" color="#4CC3D9">
            <a-text value="SCALE" align="center" position="0 0.1 0" scale="0.2 0.2 0.2" color="white"></a-text>
          </a-sphere>
      </a-entity>

      <a-entity id="candle" light="type: point; color: #ffcc77; intensity: 2.5; castShadow: true;" position="1.5 2 -0.5" flicker></a-entity>
      <a-entity light="type: ambient; color: #112; intensity: 0.5;"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor id="cursor" raycaster="objects: .clickable" color="#FFD700" fuse="true" fuse-timeout="1500"
                  animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                  animation__mouseleave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 100">
        </a-cursor>
      </a-entity>
      
      <a-entity oculus-touch-controls="hand: left"></a-entity>
      <a-entity oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .clickable; far: 10;"></a-entity>

    </a-scene>
  </body>
</html>
