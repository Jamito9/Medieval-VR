<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium - Updated Layout</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      // === VR GRAB ROTATION (CLAMPED & SMOOTHED) ===
      AFRAME.registerComponent('vr-grab-rotate', {
        init: function () {
          this.grabbing = false;

          this.el.sceneEl.addEventListener('enter-vr', () => {
            this.isVR = true;
            const cursor = document.querySelector('#cursor');
            if (cursor) cursor.setAttribute('visible', false);
          });

          this.el.sceneEl.addEventListener('exit-vr', () => {
            this.isVR = false;
            const cursor = document.querySelector('#cursor');
            if (cursor) cursor.setAttribute('visible', true);
          });

          this.el.addEventListener('mousedown', () => {
            if (this.isVR) this.grabbing = true;
          });

          window.addEventListener('mouseup', () => {
            this.grabbing = false;
          });
        },

        tick: function () {
          if (!this.grabbing) return;
          let rot = this.el.getAttribute('rotation');
          let nextY = rot.y + 0.3;

          this.el.setAttribute('rotation', {
            x: Math.max(-80, Math.min(80, rot.x)),
            y: Math.max(-80, Math.min(80, nextY)),
            z: 0
          });
        }
      });

      // === DESKTOP/GAZE TILT COMPONENT (CLAMPED) ===
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          
          this.el.addEventListener('mousedown', () => {
            this.ifMouseDown = true;
          });
          
          window.addEventListener('mouseup', () => { 
            this.ifMouseDown = false; 
          });
          
          window.addEventListener('mousemove', (e) => {
            if (this.ifMouseDown) {
              let rotation = this.el.getAttribute('rotation');
              let deltaX = (e.movementX !== undefined ? e.movementX : 0) * 0.15;
              let deltaY = (e.movementY !== undefined ? e.movementY : 0) * 0.15;

              this.el.setAttribute('rotation', {
                x: Math.max(-80, Math.min(80, rotation.x + deltaY)),
                y: Math.max(-80, Math.min(80, rotation.y + deltaX)),
                z: 0
              });
            }
          });
        }
      });

      // === CANDLE FLICKER ===
      AFRAME.registerComponent('flicker', {
        tick: function () {
          if (Math.random() > 0.8) {
            this.el.setAttribute('light', 'intensity', 1.0 + (Math.random() * 0.5));
          }
        }
      });

      // === MAIN SCRIPTORIUM LOGIC ===
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          const folio = document.querySelector('#folio-object');
          const zoomAnchor = document.querySelector('#zoom-anchor');
          const soundEl = document.querySelector('#ambient-sound');
          const transcrText = document.querySelector('#transcr-text');
          const translText = document.querySelector('#transl-text');
          const muteBtn = document.querySelector('#mute-button');
          const muteLabel = document.querySelector('#mute-label');
          
          let zoomed = false; let materialityMode = false;
          let currentPage = 1; let isMuted = false;

          // Full texts designed to fill the panels (Latin Transcription & English Translation)
          const latText = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus . xi . annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes... Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";
          
          const engText = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. [King] James [IV] reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household... This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";

          transcrText.setAttribute('value', latText);
          translText.setAttribute('value', engText);

          // Buttons
          document.querySelector('#zoom-button').addEventListener('click', () => {
            zoomed = !zoomed;
            zoomAnchor.setAttribute('animation', {
              property: 'position', 
              to: zoomed ? '0 1.5 -0.6' : '0 1.1 -1.4', 
              dur: 800,
              easing: 'easeInOutQuad'
            });
          });

          document.querySelector('#mat-button').addEventListener('click', () => {
            materialityMode = !materialityMode;
            folio.setAttribute('material', { metalness: materialityMode ? 0.9 : 0.1, roughness: materialityMode ? 0.1 : 0.8 });
          });

          // (Scaling and swapping pages logic can be added here if needed for those buttons)

          muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            soundEl.components.sound[isMuted ? 'pauseSound' : 'playSound']();
            muteBtn.setAttribute('color', isMuted ? '#8B0000' : '#FF4500'); 
            muteLabel.setAttribute('value', isMuted ? 'UNMUTE' : 'MUTE');
          });

          // Handle sound start
          window.addEventListener('click', () => { 
            if (soundEl.components.sound) soundEl.components.sound.playSound(); 
            const soundUi = document.querySelector('#sound-ui');
            if (soundUi) soundUi.setAttribute('visible', 'false'); 
          }, { once: true });
        }
      });
    </script>
  </head>

  <body>
    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <img id="manuscript-img" src="manuscript_image.jpg"> <audio id="music-track" src="ambient_chant.mp3" preload="auto"></audio> </a-assets>

      <a-entity environment="preset: starry; lighting: none;"></a-entity>
      <a-entity light="type: ambient; intensity: 0.4;"></a-entity>
      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.5;"></a-entity>
      <a-text id="sound-ui" value="CLICK TO START" position="0 2.2 -2" align="center" color="#FFD700" width="3"></a-text>

      <a-entity id="rig">
        <a-entity camera look-controls wasd-controls position="0 1.6 0">
          <a-cursor id="cursor" position="0 0 -0.4" scale="0.4 0.4 0.4" raycaster="objects: .clickable" color="#FFD700"
                    animation__fusing="property: scale; from: 0.4 0.4 0.4; to: 0.04 0.04 0.04; dur: 1500; startEvents: fusing;"
                    animation__reset="property: scale; to: 0.4 0.4 0.4; dur: 500; startEvents: mouseleave;">
          </a-cursor>
        </a-entity>
        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 10;"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 10;"></a-entity>
      </a-entity>

      <a-entity id="zoom-anchor" position="0 1.1 -1.4">
          
          <a-plane id="folio-object" class="clickable" drag-rotate vr-grab-rotate src="#manuscript-img"
                   position="0 0 0" rotation="0 0 0" width="1.1" height="0.8"
                   material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">
              
              <a-entity id="candle" light="type: point; color: #ffcc77; intensity: 1.6; distance: 4;" position="0 0.5 0.5" flicker></a-entity>

              <a-text value="Liber Chronicarum" position="0.58 0.38 0.01" rotation="0 0 -90" color="#333" align="center" width="1.2" font="monoid"></a-text>
          </a-plane>

          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -25 0">
              <a-sphere id="zoom-button" class="clickable" position="0 0.25 0" radius="0.04" color="#FFD700"><a-text value="ZOOM/RESET" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="mat-button" class="clickable" position="0 0.12 0" radius="0.04" color="#C0C0C0"><a-text value="MATERIAL" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="swap-button" class="clickable" position="0 0 0" radius="0.04" color="#cd7f32"><a-text value="SWAP PAGE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="scale-button" class="clickable" position="0 -0.12 0" radius="0.04" color="#4CC3D9"><a-text value="SCALE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-box id="mute-button" class="clickable" position="0 -0.25 0" width="0.06" height="0.06" depth="0.06" color="#FF4500">
                  <a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-box>
          </a-entity>
      </a-entity>

      <a-entity id="latin-panel" position="-0.75 1.1 -0.4" rotation="0 35 0">
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="1.0" position="0 0.8 0.02"></a-text>
          <a-text id="transcr-text" color="white" align="center" width="0.95" position="0 -0.1 0.02" wrap-count="30"></a-text>
      </a-entity>

      <a-entity id="english-panel" position="-1.7 1.1 0.25" rotation="0 80 0">
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="1.0" position="0 0.8 0.02"></a-text>
          <a-text id="transl-text" color="white" align="center" width="0.95" position="0 -0.1 0.02" wrap-count="30"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
