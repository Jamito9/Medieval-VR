<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Medieval Manuscript VR Experience</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <audio id="chant" src="chant.mp3" preload="auto" loop="true"></audio>
        
        <img id="page1" src="page1.jpg">
        <img id="page2" src="page2.jpg">
      </a-assets>

      <a-entity id="manuscript-group" position="0 1.5 -1.2">

        <a-entity id="manuscript-audio" sound="src: #chant; autoplay: true; loop: true; volume: 0.6"></a-entity>

        <a-plane id="manuscript-folio" 
                 class="clickable"
                 width="0.8" height="1.1" 
                 src="#page1" 
                 material="shader: standard; roughness: 1.0; metalness: 0.0"
                 animation__zoom="property: position; from: 0 0 0; to: 0 0 0.5; dur: 600; startEvents: click-zoom; easing: easeOutQuad"
                 animation__scale="property: scale; from: 1 1 1; to: 1.6 1.6 1.6; dur: 600; startEvents: click-scale; easing: easeOutBack">
        </a-plane>

        <a-entity id="info-panel" position="-1.1 0 0.1" rotation="0 20 0">
          <a-plane width="0.9" height="0.7" color="#111" opacity="0.85"></a-plane>
          <a-text id="manuscript-text-data" 
                  value="MANUSCRIPT DATA\n\nTitle: Medieval Work\nFolio: 1r\n\nInstructions:\n- Use buttons to explore.\n- Toggle 'Material' to see vellum texture.\n- Mute/Unmute audio via the cube." 
                  color="white" align="center" width="0.75" position="0 0 0.03">
          </a-text>
        </a-entity>

        <a-entity id="button-group" position="0.85 0 0.1" rotation="0 -20 0">
          
          <a-sphere id="zoom-button" class="clickable" position="0 0.35 0" radius="0.045" color="#FFD700">
            <a-text value="ZOOM" align="left" position="0.08 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-sphere>
          
          <a-sphere id="mat-button" class="clickable" position="0 0.20 0" radius="0.045" color="#C0C0C0">
            <a-text value="MATERIAL" align="left" position="0.08 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-sphere>
          
          <a-sphere id="swap-button" class="clickable" position="0 0.05 0" radius="0.045" color="#cd7f32">
            <a-text value="SWAP PAGE" align="left" position="0.08 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-sphere>

          <a-sphere id="scale-button" class="clickable" position="0 -0.10 0" radius="0.045" color="#4CC3D9">
            <a-text value="SCALE" align="left" position="0.08 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-sphere>

          <a-box id="mute-button" class="clickable" position="0 -0.28 0" width="0.08" height="0.08" depth="0.08" color="#FF4500">
            <a-text value="MUTE CHANT" align="left" position="0.08 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-box>

        </a-entity>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor id="cursor" 
                  raycaster="objects: .clickable" 
                  color="#FFD700" 
                  fuse="true" 
                  fuse-timeout="1500"
                  animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                  animation__mouseleave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 100">
        </a-cursor>
      </a-entity>

      <a-sky color="#050505"></a-sky>

    </a-scene>

    <script>
      // DOM Elements
      const folio = document.querySelector('#manuscript-folio');
      const audioEl = document.querySelector('#manuscript-audio');
      const muteBtn = document.querySelector('#mute-button');
      const muteText = muteBtn.querySelector('a-text');

      // State Variables
      let isMuted = false;
      let isGlossy = false;
      let pageNum = 1;
      let zoomActive = false;
      let scaleActive = false;

      // --- MUTE LOGIC ---
      muteBtn.addEventListener('click', function () {
          isMuted = !isMuted;
          if (isMuted) {
              audioEl.components.sound.pauseSound();
              muteBtn.setAttribute('color', '#8B0000');
              muteText.setAttribute('value', 'UNMUTE CHANT');
          } else {
              audioEl.components.sound.playSound();
              muteBtn.setAttribute('color', '#FF4500');
              muteText.setAttribute('value', 'MUTE CHANT');
          }
      });

      // --- PAGE SWAP LOGIC ---
      document.querySelector('#swap-button').addEventListener('click', function () {
          pageNum = (pageNum === 1) ? 2 : 1;
          folio.setAttribute('src', '#page' + pageNum);
          console.log("Current Page: " + pageNum);
      });

      // --- MATERIAL TEXTURE LOGIC ---
      document.querySelector('#mat-button').addEventListener('click', function() {
          isGlossy = !isGlossy;
          if (isGlossy) {
              // Higher metalness/lower roughness highlights gold leaf & ink sheen
              folio.setAttribute('material', {roughness: 0.3, metalness: 0.5});
          } else {
              // Matte settings mimic the natural look of dry parchment/vellum
              folio.setAttribute('material', {roughness: 1.0, metalness: 0.0});
          }
      });

      // --- ZOOM & SCALE TRIGGERS ---
      document.querySelector('#zoom-button').addEventListener('click', function() {
          folio.emit('click-zoom');
      });

      document.querySelector('#scale-button').addEventListener('click', function() {
          folio.emit('click-scale');
      });
    </script>
  </body>
</html>
