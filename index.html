<!DOCTYPE html>

<html>

  <head>

    <meta charset="utf-8">

    <title>Medieval Scriptorium – Test Cockpit Build</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>


    <script>

      /**
       * COMPONENT: LOOK AT USER
       * -----------------------
       * This component ensures that the information panels always rotate
       * to face the user's camera. This creates the "imaginary line"
       * connection you requested, ensuring the panels tilt dynamically
       * as the user moves within the VR space or looks around.
       */

      AFRAME.registerComponent('look-at-user', {

        init: function () {

          this.targetPos = new THREE.Vector3();

          this.panelPos  = new THREE.Vector3();

        },

        tick: function () {

          const sceneEl = this.el.sceneEl;

          const cameraEl = sceneEl.camera ? sceneEl.camera.el : null;

          if (!cameraEl) return;

          cameraEl.object3D.getWorldPosition(this.targetPos);

          this.el.object3D.getWorldPosition(this.panelPos);

          this.el.object3D.lookAt(this.targetPos.x, this.targetPos.y, this.targetPos.z);

        }

      });


      /**
       * COMPONENT: VR GRAB ROTATION (SPATIAL TRACKING)
       * ---------------------------
       * Replaces the auto-spin with 1:1 hand tracking.
       * Restricted to +/- 30 degrees.
       */

      AFRAME.registerComponent('vr-grab-rotate', {

        init: function () {

          this.grabbing = false;

          this.activeController = null;

          this.previousControllerPos = new THREE.Vector3();

          this.currentControllerPos = new THREE.Vector3();


          this.triggerHaptic = (intensity, duration) => {

            if (this.activeController && this.activeController.components['tracked-controls']) {

              const controller = this.activeController.components['tracked-controls'].controller;

              if (controller && controller.gamepad && controller.gamepad.hapticActuators.length > 0) {

                controller.gamepad.hapticActuators[0].pulse(intensity, duration);

              }

            }

          };


          this.el.sceneEl.addEventListener('enter-vr', () => { this.isVR = true; });

          this.el.sceneEl.addEventListener('exit-vr', () => { this.isVR = false; });


          this.el.addEventListener('mousedown', (evt) => {

            if (this.isVR && evt.detail.cursorEl) {

              this.grabbing = true;

              this.activeController = evt.detail.cursorEl;

              this.activeController.object3D.getWorldPosition(this.previousControllerPos);

              this.triggerHaptic(0.6, 50); // Heavy grab pulse

            }

          });


          const stopGrabbing = () => {

            this.grabbing = false;

            this.activeController = null;

          };


          this.el.addEventListener('mouseup', stopGrabbing);

          this.el.addEventListener('mouseleave', stopGrabbing);

        },


        tick: function () {

          if (!this.grabbing || !this.activeController) return;

          this.activeController.object3D.getWorldPosition(this.currentControllerPos);

          let deltaX = this.currentControllerPos.x - this.previousControllerPos.x;

          let deltaY = this.currentControllerPos.y - this.previousControllerPos.y;


          const sensitivity = 300;

          let rot = this.el.getAttribute('rotation');

          let nextX = Math.max(-30, Math.min(30, rot.x - (deltaY * sensitivity)));

          let nextY = Math.max(-30, Math.min(30, rot.y + (deltaX * sensitivity)));


          this.el.setAttribute('rotation', { x: nextX, y: nextY, z: 0 });

          this.previousControllerPos.copy(this.currentControllerPos);

          const movement = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

          if (movement > 0.0001) {

            const intensity = Math.min(0.5, Math.max(0.1, movement * 500));

            this.triggerHaptic(intensity, 20);

          }

        }

      });


      AFRAME.registerComponent('haptic-button', {

        init: function () {

          this.el.addEventListener('mousedown', (evt) => {

            const controller = evt.detail.cursorEl;

            if (controller && controller.components['tracked-controls']) {

              const gamepad = controller.components['tracked-controls'].controller.gamepad;

              if (gamepad && gamepad.hapticActuators.length > 0) {

                gamepad.hapticActuators[0].pulse(0.4, 30);

              }

            }

          });

        }

      });


      /**
       * COMPONENT: PAGE TURN
       * --------------------
       * Provides a realistic page-peel interaction, replacing page-corners.
       *
       * Architecture
       * ────────────
       * backPage   — full-folio plane at z = -0.004, child of folio. Always
       *              shows the destination manuscript texture. Invisible until
       *              a turn begins; inherits all tilt / zoom transforms.
       *
       * rightHinge — pivot entity at folio-local (-0.55, 0, 0.002), i.e. the
       *              LEFT spine. Its child rightFlap centres over the folio.
       *              Rotating the hinge +180° on Y sweeps the page away from
       *              the viewer (confirmed with Three.js Y-rotation matrix).
       *
       * leftHinge  — pivot entity at folio-local (+0.55, 0, 0.002), the RIGHT
       *              spine. Rotating -180° on Y mirrors the same motion.
       *
       * Corner zones — invisible clickable planes at z = 0.01 so the raycaster
       *              hits them before the folio mesh. mousedown fires
       *              stopPropagation() to prevent drag-rotate from activating.
       *
       * VR flow
       * ───────
       *   1. Trigger-down on right corner → startTurn('right').
       *      Controller world-X position recorded as startX.
       *   2. tick() maps (–deltaX × 400) to hinge rotation 0°→+180°.
       *      Drag left = negative deltaX → positive angle. ✓
       *   3. triggerup → if |angle| ≥ 90°: completeTurn(); else snapBack().
       *      completeTurn plays sound, animates to 180°, then after 350 ms
       *      calls resetTurn() + swap-button.click() (handles all page state).
       *      snapBack animates to 0°, then calls resetTurn().
       *
       * Desktop flow
       * ────────────
       *   Click either corner → instant swap + sound (no drag required).
       *
       * Isolation guarantees
       * ────────────────────
       * • vr-grab-rotate listens on the folio entity. Corner zones intercept
       *   the raycaster first (z = 0.01) and call stopPropagation(), so tilt
       *   never starts from a corner press.
       * • folio-hotspots uses tick-based worldToLocal detection — unaffected.
       * • haptic feedback on the folio body is unaffected.
       * • resetTurn() restores folio opacity via setAttribute merge, preserving
       *   metalness / roughness set by the MATERIAL button toggle.
       */

      AFRAME.registerComponent('page-turn', {

        init: function () {

          const folio = this.el;
          const scene = folio.sceneEl;

          this.isTurning        = false;
          this.turnSide         = null;   // 'right' | 'left'
          this.activeController = null;
          this.startX           = 0;
          this.currentAngle     = 0;
          this.isVR             = false;
          this._ctrlPos         = new THREE.Vector3();

          scene.addEventListener('enter-vr', () => { this.isVR = true;  });
          scene.addEventListener('exit-vr',  () => { this.isVR = false; });


          // ── Back page ──────────────────────────────────────────────────────
          // Destination manuscript. Sits at z = -0.004 (behind folio mesh).
          // Parented to folio so it inherits tilt and zoom.

          this.backPage = document.createElement('a-plane');
          this.backPage.setAttribute('width',    '1.1');
          this.backPage.setAttribute('height',   '0.8');
          this.backPage.setAttribute('position', '0 0 -0.004');
          this.backPage.setAttribute('material',
            'shader: standard; metalness: 0.1; roughness: 0.8; side: double');
          this.backPage.setAttribute('visible', 'false');
          folio.appendChild(this.backPage);


          // ── Right hinge (spine at left edge, x = -0.55) ───────────────────
          // +180° Y rotation (CCW from above in Three.js) sweeps the flap
          // away from the viewer. Verified:
          //   point (0.55, 0, 0) at +90° → (0, 0, -0.55)  [behind folio]
          //   point (0.55, 0, 0) at +180° → (-0.55, 0, 0)  [fully turned]

          this.rightHinge = document.createElement('a-entity');
          this.rightHinge.setAttribute('position', '-0.55 0 0.002');
          this.rightHinge.setAttribute('visible',  'false');

          this.rightFlap = document.createElement('a-plane');
          this.rightFlap.setAttribute('width',    '1.1');
          this.rightFlap.setAttribute('height',   '0.8');
          this.rightFlap.setAttribute('position', '0.55 0 0');  // centres over folio
          this.rightFlap.setAttribute('material',
            'shader: standard; metalness: 0.1; roughness: 0.8; side: double');
          this.rightHinge.appendChild(this.rightFlap);
          folio.appendChild(this.rightHinge);


          // ── Left hinge (spine at right edge, x = +0.55) ───────────────────
          // -180° Y rotation mirrors the same motion.
          // Verified:
          //   point (-0.55, 0, 0) at -90° → (0, 0, -0.55)  [behind folio]
          //   point (-0.55, 0, 0) at -180° → (0.55, 0, 0)   [fully turned]

          this.leftHinge = document.createElement('a-entity');
          this.leftHinge.setAttribute('position', '0.55 0 0.002');
          this.leftHinge.setAttribute('visible',  'false');

          this.leftFlap = document.createElement('a-plane');
          this.leftFlap.setAttribute('width',    '1.1');
          this.leftFlap.setAttribute('height',   '0.8');
          this.leftFlap.setAttribute('position', '-0.55 0 0');  // centres over folio
          this.leftFlap.setAttribute('material',
            'shader: standard; metalness: 0.1; roughness: 0.8; side: double');
          this.leftHinge.appendChild(this.leftFlap);
          folio.appendChild(this.leftHinge);


          // ── Corner interaction zones ───────────────────────────────────────
          // z = 0.01 ensures raycaster hits zones before the folio mesh.
          // stopPropagation() on mousedown prevents drag-rotate from firing.

          this.rightCorner = document.createElement('a-plane');
          this.rightCorner.setAttribute('position', '0.4 -0.3 0.01');
          this.rightCorner.setAttribute('width',    '0.25');
          this.rightCorner.setAttribute('height',   '0.25');
          this.rightCorner.setAttribute('material', 'opacity: 0; transparent: true');
          this.rightCorner.classList.add('clickable');
          folio.appendChild(this.rightCorner);

          this.leftCorner = document.createElement('a-plane');
          this.leftCorner.setAttribute('position', '-0.4 -0.3 0.01');
          this.leftCorner.setAttribute('width',    '0.25');
          this.leftCorner.setAttribute('height',   '0.25');
          this.leftCorner.setAttribute('material', 'opacity: 0; transparent: true');
          this.leftCorner.classList.add('clickable');
          folio.appendChild(this.leftCorner);


          // ── Page-turn sound ────────────────────────────────────────────────
          // Uses the native audio element directly (no A-Frame sound component
          // needed; avoids dynamic entity timing issues).

          const playPageTurn = () => {
            const audio = document.querySelector('#pageturn-track');
            if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
          };


          // ── startTurn ──────────────────────────────────────────────────────

          const startTurn = (side, evt) => {

            if (this.isTurning) return;

            const currentPage = scene.currentAudioPage || 1;
            const nextPage    = currentPage === 1 ? 2 : 1;

            // Back page shows the destination texture.
            this.backPage.setAttribute('src',
              nextPage === 1 ? '#manuscript1' : '#manuscript2');
            this.backPage.setAttribute('visible', 'true');

            // Flap shows the current page texture; activate correct hinge.
            const flapEl  = side === 'right' ? this.rightFlap  : this.leftFlap;
            const hingeEl = side === 'right' ? this.rightHinge : this.leftHinge;

            flapEl.setAttribute('src',
              currentPage === 1 ? '#manuscript1' : '#manuscript2');
            hingeEl.object3D.rotation.y = 0;         // guarantee clean start
            hingeEl.setAttribute('visible', 'true');

            // Hide the folio's own mesh (children keep their materials).
            // Using setAttribute merge — metalness/roughness are preserved.
            folio.setAttribute('material', 'opacity: 0; transparent: true');

            this.isTurning        = true;
            this.turnSide         = side;
            this.currentAngle     = 0;
            this.activeController = null;

            if (this.isVR && evt && evt.detail && evt.detail.cursorEl) {
              this.activeController = evt.detail.cursorEl;
              this.activeController.object3D.getWorldPosition(this._ctrlPos);
              this.startX = this._ctrlPos.x;
            }

          };


          // ── completeTurn ───────────────────────────────────────────────────
          // Called when triggerup fires at |angle| >= 90°.

          const completeTurn = () => {

            playPageTurn();

            const hingeEl = this.turnSide === 'right' ? this.rightHinge : this.leftHinge;
            const targetY = this.turnSide === 'right' ? 180 : -180;

            this.activeController = null;   // stops tick() tracking

            hingeEl.setAttribute('animation__turn', {
              property: 'rotation',
              to:       '0 ' + targetY + ' 0',
              dur:      300,
              easing:   'easeInQuad'
            });

            // 350 ms gives the 300 ms animation a 50 ms safety margin.
            setTimeout(() => {
              this.resetTurn();
              document.querySelector('#swap-button').click();
            }, 350);

          };


          // ── snapBack ───────────────────────────────────────────────────────
          // Called when triggerup fires at |angle| < 90°.

          const snapBack = () => {

            const hingeEl = this.turnSide === 'right' ? this.rightHinge : this.leftHinge;

            this.activeController = null;   // stops tick() tracking

            hingeEl.setAttribute('animation__turn', {
              property: 'rotation',
              to:       '0 0 0',
              dur:      250,
              easing:   'easeOutQuad'
            });

            // 300 ms gives the 250 ms animation a 50 ms safety margin.
            setTimeout(() => {
              this.resetTurn();
            }, 300);

          };


          // ── Corner mousedown handlers ──────────────────────────────────────

          this.rightCorner.addEventListener('mousedown', (evt) => {
            evt.stopPropagation();      // prevent drag-rotate from activating
            if (this.isVR) {
              startTurn('right', evt);
            } else {
              // Desktop: instant swap + sound.
              playPageTurn();
              document.querySelector('#swap-button').click();
            }
          });

          this.leftCorner.addEventListener('mousedown', (evt) => {
            evt.stopPropagation();
            if (this.isVR) {
              startTurn('left', evt);
            } else {
              playPageTurn();
              document.querySelector('#swap-button').click();
            }
          });


          // ── Trigger-release handlers ───────────────────────────────────────
          // Bound to both controllers so release is caught even if the laser
          // drifts off the corner zone during the drag.

          scene.addEventListener('loaded', () => {

            const rightCtrl = document.querySelector('[laser-controls="hand: right"]');
            const leftCtrl  = document.querySelector('[laser-controls="hand: left"]');

            const onTriggerUp = () => {
              if (!this.isTurning || !this.isVR) return;
              if (Math.abs(this.currentAngle) >= 90) {
                completeTurn();
              } else {
                snapBack();
              }
            };

            if (rightCtrl) rightCtrl.addEventListener('triggerup', onTriggerUp);
            if (leftCtrl)  leftCtrl.addEventListener('triggerup',  onTriggerUp);

          });

        },


        // ── resetTurn ─────────────────────────────────────────────────────────
        // Restores the folio and hides all page-turn geometry.
        // Only opacity / transparent are set on the folio material so that
        // metalness / roughness from the MATERIAL button toggle are preserved.

        resetTurn: function () {

          const folio = this.el;

          folio.setAttribute('material', 'opacity: 1; transparent: false');

          this.rightHinge.setAttribute('visible', 'false');
          this.leftHinge.setAttribute('visible',  'false');
          this.backPage.setAttribute('visible',   'false');

          // Reset rotations so the next turn starts clean.
          this.rightHinge.object3D.rotation.y = 0;
          this.leftHinge.object3D.rotation.y  = 0;

          this.isTurning        = false;
          this.turnSide         = null;
          this.activeController = null;
          this.currentAngle     = 0;

        },


        // ── tick ──────────────────────────────────────────────────────────────
        // Maps controller world-X delta to hinge rotation.
        //
        // Right turn: user drags left → deltaX negative → rawAngle positive
        //             → hinge sweeps 0° → +180°  ✓
        // Left  turn: user drags right → deltaX positive → rawAngle negative
        //             → hinge sweeps 0° → -180°  ✓

        tick: function () {

          if (!this.isTurning || !this.isVR || !this.activeController) return;

          this.activeController.object3D.getWorldPosition(this._ctrlPos);

          const deltaX      = this._ctrlPos.x - this.startX;
          const sensitivity = 400;              // degrees per metre of hand travel
          const rawAngle    = -deltaX * sensitivity;

          if (this.turnSide === 'right') {
            this.currentAngle = Math.max(0,    Math.min(180,  rawAngle));
          } else {
            this.currentAngle = Math.max(-180, Math.min(0,    rawAngle));
          }

          const hingeEl = this.turnSide === 'right' ? this.rightHinge : this.leftHinge;
          hingeEl.object3D.rotation.y = THREE.MathUtils.degToRad(this.currentAngle);

        }

      });


      /**
       * COMPONENT: DESKTOP DRAG ROTATE (ZOOM TILT FIX)
       * ----------------------------------------------
       * Fixed to use movementX/Y. Restricted to +/- 30 degrees.
       */

      AFRAME.registerComponent('drag-rotate', {

        init: function () {

          this.ifMouseDown = false;

          this.isVR = false;

          this.el.sceneEl.addEventListener('enter-vr', () => { this.isVR = true; });

          this.el.sceneEl.addEventListener('exit-vr', () => { this.isVR = false; });

          this.el.addEventListener('mousedown', () => {

            if (!this.isVR) this.ifMouseDown = true;

          });

          this.onMouseUp = () => { this.ifMouseDown = false; };

          this.onMouseMove = (e) => {

            if (this.ifMouseDown) {

              let rotation = this.el.getAttribute('rotation');

              let deltaX = (e.movementX !== undefined ? e.movementX : 0) * 0.15;

              let deltaY = (e.movementY !== undefined ? e.movementY : 0) * 0.15;

              let nextX = Math.max(-30, Math.min(30, rotation.x + deltaY));

              let nextY = Math.max(-30, Math.min(30, rotation.y + deltaX));

              this.el.setAttribute('rotation', { x: nextX, y: nextY, z: 0 });

            }

          };

          window.addEventListener('mouseup', this.onMouseUp);

          window.addEventListener('mousemove', this.onMouseMove);

        },

        remove: function () {

          window.removeEventListener('mousemove', this.onMouseMove);

          window.removeEventListener('mouseup', this.onMouseUp);

        }

      });


      /**
       * COMPONENT: CANDLE FLICKER — ENHANCED
       * Option 1: Position micro-drift.
       * Option 2: Organic intensity curve.
       * Option 3: Colour temperature variation.
       */

      AFRAME.registerComponent('flicker', {

        init: function () {

          const initPos = this.el.getAttribute('position');

          this.baseX = initPos ? initPos.x : 0;

          this.baseY = initPos ? initPos.y : 0.5;

          this.baseZ = initPos ? initPos.z : 0.5;

          this.phaseX = Math.random() * Math.PI * 2;

          this.phaseY = Math.random() * Math.PI * 2;

          this.lastLightUpdate = 0;

        },


        tick: function (t) {

          const driftX = Math.sin(t * 0.0007 + this.phaseX) * 0.015

                       + Math.sin(t * 0.0019 + this.phaseX) * 0.008

                       + (Math.random() - 0.5) * 0.004;


          const driftY = Math.sin(t * 0.0005 + this.phaseY) * 0.012

                       + Math.sin(t * 0.0023 + this.phaseY) * 0.006

                       + (Math.random() - 0.5) * 0.003;


          this.el.object3D.position.set(

            this.baseX + driftX,

            this.baseY + driftY,

            this.baseZ

          );


          if (t - this.lastLightUpdate > 50) {

            this.lastLightUpdate = t;

            const slowBreath  = Math.sin(t * 0.00035) * 0.25 + 0.25;

            const fastFlutter = Math.sin(t * 0.0023)  * 0.10;

            const noise       = (Math.random() - 0.5) * 0.15;

            const intensity   = Math.max(0.9, Math.min(1.8,

              1.2 + slowBreath + fastFlutter + noise

            ));

            const t_col = (intensity - 0.9) / 0.9;

            const g = Math.round(119 + t_col * 119);

            const b = Math.round(51  + t_col * 85);

            this.el.setAttribute('light', {

              intensity: intensity,

              color: 'rgb(255,' + g + ',' + b + ')'

            });

          }

        }

      });


      /**
       * COMPONENT: FOLIO HOTSPOTS
       * -------------------------
       * Tick-based raycaster approach — no zone planes, no visual
       * indicators. Completely invisible hotspots that never interfere
       * with the folio tilt or haptic feedback.
       *
       * tick() checks both controller raycasters' intersections with
       * the folio and converts the hit point to folio-local coordinates.
       * A/X buttons toggle the panel whose zone is currently aimed at.
       */

      AFRAME.registerComponent('folio-hotspots', {

        init: function () {

          const folio = this.el;

          this.targetedPanel = null;

          this.zones = [];

          this._localPt = new THREE.Vector3();

          this.rightCtrl = null;

          this.leftCtrl  = null;


          const makeHotspot = (cx, cy, panelPos, labelText) => {

            // Info panel — no clickable class, trigger cannot touch it.

            const panel = document.createElement('a-entity');

            panel.setAttribute('position', panelPos);

            panel.setAttribute('visible', 'false');


            const bg = document.createElement('a-plane');

            bg.setAttribute('width', '0.36');

            bg.setAttribute('height', '0.18');

            bg.setAttribute('material', 'color: #1a1a2e; opacity: 0.92; side: double');

            panel.appendChild(bg);


            const txt = document.createElement('a-text');

            txt.setAttribute('value', labelText);

            txt.setAttribute('color', '#FFD700');

            txt.setAttribute('align', 'center');

            txt.setAttribute('width', '0.32');

            txt.setAttribute('position', '0 0 0.01');

            panel.appendChild(txt);

            folio.appendChild(panel);


            this.zones.push({

              cx:        cx,

              cy:        cy,

              halfW:     0.125,

              halfH:     0.10,

              panel:     panel,

              panelOpen: false

            });

          };


          // Right hotspot: zone centre (0.24, -0.02), panel above at (0.24, 0.17)

          makeHotspot(0.24, -0.02, '0.24 0.17 0.06', 'Info. test one');


          // Left hotspot: zone centre (-0.24, -0.02), panel above at (-0.24, 0.17)

          makeHotspot(-0.24, -0.02, '-0.24 0.17 0.06', 'Info. test two');


          // Toggle the currently-targeted panel.

          const toggle = () => {

            if (!this.targetedPanel) return;

            const zone = this.zones.find(z => z.panel === this.targetedPanel);

            if (!zone) return;

            zone.panelOpen = !zone.panelOpen;

            zone.panel.setAttribute('visible', zone.panelOpen);

          };


          this.el.sceneEl.addEventListener('loaded', () => {

            this.rightCtrl = document.querySelector('[laser-controls="hand: right"]');

            this.leftCtrl  = document.querySelector('[laser-controls="hand: left"]');

            if (this.rightCtrl) this.rightCtrl.addEventListener('abuttondown', toggle);

            if (this.leftCtrl)  this.leftCtrl.addEventListener('xbuttondown',  toggle);

          });

        },


        tick: function () {

          const folio   = this.el;

          const ctrls   = [this.rightCtrl, this.leftCtrl];

          let hitZoneIdx = -1;


          for (let c = 0; c < ctrls.length; c++) {

            const ctrl = ctrls[c];

            if (!ctrl) continue;

            const rc = ctrl.components && ctrl.components.raycaster;

            if (!rc || !rc.intersectedEls) continue;

            const idx = rc.intersectedEls.indexOf(folio);

            if (idx < 0 || !rc.intersections[idx]) continue;


            this._localPt.copy(rc.intersections[idx].point);

            folio.object3D.worldToLocal(this._localPt);


            for (let i = 0; i < this.zones.length; i++) {

              const z = this.zones[i];

              if (

                Math.abs(this._localPt.x - z.cx) <= z.halfW &&

                Math.abs(this._localPt.y - z.cy) <= z.halfH

              ) {

                hitZoneIdx = i;

                break;

              }

            }

            if (hitZoneIdx >= 0) break;

          }


          // Expose the currently aimed-at panel for the toggle function.

          this.targetedPanel = hitZoneIdx >= 0 ? this.zones[hitZoneIdx].panel : null;

        }

      });


      /**
       * COMPONENT: PANEL AUDIO
       * ----------------------
       * Attaches to the translation and transcription panel entities.
       * Invisible clickable zone fires strong haptic (0.65, 80ms) on hover.
       * A/X buttons toggle audio playback for the current folio page.
       *
       * Schema:
       *   src1 — selector for the page-1 audio element (e.g. #latin1-track)
       *   src2 — selector for the page-2 audio element (e.g. #latin2-track)
       */

      AFRAME.registerComponent('panel-audio', {

        schema: {

          src1: { type: 'string', default: '' },

          src2: { type: 'string', default: '' }

        },


        init: function () {

          const panel = this.el;

          const scene = this.el.sceneEl;

          let isTargeted = false;


          const zone = document.createElement('a-plane');

          zone.setAttribute('width', '1.0');

          zone.setAttribute('height', '1.2');

          zone.setAttribute('position', '0 -0.1 0.02');

          zone.setAttribute('material', 'opacity: 0; transparent: true; side: double');

          zone.classList.add('clickable');

          panel.appendChild(zone);


          const pulseHaptic = (evt) => {

            const ctrl = evt && evt.detail && evt.detail.cursorEl;

            if (!ctrl) return;

            const tc = ctrl.components && ctrl.components['tracked-controls'];

            if (!tc) return;

            const gp = tc.controller && tc.controller.gamepad;

            if (gp && gp.hapticActuators && gp.hapticActuators.length > 0) {

              gp.hapticActuators[0].pulse(0.65, 80);

            }

          };


          zone.addEventListener('mouseenter', (evt) => {

            isTargeted = true;

            pulseHaptic(evt);

          });

          zone.addEventListener('mouseleave', () => {

            isTargeted = false;

          });


          const getAudio = () => {

            const page  = scene.currentAudioPage || 1;

            const srcId = (page === 1) ? this.data.src1 : this.data.src2;

            return srcId ? document.querySelector(srcId) : null;

          };


          const toggle = () => {

            if (!isTargeted) return;

            const audio = getAudio();

            if (!audio) return;


            if (scene.currentPanelAudio && scene.currentPanelAudio !== audio) {

              scene.currentPanelAudio.pause();

              scene.currentPanelAudio.currentTime = 0;

              scene.currentPanelAudio = null;

            }


            if (audio.paused) {

              audio.play();

              scene.currentPanelAudio = audio;

            } else {

              audio.pause();

              audio.currentTime = 0;

              scene.currentPanelAudio = null;

            }

          };


          scene.addEventListener('loaded', () => {

            const rightCtrl = document.querySelector('[laser-controls="hand: right"]');

            const leftCtrl  = document.querySelector('[laser-controls="hand: left"]');

            if (rightCtrl) rightCtrl.addEventListener('abuttondown', toggle);

            if (leftCtrl)  leftCtrl.addEventListener('xbuttondown',  toggle);

          });

        }

      });


      /**
       * COMPONENT: SCRIPTORIUM LOGIC
       * ----------------------------
       * The central controller for the experience. Manages text data,
       * page swaps, materiality settings, and audio playback.
       */

      AFRAME.registerComponent('scriptorium-logic', {

        init: function () {

          const folio = document.querySelector('#folio-object');

          const zoomAnchor = document.querySelector('#zoom-anchor');

          const infoPanel = document.querySelector('#info-panel');

          const soundEl = document.querySelector('#ambient-sound');

          const clickSoundEl = document.querySelector('#click-sound');

          const transcrText = document.querySelector('#transcr-text');

          const translText = document.querySelector('#transl-text');

          const muteBtn = document.querySelector('#mute-button');

          const muteLabel = document.querySelector('#mute-label');

          const hoverTooltip = document.querySelector('#hover-tooltip');

          const cursor = document.querySelector('#cursor');

          this.el.addEventListener('enter-vr', () => cursor.setAttribute('visible', false));

          this.el.addEventListener('exit-vr',  () => cursor.setAttribute('visible', true));


          let zoomed = false;

          let materialityMode = false;

          let currentPage = 1;

          this.el.currentAudioPage = 1;

          let isMuted = false;


          const playClick = () => {

            if (clickSoundEl && clickSoundEl.components.sound) {

              clickSoundEl.components.sound.stopSound();

              clickSoundEl.components.sound.playSound();

            }

          };


          // Page 1 Full Data: Hartmann Schedel's Nuremberg Chronicle (1493)

          const lat1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus undecim annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes. qui cum maturitati proximi essent aut in terram aut in aquam deciderent. et hi qui in terram caderent putrescerent. qui uero in aquam mergerentur mox uiuere inciperent et sub aquis natarent. et in aera pennis et alis euolarent. Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";

          const eng1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. King James IV reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household. Among whom, when vengeance was pacified, his son took up the kingdom. We had heard that there was once a tree in Scotland which, growing above the banks of a river, produced fruit having the shape of ducks. When these were near to maturity, they fell either into the earth or into the water; those which fell upon the earth would rot, but those truly which were submerged in the water would soon begin to live, swim under the water, and fly into the air with feathers and wings. This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";

          // Page 2 Full Data: Liber Pluscardensis (c. 1500)

          const lat2 = "Quorum cateruis sic gloriose circumuallatus venit usque ad locum qui ditur Bannokburne et ibi fixit tentoria sua. Cui rex robertus cum paucis respectu multitudinis eius in domino confidens et in deo virtutem capiens cum dicto rege anglie mortale commisit bellum ac ipsum cum omni pompa sua et innumerabili potencia auxiliante altissimo cuius est victoriam dare in fugam conuertit. ubi comes glouernie et multi nobiles anglie ceciderunt interfecti. alii fugati, alii capti, alii occisi in foveis et in aqua de Bannokburne submersi. per captiuos enim non solum regina scocie cum suis liberati sunt de carcere anglorum per commutacionem nobilium anglie captorum. Ac eciam omnes alii in dicto bello existentes inestimabiliter sunt ditati.";

          const eng2 = "Surrounded so gloriously by his companies, he came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men in respect to his multitude, trusting in the Lord and taking strength in God, joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting, whose it is to give victory, he turned to flight. There the Earl of Gloucester and many nobles of England fell slain. Others were put to flight; others were captured; others were killed in the pits and submerged in the water of Bannockburn. For through the captives, not only was the Queen of Scotland with her people liberated from the prison of the English through the exchange of the captured English nobles, but also all others present in the said war were enriched beyond measure.";


          transcrText.setAttribute('value', lat1);

          translText.setAttribute('value', eng1);


          folio.addEventListener('mouseenter', () => hoverTooltip.setAttribute('visible', 'true'));

          folio.addEventListener('mouseleave', () => hoverTooltip.setAttribute('visible', 'false'));


          // Zoom Action

          document.querySelector('#zoom-button').addEventListener('click', () => {

            playClick();

            zoomed = !zoomed;

            infoPanel.setAttribute('visible', !zoomed);

            zoomAnchor.setAttribute('animation', {

              property: 'position',

              to: zoomed ? '0 1.5 -0.6' : '0 1.1 -1.4',

              dur: 800,

              easing: 'easeInOutQuad'

            });

          });


          // Materiality Toggle Action

          document.querySelector('#mat-button').addEventListener('click', () => {

            playClick();

            materialityMode = !materialityMode;

            folio.setAttribute('material', {

              metalness: materialityMode ? 0.9 : 0.1,

              roughness: materialityMode ? 0.1 : 0.8

            });

          });


          // Swap Page Action

          document.querySelector('#swap-button').addEventListener('click', () => {

            playClick();

            currentPage = (currentPage === 1) ? 2 : 1;

            this.el.currentAudioPage = currentPage;

            if (this.el.currentPanelAudio) {

              this.el.currentPanelAudio.pause();

              this.el.currentPanelAudio.currentTime = 0;

              this.el.currentPanelAudio = null;

            }

            folio.setAttribute('src', currentPage === 1 ? '#manuscript1' : '#manuscript2');

            document.querySelector('#hover-text').setAttribute('value', currentPage === 1 ? 'Liber Chronicarum' : 'Liber Pluscardensis');

            transcrText.setAttribute('value', currentPage === 1 ? lat1 : lat2);

            translText.setAttribute('value', currentPage === 1 ? eng1 : eng2);

            document.querySelector('#info-text').setAttribute(

              'value',

              currentPage === 1

                ? 'Liber Chronicarum, 1493,\nHartmann Schedel'

                : 'Liber Pluscardensis,\nbefore 1500'

            );

          });


          // Scale Cycling Action

          document.querySelector('#scale-button').addEventListener('click', () => {

            playClick();

            let s = folio.getAttribute('scale');

            let nextScale = s.x > 1.3 ? "0.7 0.7 0.7" : (s.x < 0.8 ? "1 1 1" : "1.5 1.5 1.5");

            folio.setAttribute('scale', nextScale);

          });


          // Mute Action

          muteBtn.addEventListener('click', () => {

            playClick();

            isMuted = !isMuted;

            if (soundEl.components.sound) {

              isMuted ? soundEl.components.sound.pauseSound() : soundEl.components.sound.playSound();

            }

            muteBtn.setAttribute('color', isMuted ? '#8B0000' : '#FF4500');

            muteLabel.setAttribute('value', isMuted ? 'UNMUTE' : 'MUTE');

          });


          window.addEventListener('click', () => {

            if (soundEl.components.sound) soundEl.components.sound.playSound();

            document.querySelector('#sound-ui').setAttribute('visible', 'false');

          }, { once: true });

        }

      });

    </script>

  </head>


  <body>

    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">

      <a-assets>

        <img id="manuscript1" src="folio.jpg">

        <img id="manuscript2" src="folio2.jpg">

        <audio id="music-track" src="chant.mp3" preload="auto"></audio>

        <audio id="click-track" src="click.mp3" preload="auto"></audio>

        <audio id="pageturn-track" src="pageturn1.mp3" preload="auto"></audio>

        <!-- Panel audio: one file per text panel per folio page.        -->
        <!-- Replace the src filenames with your actual audio filenames. -->

        <audio id="latin1-track"   src="latin1.mp3"   preload="auto"></audio>

        <audio id="english1-track" src="english1.mp3" preload="auto"></audio>

        <audio id="latin2-track"   src="latin2.mp3"   preload="auto"></audio>

        <audio id="english2-track" src="english2.mp3" preload="auto"></audio>

      </a-assets>


      <a-entity environment="preset: starry; lighting: none;"></a-entity>

      <a-entity light="type: ambient; intensity: 0.4;"></a-entity>

      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.5;"></a-entity>

      <a-entity id="click-sound" sound="src: #click-track; volume: 1.0; poolSize: 5;"></a-entity>

      <a-text id="sound-ui" value="CLICK TO START" position="0 2.2 -2" align="center" color="#FFD700" width="3"></a-text>


      <a-entity id="rig">

        <a-entity camera look-controls wasd-controls position="0 1.6 0">

          <a-cursor id="cursor" position="0 0 -0.4" scale="0.4 0.4 0.4" raycaster="objects: .clickable" color="#FFD700"

                    animation__fusing="property: scale; from: 0.4 0.4 0.4; to: 0.04 0.04 0.04; dur: 1500; startEvents: fusing;"

                    animation__reset="property: scale; to: 0.4 0.4 0.4; dur: 500; startEvents: mouseleave;">

          </a-cursor>

        </a-entity>

        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 10;"></a-entity>

        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 10;"></a-entity>

      </a-entity>


      <a-entity id="zoom-anchor" position="0 1.1 -1.4">

          <a-plane id="folio-object" class="clickable" drag-rotate vr-grab-rotate page-turn folio-hotspots src="#manuscript1"

                   position="0 0 0" rotation="0 0 0" width="1.1" height="0.8"

                   material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">

              <a-entity id="candle" light="type: point; color: #ffcc77; intensity: 1.6; distance: 4;" position="0 0.5 0.5" flicker></a-entity>

              <a-entity id="hover-tooltip" position="0 0.55 0.05" visible="false">

                  <a-plane width="0.8" height="0.15" color="black" opacity="0.8"></a-plane>

                  <a-text id="hover-text" value="Liber Chronicarum" color="white" align="center" width="0.8" position="0 0 0.05"></a-text>

              </a-entity>

          </a-plane>


          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -25 0">

              <a-sphere id="zoom-button" class="clickable" haptic-button position="0 0.25 0" radius="0.04" color="#FFD700"><a-text value="ZOOM/RESET" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>

              <a-sphere id="mat-button" class="clickable" haptic-button position="0 0.12 0" radius="0.04" color="#C0C0C0"><a-text value="MATERIAL" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>

              <a-sphere id="swap-button" class="clickable" haptic-button position="0 0 0" radius="0.04" color="#cd7f32"><a-text value="SWAP PAGE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>

              <a-sphere id="scale-button" class="clickable" haptic-button position="0 -0.12 0" radius="0.04" color="#4CC3D9"><a-text value="SCALE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>

              <a-box id="mute-button" class="clickable" haptic-button position="0 -0.25 0" width="0.06" height="0.06" depth="0.06" color="#FF4500">

                  <a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.22 0.22 0.22" color="white"></a-text>

              </a-box>

          </a-entity>

          <a-entity id="info-panel" position="-0.9 0 0.1" rotation="0 35 0">

              <a-plane width="0.6" height="0.4" color="#111" opacity="0.9"></a-plane>

              <a-text id="info-text" value="Liber Chronicarum, 1493,\nHartmann Schedel" color="#FFD700" align="center" width="0.7" position="0 0 0.05"></a-text>

          </a-entity>

      </a-entity>


      <a-entity id="translation-panel" position="-2.06 1.5 -0.75" look-at-user panel-audio="src1: #english1-track; src2: #english2-track">

          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>

          <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>

          <a-text id="transl-text" color="white" align="center" baseline="top" width="1.05" position="0 0.6 0.02" wrap-count="50"></a-text>

      </a-entity>


      <a-entity id="transcription-panel" position="-2.06 1.5 0.75" look-at-user panel-audio="src1: #latin1-track; src2: #latin2-track">

          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>

          <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>

          <a-text id="transcr-text" color="white" align="center" baseline="top" width="1.05" position="0 0.6 0.02" wrap-count="50"></a-text>

      </a-entity>


    </a-scene>

  </body>

</html>
