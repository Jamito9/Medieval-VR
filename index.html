<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium – Verified Master Build</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      /**
       * CONSTANTS & GLOBALS
       * Centralized values for easy adjustment.
       */
      const HOME_ROTATION = { x: 15, y: 0, z: 0 };
      const HOME_POSITION = { x: 0, y: 1.1, z: -1.4 };
      const ZOOM_POSITION = { x: 0, y: 1.5, z: -0.6 };

      /**
       * COMPONENT: PLAY-CLICK
       * Manages the tactile audio feedback for all UI elements.
       */
      AFRAME.registerComponent('play-click', {
        init: function () {
          this.el.addEventListener('click', () => {
            const sfx = document.querySelector('#click-sfx');
            if (sfx && sfx.components.sound) {
              sfx.components.sound.stopSound();
              sfx.components.sound.playSound();
            }
          });
        }
      });

      /**
       * COMPONENT: LOOK-AT-USER
       * Ensures cockpit panels are always facing the user's headset.
       */
      AFRAME.registerComponent('look-at-user', {
        tick: function () {
          const cameraEl = this.el.sceneEl.camera ? this.el.sceneEl.camera.el : null;
          if (!cameraEl) return;

          const targetPos = new THREE.Vector3();
          cameraEl.object3D.getWorldPosition(targetPos);
          this.el.object3D.lookAt(targetPos.x, targetPos.y, targetPos.z);
        }
      });

      /**
       * COMPONENT: DRAG-ROTATE
       * Enables desktop mouse interaction. 
       * Folio remains static unless 'mousedown' is active.
       */
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          this.el.addEventListener('mousedown', () => { 
            this.ifMouseDown = true; 
          });
          window.addEventListener('mouseup', () => { 
            this.ifMouseDown = false; 
          });
          
          window.addEventListener('mousemove', (e) => {
            if (this.ifMouseDown) {
              let rotation = this.el.getAttribute('rotation');
              let deltaX = (e.movementX || 0) * 0.12;
              let deltaY = (e.movementY || 0) * 0.12;

              this.el.setAttribute('rotation', {
                x: rotation.x + deltaY,
                y: rotation.y + deltaX,
                z: 0
              });
            }
          });
        }
      });

      /**
       * COMPONENT: VR-GRAB-ROTATE
       * Specialized logic for 6DoF VR controllers.
       */
      AFRAME.registerComponent('vr-grab-rotate', {
        init: function () {
          this.grabbing = false;
          this.el.addEventListener('mousedown', () => { 
            this.grabbing = true; 
          });
          window.addEventListener('mouseup', () => { 
            this.grabbing = false; 
          });
        },
        tick: function () {
          if (!this.grabbing) return;
          let rot = this.el.getAttribute('rotation');
          this.el.setAttribute('rotation', {
            x: rot.x,
            y: rot.y + 0.5,
            z: 0
          });
        }
      });

      /**
       * COMPONENT: PAGE-CORNERS
       * Injects invisible hitboxes for page flipping on the book itself.
       */
      AFRAME.registerComponent('page-corners', {
        init: function () {
          const createTrigger = (pos) => {
            let p = document.createElement('a-plane');
            p.setAttribute('position', pos);
            p.setAttribute('width', '0.35');
            p.setAttribute('height', '0.35');
            p.setAttribute('material', 'opacity: 0; transparent: true');
            p.classList.add('clickable');
            p.setAttribute('play-click', '');
            p.addEventListener('click', () => {
              document.querySelector('#swap-button').click();
            });
            return p;
          };
          // Bottom-Left and Bottom-Right targets
          this.el.appendChild(createTrigger('-0.4 -0.3 0.03'));
          this.el.appendChild(createTrigger('0.4 -0.3 0.03'));
        }
      });

      /**
       * COMPONENT: FLICKER
       * Atmospheric light modulation for the candle.
       */
      AFRAME.registerComponent('flicker', {
        tick: function () {
          if (Math.random() > 0.85) {
            const val = 1.2 + (Math.random() * 0.5);
            this.el.setAttribute('light', 'intensity', val);
          }
        }
      });

      /**
       * COMPONENT: SCRIPTORIUM-LOGIC
       * Master State Controller.
       */
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          this.zoomed = false; 
          this.currentPage = 1; 
          this.isMuted = false;

          // Elements
          this.folio = document.querySelector('#folio-object');
          this.anchor = document.querySelector('#zoom-anchor');
          this.ambient = document.querySelector('#ambient-sound');
          
          // Historical Text Strings
          this.lat1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus . xi . annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes... Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";
          this.eng1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. [King] James [IV] reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household... This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";
          
          this.lat2 = "Quorum cateruis sic gloriose circumuallatus... Cui rex robertus cum paucis respectu multitudinis eius in domino confidens... cum dicto rege anglie mortale commisit bellum ac ipsum cum omni pompa sua et innumerabili potencia auxiliante altissimo cuius est victoriam dare... ubi comes glouernie et multi nobiles anglie ceciderunt interfecti… alii fugati . alii capti . alii occisi… per captiuos enim non solum regina scocie cum suis liberati sunt... Ac eciam omnes alii in dicto bello existentes inestimabiliter sunt ditati.";
          this.eng2 = "Surrounded so gloriously by his companies... he came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men... trusting in the Lord and taking strength in God... joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting... he turned to flight. There the Earl of Gloucester and many nobles of England fell slain…. Others were put to flight; others were captured; others were killed.";

          this.refreshUI();

          // Button: ZOOM/RESET
          document.querySelector('#zoom-button').addEventListener('click', () => {
            this.zoomed = !this.zoomed;
            
            // Move the anchor
            this.anchor.setAttribute('animation', {
              property: 'position', 
              to: this.zoomed ? ZOOM_POSITION : HOME_POSITION, 
              dur: 1000,
              easing: 'easeInOutCubic'
            });

            // If Resetting, also snap the Folio back to 15 degrees
            if (!this.zoomed) {
              this.folio.setAttribute('rotation', HOME_ROTATION);
            }
          });

          // Button: SWAP
          document.querySelector('#swap-button').addEventListener('click', () => {
            this.currentPage = (this.currentPage === 1) ? 2 : 1;
            this.folio.setAttribute('src', this.currentPage === 1 ? '#manuscript1' : '#manuscript2');
            this.refreshUI();
          });

          // Button: MUTE (Bright Red to Dark Red)
          document.querySelector('#mute-button').addEventListener('click', (e) => {
            this.isMuted = !this.isMuted;
            if (this.ambient.components.sound) {
              this.isMuted ? this.ambient.components.sound.pauseSound() : this.ambient.components.sound.playSound();
            }
            // Logic Check: Unmuted = Bright Red (#FF0000), Muted = Dark Red (#8B0000)
            const colorVal = this.isMuted ? '#8B0000' : '#FF0000';
            e.target.setAttribute('color', colorVal);
            document.querySelector('#mute-label').setAttribute('value', this.isMuted ? 'UNMUTE' : 'MUTE');
          });

          // Handle first-click audio unlock
          window.addEventListener('click', () => { 
            if (this.ambient.components.sound) {
              this.ambient.components.sound.playSound(); 
            }
            document.querySelector('#sound-ui').setAttribute('visible', 'false'); 
          }, { once: true });
        },

        refreshUI: function() {
          const isP1 = (this.currentPage === 1);
          
          document.querySelector('#transcr-text').setAttribute('value', isP1 ? this.lat1 : this.lat2);
          document.querySelector('#transl-text').setAttribute('value', isP1 ? this.eng1 : this.eng2);
          
          const info = isP1 ? 'Liber Chronicarum, 1493' : 'Liber Pluscardensis, c.1500';
          document.querySelector('#info-text').setAttribute('value', info);
        }
      });
    </script>
  </head>

  <body>
    <a-scene 
      scriptorium-logic 
      renderer="antialias: true; colorManagement: true; logarithmicDepthBuffer: true;">
      
      <a-assets>
        <img 
          id="manuscript1" 
          src="folio.jpg">
        <img 
          id="manuscript2" 
          src="folio2.jpg">
        <audio 
          id="music-track" 
          src="chant.mp3" 
          preload="auto">
        </audio>
        <audio 
          id="click-asset" 
          src="https://cdn.aframe.io/360-video-example/click.mp3" 
          preload="auto">
        </audio>
      </a-assets>

      <a-entity 
        id="ambient-sound" 
        sound="src: #music-track; loop: true; volume: 0.4;">
      </a-entity>
      
      <a-entity 
        id="click-sfx" 
        sound="src: #click-asset; volume: 1.0; poolSize: 15;">
      </a-entity>

      <a-entity 
        environment="preset: starry; lighting: none; ground: flat; groundColor: #050505;">
      </a-entity>
      
      <a-entity 
        light="type: ambient; intensity: 0.35;">
      </a-entity>
      
      <a-text 
        id="sound-ui" 
        value="CLICK TO INITIATE EXPERIENCE" 
        position="0 2.2 -2.5" 
        align="center" 
        color="#FFD700" 
        width="4">
      </a-text>

      <a-entity id="rig">
        <a-entity 
          camera 
          look-controls 
          wasd-controls 
          position="0 1.6 0">
          <a-cursor 
            id="cursor" 
            position="0 0 -0.5" 
            scale="0.5 0.5 0.5" 
            raycaster="objects: .clickable" 
            color="#FFD700">
          </a-cursor>
        </a-entity>
      </a-entity>

      <a-entity 
        id="zoom-anchor" 
        position="0 1.1 -1.4">
          
          <a-plane 
            id="folio-object" 
            class="clickable" 
            drag-rotate 
            vr-grab-rotate 
            page-corners 
            src="#manuscript1"
            position="0 0 0" 
            rotation="15 0 0" 
            width="1.1" 
            height="0.85"
            material="shader: standard; metalness: 0.05; roughness: 0.9; side: double;">
              
              <a-entity 
                id="candle" 
                light="type: point; color: #ffaa44; intensity: 1.7; distance: 5;" 
                position="0 0.6 0.6" 
                flicker>
              </a-entity>
          </a-plane>

          <a-entity 
            id="button-group" 
            position="1.0 0 0.2" 
            rotation="0 -30 0">
              
              <a-sphere 
                id="zoom-button" 
                class="clickable" 
                play-click
                position="0 0.28 0" 
                radius="0.045" 
                color="#FFD700">
                <a-text 
                  value="ZOOM/RESET" 
                  position="0.1 0 0" 
                  width="2.0" 
                  color="white">
                </a-text>
              </a-sphere>

              <a-sphere 
                id="swap-button" 
                class="clickable" 
                play-click 
                position="0 0.14 0" 
                radius="0.045" 
                color="#cd7f32">
                <a-text 
                  value="SWAP PAGE" 
                  position="0.1 0 0" 
                  width="2.0" 
                  color="white">
                </a-text>
              </a-sphere>

              <a-box 
                id="mute-button" 
                class="clickable" 
                play-click 
                position="0 0 0" 
                width="0.07" 
                height="0.07" 
                depth="0.07" 
                color="#FF0000">
                  <a-text 
                    id="mute-label" 
                    value="MUTE" 
                    position="0.1 0 0" 
                    width="2.0" 
                    color="white">
                  </a-text>
              </a-box>
          </a-entity>

          <a-entity 
            id="info-panel" 
            position="-1.05 0 0.2" 
            rotation="0 35 0">
              <a-plane 
                width="0.95" 
                height="0.5" 
                color="#111" 
                opacity="0.95">
              </a-plane>
              <a-text 
                id="info-text" 
                value="Liber Chronicarum" 
                color="#FFD700" 
                align="center" 
                width="0.85" 
                position="0 0 0.03">
              </a-text>
          </a-entity>
      </a-entity>

      <a-entity 
        id="translation-panel" 
        position="-1.9 1.5 -0.8" 
        look-at-user>
          
          <a-plane 
            width="1.5" 
            height="3.5" 
            color="#0a0a0a" 
            opacity="0.96" 
            material="side: double;">
          </a-plane>
          
          <a-text 
            value="ENGLISH TRANSLATION" 
            color="#FFD700" 
            align="center" 
            width="2.4" 
            position="0 1.6 0.05">
          </a-text>
          
          <a-text 
            id="transl-text" 
            color="#efefef" 
            align="left" 
            anchor="center"
            baseline="top"
            width="1.3" 
            position="0 1.3 0.05" 
            wrap-count="42">
          </a-text>

      </a-entity>

      <a-entity 
        id="transcription-panel" 
        position="-3.1 1.5 0.6" 
        look-at-user>
          
          <a-plane 
            width="1.5" 
            height="3.5" 
            color="#0a0a0a" 
            opacity="0.96" 
            material="side: double;">
          </a-plane>
          
          <a-text 
            value="LATIN TRANSCRIPTION" 
            color="#FFD700" 
            align="center" 
            width="2.4" 
            position="0 1.6 0.05">
          </a-text>
          
          <a-text 
            id="transcr-text" 
            color="#efefef" 
            align="left" 
            anchor="center" 
            baseline="top"
            width="1.3" 
            position="0 1.3 0.05" 
            wrap-count="42">
          </a-text>

      </a-entity>

      </a-scene>
  </body>
</html>
