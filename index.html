<html>
  <head>
    <meta charset="utf-8">
    <title>15th Century Arthurian VR Exhibit</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      // This script allows the folio to "zoom" when you look at it
      AFRAME.registerComponent('zoom-on-gaze', {
        init: function () {
          var el = this.el;
          el.addEventListener('mouseenter', function () {
            el.setAttribute('animation', {
              property: 'position',
              to: '0 1.2 -1', // Brings it closer to the face
              dur: 1000,
              easing: 'easeOutQuad'
            });
          });
          el.addEventListener('mouseleave', function () {
            el.setAttribute('animation', {
              property: 'position',
              to: '0 0.95 -1.5', // Moves it back to the desk
              dur: 1000,
              easing: 'easeOutQuad'
            });
          });
        }
      });
    </script>
  </head>

  <body>
    <a-scene renderer="antialias: true; colorManagement: true; exposure: 1.2;">
      
      <a-assets>
        <img id="manuscript" src="folio.jpg">
      </a-assets>

      <a-entity environment="preset: library; lighting: point; groundColor: #1a1a1a; grid: none"></a-entity>

      <a-box position="0 0.8 -1.5" width="1.8" height="0.1" depth="1.2" color="#3d2b1f"></a-box>

      <a-plane 
        id="folio-object"
        src="#manuscript" 
        position="0 0.95 -1.5" 
        rotation="-20 0 0" 
        width="1.2" 
        height="0.8" 
        material="shader: standard; metalness: 0.4; roughness: 0.3;"
        shadow="cast: true"
        zoom-on-gaze
        class="clickable">
      </a-plane>

      <a-light type="spot" color="#fff9e0" intensity="2" position="0 3 -0.5" target="#folio-object"></a-light>
      <a-light type="ambient" color="#444"></a-light>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor 
          id="cursor"
          animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
          animation__fusing="property: fusing; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
          event-set__mouseenter="_event: mouseenter; color: #FFD700"
          event-set__mouseleave="_event: mouseleave; color: black"
          raycaster="objects: .clickable">
        </a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
