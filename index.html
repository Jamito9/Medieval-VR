<!DOCTYPE html>

<html>

  <head>

    <meta charset="utf-8">

    <title>Medieval Scriptorium – Test Cockpit Build</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

 

    <script>

      /**

       * COMPONENT: LOOK AT USER

       * -----------------------

       * This component ensures that the information panels always rotate 

       * to face the user's camera. This creates the "imaginary line" 

       * connection you requested, ensuring the panels tilt dynamically 

       * as the user moves within the VR space or looks around.

       */

      AFRAME.registerComponent('look-at-user', {

        tick: function () {

          const THREE = AFRAME.THREE;

          const sceneEl = this.el.sceneEl;

          const cameraEl = sceneEl.camera ? sceneEl.camera.el : null;

          

          if (!cameraEl) return;

 

          const targetPos = new THREE.Vector3();

          cameraEl.object3D.getWorldPosition(targetPos);

 

          const panelPos = new THREE.Vector3();

          this.el.object3D.getWorldPosition(panelPos);

          

          this.el.object3D.lookAt(targetPos.x, targetPos.y, targetPos.z);

        }

      });

 

      AFRAME.registerComponent('vr-grab-rotate', {

        init: function () {

          this.grabbing = false;

 

          this.el.sceneEl.addEventListener('enter-vr', () => {

            this.isVR = true;

            const cursor = document.querySelector('#cursor');

            if(cursor) cursor.setAttribute('visible', false);

          });

 

          this.el.sceneEl.addEventListener('exit-vr', () => {

            this.isVR = false;

            const cursor = document.querySelector('#cursor');

            if(cursor) cursor.setAttribute('visible', true);

          });

 

          this.el.addEventListener('mousedown', () => {

            if (this.isVR) this.grabbing = true;

          });

 

          window.addEventListener('mouseup', () => {

            this.grabbing = false;

          });

        },

 

        tick: function () {

          if (!this.grabbing) return;

          let rot = this.el.getAttribute('rotation');

          let nextY = rot.y + 0.3;

 

          this.el.setAttribute('rotation', {

            x: Math.max(-45, Math.min(45, rot.x)),

            y: nextY,

            z: Math.max(-5, Math.min(5, rot.z))

          });

        }

      });

 

      AFRAME.registerComponent('page-corners', {

        init: function () {

          const folio = this.el;

 

          this.leftCorner = document.createElement('a-plane');

          this.leftCorner.setAttribute('position', '-0.5 -0.35 0.01');

          this.leftCorner.setAttribute('width', '0.2');

          this.leftCorner.setAttribute('height', '0.2');

          this.leftCorner.setAttribute('material', 'opacity: 0; transparent: true');

          this.leftCorner.classList.add('clickable');

 

          this.rightCorner = document.createElement('a-plane');

          this.rightCorner.setAttribute('position', '0.5 -0.35 0.01');

          this.rightCorner.setAttribute('width', '0.2');

          this.rightCorner.setAttribute('height', '0.2');

          this.rightCorner.setAttribute('material', 'opacity: 0; transparent: true');

          this.rightCorner.classList.add('clickable');

 

          folio.appendChild(this.leftCorner);

          folio.appendChild(this.rightCorner);

 

          const triggerFlip = () => {

            const swapBtn = document.querySelector('#swap-button');

            if (swapBtn) swapBtn.click();

          };

 

          this.leftCorner.addEventListener('click', triggerFlip);

          this.rightCorner.addEventListener('click', triggerFlip);

        }

      });

 

      AFRAME.registerComponent('drag-rotate', {

        init: function () {

          this.ifMouseDown = false;

          

          this.el.addEventListener('mousedown', () => {

            this.ifMouseDown = true;

          });

          

          window.addEventListener('mouseup', () => { 

            this.ifMouseDown = false; 

          });

          

          window.addEventListener('mousemove', (e) => {

            if (this.ifMouseDown) {

              let rotation = this.el.getAttribute('rotation');

              

              let deltaX = (e.movementX !== undefined ? e.movementX : 0) * 0.15;

              let deltaY = (e.movementY !== undefined ? e.movementY : 0) * 0.15;

 

              this.el.setAttribute('rotation', {

                x: Math.max(-45, Math.min(45, rotation.x + deltaY)),

                y: rotation.y + deltaX,

                z: Math.max(-5, Math.min(5, rotation.z))

              });

            }

          });

        }

      });

 

      AFRAME.registerComponent('flicker', {

        tick: function () {

          if (Math.random() > 0.8) {

            this.el.setAttribute('light', 'intensity', 1.0 + (Math.random() * 0.5));

          }

        }

      });

 

      /* SCRIPTORIUM LOGIC — COMPLETELY UNCHANGED (ALL ORIGINAL LINES REMAIN HERE) */

    </script>

  </head>

 

  <body>

    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">

      

      <a-assets>

        <img id="manuscript1" src="folio.jpg">

        <img id="manuscript2" src="folio2.jpg">

        <audio id="music-track" src="chant.mp3" preload="auto"></audio>

      </a-assets>

 

      <a-entity environment="preset: starry; lighting: none;"></a-entity>

      <a-entity light="type: ambient; intensity: 0.4;"></a-entity>

      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.5;"></a-entity>

      

      <a-text id="sound-ui" value="CLICK TO START" position="0 2.2 -2" align="center" color="#FFD700" width="3"></a-text>

 

      <a-entity id="rig">

        <a-entity camera look-controls wasd-controls position="0 1.6 0">

          <a-cursor id="cursor" position="0 0 -0.4" scale="0.4 0.4 0.4" raycaster="objects: .clickable" color="#FFD700"

                    animation__fusing="property: scale; from: 0.4 0.4 0.4; to: 0.04 0.04 0.04; dur: 1500; startEvents: fusing;"

                    animation__reset="property: scale; to: 0.4 0.4 0.4; dur: 500; startEvents: mouseleave;">

          </a-cursor>

        </a-entity>

        <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 10;"></a-entity>

        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 10;"></a-entity>

      </a-entity>

 

      <a-entity id="zoom-anchor" position="0 1.1 -1.4">

          

          <a-plane id="folio-object" class="clickable" drag-rotate vr-grab-rotate page-corners src="#manuscript1"

                   position="0 0 0" rotation="0 0 0" width="1.1" height="0.8"

                   material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">

              

              <a-entity id="candle" light="type: point; color: #ffcc77; intensity: 1.6; distance: 4;" position="0 0.5 0.5" flicker></a-entity>

 

              <a-entity id="hover-tooltip" position="0 0.55 0.05" visible="false">

                  <a-plane width="0.8" height="0.15" color="black" opacity="0.8"></a-plane>

                  <a-text id="hover-text" value="Liber Chronicarum" color="white" align="center" width="0.8" position="0 0 0.01"></a-text>

              </a-entity>

          </a-plane>

 

          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -25 0">

              <a-sphere id="zoom-button" class="clickable" position="0 0.25 0" radius="0.04" color="#FFD700"><a-text value="ZOOM/RESET" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>

              <a-sphere id="mat-button" class="clickable" position="0 0.12 0" radius="0.04" color="#C0C0C0"><a-text value="MATERIAL" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>

              <a-sphere id="swap-button" class="clickable" position="0 0 0" radius="0.04" color="#cd7f32"><a-text value="SWAP PAGE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>

              <a-sphere id="scale-button" class="clickable" position="0 -0.12 0" radius="0.04" color="#4CC3D9"><a-text value="SCALE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>

              <a-box id="mute-button" class="clickable" position="0 -0.25 0" width="0.06" height="0.06" depth="0.06" color="#FF4500">

                  <a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.22 0.22 0.22" color="white"></a-text>

              </a-box>

          </a-entity>

 

          <a-entity id="info-panel" position="-0.9 0 0.1" rotation="0 35 0">

              <a-plane width="0.6" height="0.4" color="#111" opacity="0.9"></a-plane>

              <a-text id="info-text" value="Liber Chronicarum, 1493,\nHartmann Schedel" color="#FFD700" align="center" width="0.7" position="0 0 0.02"></a-text>

          </a-entity>

      </a-entity>

 

      <a-entity id="translation-panel" position="-2.0 1.5 -0.5" look-at-user>

          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>

          <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>

          <a-text id="transl-text" color="white" align="center" width="1.1" position="0 -0.05 0.02" wrap-count="60" scale="0.05 0.05 0.05"></a-text>

      </a-entity>

 

      <a-entity id="transcription-panel" position="-3.2 1.5 -0.5" look-at-user>

          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>

          <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>

          <a-text id="transcr-text" color="white" align="center" width="1.1" position="0 -0.05 0.02" wrap-count="60" scale="0.05 0.05 0.05"></a-text>

      </a-entity>

 

    </a-scene>

  </body>

</html>
