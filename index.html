<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Arthurian DH Project - Multi-Folio Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      // Flicker component for atmospheric lighting
      AFRAME.registerComponent('flicker', {
        schema: { min: {type: 'number', default: 1.8}, max: {type: 'number', default: 2.5} },
        tick: function (time, deltaTime) {
          if (Math.random() > 0.9) {
            let intensity = Math.random() * (this.data.max - this.data.min) + this.data.min;
            this.el.setAttribute('light', 'intensity', intensity);
          }
        }
      });

      // Unified Logic for Zoom, Materiality, and Page Swapping
      AFRAME.registerComponent('folio-controls', {
        init: function () {
          var folio = document.querySelector('#folio-object');
          var info = document.querySelector('#info-panel');
          var zoomed = false;
          var materialityMode = false;
          var currentPage = 1;

          // Handle Zoom (Gold Button)
          document.querySelector('#zoom-button').addEventListener('click', function () {
            if (!zoomed) {
              folio.setAttribute('animation', {property: 'position', to: '0 1.3 -0.7', dur: 1200, easing: 'easeInOutQuad'});
              folio.setAttribute('animation__rot', {property: 'rotation', to: '0 0 0', dur: 1200, easing: 'easeInOutQuad'});
              info.setAttribute('visible', 'true');
              this.setAttribute('color', '#AA0000'); 
              zoomed = true;
            } else {
              folio.setAttribute('animation', {property: 'position', to: '0 0.95 -1.5', dur: 1200, easing: 'easeInOutQuad'});
              folio.setAttribute('animation__rot', {property: 'rotation', to: '-25 0 0', dur: 1200, easing: 'easeInOutQuad'});
              info.setAttribute('visible', 'false');
              this.setAttribute('color', '#FFD700'); 
              zoomed = false;
            }
          });

          // Handle Materiality Toggle (Silver Button)
          document.querySelector('#mat-button').addEventListener('click', function () {
            if (!materialityMode) {
              folio.setAttribute('material', 'color', '#888');
              folio.setAttribute('material', 'metalness', '0.8');
              folio.setAttribute('material', 'roughness', '0.2');
              this.setAttribute('color', '#333');
              materialityMode = true;
            } else {
              folio.setAttribute('material', 'color', '#FFF');
              folio.setAttribute('material', 'metalness', '0.3');
              folio.setAttribute('material', 'roughness', '0.5');
              this.setAttribute('color', '#C0C0C0');
              materialityMode = false;
            }
          });

          // Handle Page Swap (Bronze Button)
          document.querySelector('#swap-button').addEventListener('click', function () {
            if (currentPage === 1) {
              folio.setAttribute('src', '#manuscript2');
              currentPage = 2;
              this.setAttribute('color', '#5a3e2b'); // Darker bronze when toggled
            } else {
              folio.setAttribute('src', '#manuscript1');
              currentPage = 1;
              this.setAttribute('color', '#cd7f32'); // Original bronze
            }
          });
        }
      });
    </script>
  </head>

  <body folio-controls>
    <a-scene renderer="antialias: true; colorManagement: true; shadowMapEnabled: true;">
      
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="chant" src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Gregorian_Chant.ogg" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: library; lighting: none; groundColor: #1a1a1a; grid: none;"></a-entity>
      <a-circle position="0 0.01 0" radius="10" rotation="-90 0 0" color="#222" 
                material="roughness: 1; metalness: 0; src: url(https://cdn.aframe.io/a-painter/images/floor.jpg); repeat: 20 20;"
                shadow="receive: true">
      </a-circle>

      <a-box position="0 0.8 -1.5" width="2" height="0.1" depth="1.2" color="#2b1d14" shadow="receive: true"
             sound="src: #chant; autoplay: true; loop: true; volume: 0.6; rolloffFactor: 1.5; refDistance: 1;">
      </a-box>

      <a-plane id="folio-object" 
               src="#manuscript1" 
               position="0 0.95 -1.5" 
               rotation="-25 0 0" 
               width="1.2" 
               height="0.85" 
               material="shader: standard; metalness: 0.3; roughness: 0.5;"
               shadow="cast: true">
      </a-plane>

      <a-entity id="info-panel" position="0.8 1.3 -0.65" visible="false">
          <a-plane width="0.7" height="0.5" color="#111" opacity="0.9"></a-plane>
          <a-text value="DH INTERACTIVE MODULE\n\nControls:\nGold: Zoom View\nSilver: Surface Analysis\nBronze: Toggle Page\n\nAudio: Positional Chant\nEnvironment: Monastic Library" 
                  color="white" align="center" width="0.55" position="0 0 0.01"></a-text>
      </a-entity>

      <a-sphere id="zoom-button" class="clickable" position="0.9 1.15 -1.2" radius="0.05" color="#FFD700">
        <a-text value="ZOOM" align="center" position="0 0.1 0" scale="0.25 0.25 0.25" color="white"></a-text>
      </a-sphere>
      
      <a-sphere id="mat-button" class="clickable" position="0.9 1.05 -1.2" radius="0.05" color="#C0C0C0">
        <a-text value="MATERIAL" align="center" position="0 -0.1 0" scale="0.25 0.25 0.25" color="white"></a-text>
      </a-sphere>

      <a-sphere id="swap-button" class="clickable" position="0.9 0.95 -1.2" radius="0.05" color="#cd7f32">
        <a-text value="SWAP PAGE" align="center" position="0 -0.1 0" scale="0.25 0.25 0.25" color="white"></a-text>
      </a-sphere>

      <a-entity light="type: point; color: #ffcc77; intensity: 2.5; castShadow: true;" 
                position="1.5 2 -0.5" 
                flicker="min: 2.2; max: 2.8">
      </a-entity>
      <a-entity light="type: ambient; color: #112; intensity: 0.5;"></a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor raycaster="objects: .clickable" color="#FFD700"></a-cursor>
      </a-entity>
      
      <a-entity oculus-touch-controls="hand: left"></a-entity>
      <a-entity oculus-touch-controls="hand: right" laser-controls="hand: right" raycaster="objects: .clickable; far: 10;"></a-entity>

    </a-scene>
  </body>
</html>
