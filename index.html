          transcrText.setAttribute('value', pages[0].lat);
          translText.setAttribute('value',  pages[0].eng);
          infoRightText.setAttribute('value', pages[0].infoRight);
          infoRightHeader.setAttribute('value', 'Test 1');

          folio.addEventListener('mouseenter', () => hoverTooltip.setAttribute('visible', 'true'));
          folio.addEventListener('mouseleave', () => hoverTooltip.setAttribute('visible', 'false'));

          // doSwap: updates page counter, metadata, and text panels.
          //
          // When silent=true (called from the curl animation):
          //   folio.setAttribute('src') is NOT called here — the curl path
          //   calls it directly after doSwap with capturedDestSrc, while the
          //   folio is still transparent, so A-Frame's pipeline applies the
          //   correct texture before the folio is revealed.
          //
          // When silent=false (called from the SWAP PAGE button):
          //   Normal A-Frame setAttribute handles the texture load.
          const doSwap = (dir, silent) => {
            if (!silent) playClick();
            // Close all open hotspot panels before the swap so no stale
            // info box from the outgoing folio remains visible on the new one.
            const hs = folio.components && folio.components['folio-hotspots'];
            if (hs && hs.zones) {
                hs.zones.forEach(z => { z.panelOpen = false; z.panel.setAttribute('visible', 'false'); });
            }
            currentPage = ((currentPage - 1 + dir + pages.length) % pages.length) + 1;
            this.el.currentAudioPage = currentPage;
            if (this.el.currentPanelAudio) {
              this.el.currentPanelAudio.pause();
              this.el.currentPanelAudio.currentTime = 0;
              this.el.currentPanelAudio = null;
            }
            const page = pages[currentPage - 1];
            if (!silent) {
              // Button swap: rely on A-Frame's normal texture pipeline
              folio.setAttribute('src', page.src);
            }
            // Always update all metadata
            document.querySelector('#hover-text').setAttribute('value', page.hover);
            transcrText.setAttribute('value', page.lat);
            translText.setAttribute('value',  page.eng);
            infoRightText.setAttribute('value', page.infoRight);
            infoRightHeader.setAttribute('value', currentPage === 1 ? 'Test 1' : 'Test 2');
            document.querySelector('#info-text').setAttribute('value', page.title);
          };

          this.el.doSwap = doSwap;

          document.querySelector('#zoom-button').addEventListener('click', () => {
            // Guard: zoom is meaningless before the lift has run — the anchor is still
            // at the resting position and button-group is not yet visible.
            if (!audioStarted) return;
            playClick(); zoomed = !zoomed;
            infoPanel.setAttribute('visible', !zoomed);
            // Use animation__zoom (named component) so this tween never conflicts
            // with the animation__lift tween in startAudio (both target zoomAnchor
            // position, but named components are independent — one does not cancel the other).
            zoomAnchor.setAttribute('animation__zoom', {
              property: 'position',
              to: zoomed ? '0 1.9 -1.4' : '0 1.55 -2.0',
              dur: 800, easing: 'easeInOutQuad'
            });
          });

          document.querySelector('#mat-button').addEventListener('click', () => {
            playClick(); materialityMode = !materialityMode;
            folio.setAttribute('material', {
              metalness: materialityMode ? 0.9 : 0.1,
              roughness: materialityMode ? 0.1 : 0.8
            });
          });

          document.querySelector('#swap-button').addEventListener('click', () => { doSwap(1, false); });

          document.querySelector('#scale-button').addEventListener('click', () => {
            playClick();
            const s = folio.getAttribute('scale');
            folio.setAttribute('scale', s.x > 1.3 ? '0.7 0.7 0.7' : (s.x < 0.8 ? '1 1 1' : '1.5 1.5 1.5'));
          });

          muteBtn.addEventListener('click', () => {
            playClick(); isMuted = !isMuted;
            if (soundEl.components.sound) {
              isMuted ? soundEl.components.sound.pauseSound() : soundEl.components.sound.playSound();
            }
            muteBtn.setAttribute('color', isMuted ? '#8B0000' : '#FF4500');
            muteLabel.setAttribute('value', isMuted ? 'UNMUTE' : 'MUTE');
          });

          // ── Audio start gate ─────────────────────────────────────────────────
          // Desktop: any window click starts the ambient music (browser autoplay policy).
          // VR:      A (right hand) or X (left hand) button triggers the same action.
          //          The folio is on layer 2 and may be masked by the raycaster when
          //          the user first enters VR, so clicking on the folio is unreliable
          //          as a start trigger. A/X are always available regardless of hand state.
          //
          // audioStarted flag prevents double-firing if both A and X are pressed,
          // or if the user clicks on desktop and then enters VR.
          const soundUiEl = document.querySelector('#sound-ui');
          let audioStarted = false;

          const startAudio = () => {
            if (audioStarted) return;
            audioStarted = true;
            if (soundEl.components.sound) soundEl.components.sound.playSound();
            soundUiEl.setAttribute('visible', 'false');

            // Only run the lift sequence if VR is active.
            // On desktop the folio is already at interaction position (no lectern).
            if (!this.el.is('vr-mode')) return;

            // ── Lectern lift sequence ─────────────────────────────────────────
            // Three simultaneous animations on the folio transform, then a
            // staggered reveal of the UI panels once the folio has settled.
            //
            // 1. zoom-anchor rises from resting (y=1.35, z=−2.2) to interaction
            //    position (y=1.55, z=−2.0), floating slightly forward off the lectern.
            //    Uses animation__lift (named) so the zoom button's animation__zoom
            //    tween on the same entity never cancels this one.
            // 2. folio-object rotation straightens from −20° resting lean to 0°.
            // 3. folio-object scale grows from 0.7 to 1.0.
            //
            // After 1000 ms: text panels revealed.
            // After 1300 ms: button-group and info-panel revealed.

            const LIFT_DUR  = 1200;  // ms — anchor position tween
            const SCALE_DUR = 1000;  // ms — folio scale tween
            const TILT_DUR  = 1000;  // ms — folio rotation tween
            const EASE      = 'easeInOutQuad';

            // Animate zoom-anchor to interaction position (named to avoid zoom conflict)
            zoomAnchor.setAttribute('animation__lift', {
              property: 'position',
              from: '0 1.35 -2.2',
              to:   '0 1.55 -2.0',
              dur: LIFT_DUR, easing: EASE
            });

            // Straighten folio from resting lean
            folio.setAttribute('animation__tilt', {
              property: 'rotation',
              from: '-20 0 0',
              to:   '0 0 0',
              dur: TILT_DUR, easing: EASE
            });

            // Grow folio to full interaction scale
            folio.setAttribute('animation__scale', {
              property: 'scale',
              from: '0.7 0.7 0.7',
              to:   '1 1 1',
              dur: SCALE_DUR, easing: EASE
            });

            // Reveal text panels while the folio is still rising
            setTimeout(() => {
              document.querySelector('#translation-panel').setAttribute('visible', true);
              document.querySelector('#transcription-panel').setAttribute('visible', true);
              document.querySelector('#info-right-panel').setAttribute('visible', true);
            }, 1000);

            // Reveal folio controls once the lift has settled
            setTimeout(() => {
              document.querySelector('#button-group').setAttribute('visible', true);
              infoPanel.setAttribute('visible', true);
            }, 1300);
          };

          // Desktop trigger — fires on any click, but only when NOT in VR.
          // On Quest 2, tapping "Enter VR" in the browser fires a window click
          // event BEFORE enter-vr fires.  Without this guard, startAudio() would
          // run before VR begins: audioStarted=true, lift animation fires early,
          // and enter-vr's early return means the A/X listeners are never attached
          // and the text is never updated to "PRESS A OR X TO START".
          window.addEventListener('click', () => {
            if (!this.el.is('vr-mode')) startAudio();
          }, { once: true });

          // VR trigger — update prompt and wire A/X one-shot listeners.
          this.el.addEventListener('enter-vr', () => {
            // If startAudio already ran (e.g. from a desktop click before entering
            // VR), just hide the prompt — no need to update text or re-attach.
            if (audioStarted) {
              soundUiEl.setAttribute('visible', 'false');
              return;
            }
            soundUiEl.setAttribute('value', 'PRESS A OR X TO START');
            const rightCtrl = document.querySelector('#right-hand');
            const leftCtrl  = document.querySelector('#left-hand');
            const vrStart = () => startAudio();
            if (rightCtrl) rightCtrl.addEventListener('abuttondown', vrStart, { once: true });
            if (leftCtrl)  leftCtrl.addEventListener('xbuttondown',  vrStart, { once: true });
          });

          // Restore desktop prompt if the user exits VR before starting.
          this.el.addEventListener('exit-vr', () => {
            if (!audioStarted) soundUiEl.setAttribute('value', 'CLICK TO START');
          });
        }
      });

    </script>
  </head>

  <body>

    <a-scene scriptorium-logic finger-poke help-panel
             renderer="antialias: false; colorManagement: true; useLegacyLights: true;">

      <!-- timeout="30000": if any asset fails to load within 30 s the scene
           continues anyway rather than hanging on a white screen forever.
           Critical on Quest 2 where a stalled GLB load kills the session. -->
      <a-assets timeout="30000">
        <!-- Medieval library room model — loaded before any interaction is possible -->
        <a-asset-item id="library-gltf"  src="medievallibrary1.glb"  response-type="arraybuffer"></a-asset-item>
        <!-- Lectern — reading stand the folio rests on at scene start -->
        <a-asset-item id="lectern-gltf"  src="medievallectern.glb"   response-type="arraybuffer"></a-asset-item>
        <!-- Desk and candle — dressing to the right of the lectern -->
        <a-asset-item id="table-gltf"    src="table.glb"             response-type="arraybuffer"></a-asset-item>
        <a-asset-item id="candle1-gltf"  src="candle1.glb"           response-type="arraybuffer"></a-asset-item>
        <!-- Monastery stone floor textures (Poly Haven, 1k).
             Loaded as plain images so A-Frame's material component can apply
             them directly with UV repeat — avoids the GLTF mesh shape problem. -->
        <img id="floor-diff" src="assets/monastery_stone_floor_diff_1k.jpg" crossorigin="anonymous">
        <img id="floor-nor"  src="assets/monastery_stone_floor_nor_gl_1k.jpg" crossorigin="anonymous">
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="music-track"    src="chant.mp3"      preload="auto"></audio>
        <audio id="click-track"    src="click.mp3"      preload="auto"></audio>
        <audio id="pageturn-track" src="pageturn1.mp3"  preload="auto"></audio>
        <audio id="latin1-track"   src="latin1.mp3"     preload="auto"></audio>
        <audio id="english1-track" src="english1.mp3"   preload="auto"></audio>
        <audio id="latin2-track"   src="latin2.mp3"     preload="auto"></audio>
        <audio id="english2-track" src="english2.mp3"   preload="auto"></audio>
      </a-assets>

      <!-- ── Starry backdrop ─────────────────────────────────────────────────
           lighting:none keeps A-Frame from generating its own directional
           light — we provide all lights manually below so the library model
           and the folio are lit consistently. The starry sky appears above
           the library model wherever the ceiling is open or absent.
      -->
      <a-entity environment="preset: starry; lighting: none;"></a-entity>

      <!-- ── Medieval library kit ────────────────────────────────────────────
           Placed at y=0 so its floor sits flush with the aframe-environment
           ground plane. Scale 1 1 1 assumes the GLB was exported in metres,
           which matches the existing assets (folio 1.1 m wide, player 1.6 m
           tall). Rotated 180° on Y so the model's natural "entrance" faces
           the player standing at origin looking toward −Z.

           The folio lectern (0, 1.1, −1.4), button panel (+0.9, 1.1, −1.3),
           info panel (−0.9, 1.1, −1.3) and text panels (−2.1, 1.5, −1.0 /
           −2.1, 1.5, 0.2) all sit inside the open floor area of a typical
           medieval library room — clear of bookshelves along the walls.

           If the model appears too large:  set scale="0.5 0.5 0.5"
           If the model faces the wrong way: set rotation="0 0 0"
           If the floor appears raised:      set position="0 -N 0"
      -->
      <a-gltf-model
        id="library-room"
        src="#library-gltf"
        position="0 0 4"
        rotation="0 180 0"
        scale="17 17 17">
      </a-gltf-model>

      <!-- ── Monastery stone floor ───────────────────────────────────────────
           a-circle gives the natural round floor seen in the mockups without
           sharp corners.  radius=7 covers the full interaction zone (folio at
           z=−1.4, user at origin, library kit behind at z=4).
           Centred at z=2 so the disc runs from roughly z=−5 to z=+9.
           rotation="-90 0 0" lays the circle flat (a-circle is vertical by
           default).  y=0.01 raises it 1 cm above the env ground to prevent
           z-fighting.
           repeat:"10 10" tiles the texture so each flagstone is ~1.4 m across
           (14 m diameter ÷ 10 tiles).  The GL-convention normal map is passed
           directly — Three.js / A-Frame handle the correct channel orientation
           automatically.
      -->
      <a-circle id="stone-floor"
        radius="7"
        segments="64"
        rotation="-90 0 0"
        position="0 0.01 2"
        material="shader: standard;
                  src: #floor-diff;
                  normalMap: #floor-nor;
                  repeat: 10 10;
                  roughness: 0.85;
                  metalness: 0.0;
                  side: double;">
      </a-circle>

      <!-- Shared lighting ───────────────────────────────────────────────────
           Ambient raised to 0.45 — scene was too dark after the candle was
           moved off the folio.  Wall sconces unchanged.
      -->
      <a-entity light="type: ambient; color: #ffe4b5; intensity: 0.45;"></a-entity>
      <a-entity light="type: point; color: #e8823a; intensity: 1.2; distance: 9; decay: 2;"
                position="-3.5 2.5 -2.0"></a-entity>
      <a-entity light="type: point; color: #e8823a; intensity: 1.2; distance: 9; decay: 2;"
                position=" 3.5 2.5 -2.0"></a-entity>
      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.5;"></a-entity>
      <a-entity id="click-sound"   sound="src: #click-track; volume: 1.0; poolSize: 5;"></a-entity>
      <a-entity id="rig" vr-locomotion>
        <a-entity camera look-controls wasd-controls position="0 1.6 0">
          <a-cursor id="cursor" position="0 0 -0.4" scale="0.4 0.4 0.4"
                    raycaster="objects: .clickable" color="#FFD700"
                    animation__fusing="property: scale; from: 0.4 0.4 0.4; to: 0.04 0.04 0.04; dur: 1500; startEvents: fusing;"
                    animation__reset="property: scale; to: 0.4 0.4 0.4; dur: 500; startEvents: mouseleave;">
          </a-cursor>
          <!-- sound-ui: inside camera so it always appears centred in view
               regardless of where the user's head is in world space.
               z=-1.2 keeps it at a comfortable reading distance. -->
          <a-text id="sound-ui" value="CLICK TO START"
                  position="0 0.1 -1.2" align="center"
                  color="#FFD700" width="2">
          </a-text>
        </a-entity>
        <a-entity id="left-hand"
                  hand-controls="hand: left; handModelStyle: lowPoly; color: #c8956c"
                  wrist-offset
                  raycaster="objects: .clickable; far: 10; showLine: true; lineColor: #FFD700; lineOpacity: 0.35; direction: 0 1 0;"
                  cursor="fuse: false; downEvents: triggerdown; upEvents: triggerup"
                  hand-finger-curl>
        </a-entity>
        <a-entity id="right-hand"
                  hand-controls="hand: right; handModelStyle: lowPoly; color: #c8956c"
                  wrist-offset
                  raycaster="objects: .clickable; far: 10; showLine: true; lineColor: #FFD700; lineOpacity: 0.35; direction: 0 1 0;"
                  cursor="fuse: false; downEvents: triggerdown; upEvents: triggerup"
                  hand-finger-curl>
        </a-entity>
      </a-entity>

      <!-- ── Desk table ──────────────────────────────────────────────────────
           Moved to x=1.2, z=−1.6 — forward of the lectern (z=−2.2) so the
           candle flame is in front of the folio face, illuminating it from
           the near-right rather than from behind.
           Table is ~0.9 m tall at scale 1 1 1 (metres export).
      -->
      <a-gltf-model
        id="desk-table"
        src="#table-gltf"
        position="1.2 0 -1.6"
        rotation="0 180 0"
        scale="1 1 1"
        model-error-handler>
      </a-gltf-model>

      <!-- ── Desk candle ─────────────────────────────────────────────────────
           Sits on top of the table: y = table height (0.9 m).
           Candle flame tip at world y ≈ 1.09 m.
      -->
      <a-gltf-model
        id="desk-candle"
        src="#candle1-gltf"
        position="1.2 0.9 -1.6"
        rotation="0 0 0"
        scale="1 1 1"
        model-error-handler>
      </a-gltf-model>

      <!-- ── Desk candle flame light ──────────────────────────────────────────
           Flame tip at (1.2, 1.09, −1.6) — forward and right of the folio
           (0, ?, −2.2) so light rakes across the front face of the manuscript.
           Intensity raised to 2.2 and distance to 5 m to better fill the scene.
      -->
      <a-entity id="desk-flame"
                light="type: point; color: #ffcc77; intensity: 2.2; distance: 5; decay: 2;"
                position="1.2 1.09 -1.6"
                flicker>
      </a-entity>

      <!-- ── Folio fill light ────────────────────────────────────────────────
           Raised to intensity 0.7 to compensate for the scene being too dark.
           Positioned between the desk candle and the folio centre.
      -->
      <a-entity light="type: point; color: #ffe4c0; intensity: 0.7; distance: 3.0; decay: 2;"
                position="0.5 1.55 -1.9">
      </a-entity>

      <!-- ── Bookcase candle lights ──────────────────────────────────────────
           Four subtle flickering point lights matching the candles/lanterns
           visible on the library bookcase units.  brightness:0.28 on the
           flicker component scales the output to range ≈0.25–0.50 — warm
           backlighting that separates the bookcases from the darkness without
           competing with the desk candle.
           Positions approximate the bookcase candle/lantern locations given
           the library GLB is at position="0 0 4" rotation="0 180 0" scale=17.
           Tune x/y/z per bookcase if the library model shifts.
      -->
      <a-entity light="type: point; color: #e8823a; intensity: 0.4; distance: 3.5; decay: 2;"
                position="-4.0 2.8 1.5" flicker="brightness: 0.28"></a-entity>
      <a-entity light="type: point; color: #e8823a; intensity: 0.4; distance: 3.5; decay: 2;"
                position="-1.6 2.8 0.8" flicker="brightness: 0.28"></a-entity>
      <a-entity light="type: point; color: #e8823a; intensity: 0.4; distance: 3.5; decay: 2;"
                position=" 1.6 2.8 0.8" flicker="brightness: 0.28"></a-entity>
      <a-entity light="type: point; color: #e8823a; intensity: 0.4; distance: 3.5; decay: 2;"
                position=" 4.0 2.8 1.5" flicker="brightness: 0.28"></a-entity>

      <!-- ── Medieval lectern ────────────────────────────────────────────────
           Positioned at z=−2.2 — further from the user than the original
           z=−1.4 to give comfortable viewing distance.
           Rotation 0 0 0 faces the lectern's front toward the user.
           Scale 1 1 1 assumes the GLB is in metres.
           The lectern is a static prop: no class, no interaction component.
      -->
      <a-gltf-model
        id="lectern-model"
        src="#lectern-gltf"
        position="0 0 -2.2"
        rotation="0 0 0"
        scale="1 1 1"
        model-error-handler>
      </a-gltf-model>

      <!-- ── Folio anchor — resting state ──────────────────────────────────
           zoom-anchor y=1.15 z=−2.2 places the folio above the lectern reading
           surface at the new position.  On startAudio it lifts to y=1.4, z=−2.0.
           folio-object starts at scale 0.7 and rotation −20° on X (leaning
           back on the sloped lectern surface), then animates to scale 1,
           rotation 0 when the experience begins.
           button-group and info-panel start hidden; they reveal after the lift.
      -->
      <a-entity id="zoom-anchor" position="0 1.35 -2.2">

          <a-plane id="folio-object" class="clickable"
                   drag-rotate vr-grab-rotate page-curl folio-hotspots
                   src="#manuscript1"
                   position="0 0 0" rotation="-20 0 0"
                   scale="0.7 0.7 0.7"
                   width="1.1" height="0.8"
                   material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">

              <a-entity id="hover-tooltip" position="0 0.55 0.05" visible="false">
                  <a-plane width="0.8" height="0.15" color="black" opacity="0.8"></a-plane>
                  <a-text id="hover-text" value="Liber Chronicarum" color="white"
                          align="center" width="0.8" position="0 0 0.05"></a-text>
              </a-entity>

          </a-plane>

          <!-- Hidden until folio lift animation completes -->
          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -25 0" visible="false">
              <a-sphere id="zoom-button"  class="clickable" haptic-button position="0 0.25 0"  radius="0.04" color="#FFD700"><a-text value="ZOOM/RESET" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="mat-button"   class="clickable" haptic-button position="0 0.12 0"  radius="0.04" color="#C0C0C0"><a-text value="MATERIAL"   position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="swap-button"  class="clickable" haptic-button position="0 0 0"     radius="0.04" color="#cd7f32"><a-text value="SWAP PAGE"  position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="scale-button" class="clickable" haptic-button position="0 -0.12 0" radius="0.04" color="#4CC3D9"><a-text value="SCALE"      position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-box id="mute-button" class="clickable" haptic-button
                     position="0 -0.25 0" width="0.06" height="0.06" depth="0.06" color="#FF4500">
                  <a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-box>
          </a-entity>

          <!-- Hidden until folio lift animation completes -->
          <a-entity id="info-panel" position="-0.9 0 0.1" rotation="0 35 0" visible="false">
              <a-plane width="0.6" height="0.4" color="#111" opacity="0.9"></a-plane>
              <a-text id="info-text" value="Liber Chronicarum, 1493,\nHartmann Schedel"
                      color="#FFD700" align="center" width="0.7" position="0 0 0.05"></a-text>
          </a-entity>

      </a-entity>

      <!-- Hidden until folio lift animation completes -->
      <a-entity id="translation-panel"
                position="-1.5 1.5 -0.6" look-at-user
                visible="false"
                panel-audio="type: english">
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>
          <a-text id="transl-text" color="white" align="center" baseline="top"
                  width="1.05" position="0 0.6 0.02" wrap-count="50"></a-text>
      </a-entity>

      <!-- Hidden until folio lift animation completes -->
      <a-entity id="transcription-panel"
                position="-1.5 1.5 0.6" look-at-user
                visible="false"
                panel-audio="type: latin">
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>
          <a-text id="transcr-text" color="white" align="center" baseline="top"
                  width="1.05" position="0 0.6 0.02" wrap-count="50"></a-text>
      </a-entity>

      <!-- Hidden until folio lift animation completes -->
      <a-entity id="info-right-panel"
                position="1.5 1.5 -0.4" look-at-user
                visible="false">
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text id="info-right-header" value="Test 1" color="#FFD700" align="center"
                  width="1.1" position="0 0.8 0.02"></a-text>
          <a-text id="info-right-text" color="white" align="center" baseline="top"
                  width="1.05" position="0 0.6 0.02" wrap-count="50"></a-text>
      </a-entity>

      <!-- ── Help overlay ───────────────────────────────────────────────────────
           Toggled by B (right hand) or Y (left hand).
           Positioned directly in front of the lectern at comfortable reading
           height. look-at-user keeps it yaw-facing the player at all times.
