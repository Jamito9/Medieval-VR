<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium – Test Cockpit Build</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
   <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <script>

      AFRAME.registerComponent('look-at-user', {
        init: function () {
          this.targetPos = new THREE.Vector3();
          this.panelPos  = new THREE.Vector3();
        },
        tick: function () {
          const sceneEl  = this.el.sceneEl;
          const cameraEl = sceneEl.camera ? sceneEl.camera.el : null;
          if (!cameraEl) return;
          cameraEl.object3D.getWorldPosition(this.targetPos);
          this.el.object3D.getWorldPosition(this.panelPos);
          this.el.object3D.lookAt(this.targetPos.x, this.targetPos.y, this.targetPos.z);
        }
      });

      AFRAME.registerComponent('vr-locomotion', {
        init: function () {
          this.isVR      = false;
          this.leftCtrl  = null;
          this.rightCtrl = null;
          this._forward  = new THREE.Vector3();
          this._right    = new THREE.Vector3();
          this._snapUsed = false;
          const scene = this.el.sceneEl;
          scene.addEventListener('enter-vr', () => { this.isVR = true;  });
          scene.addEventListener('exit-vr',  () => { this.isVR = false; });
          scene.addEventListener('loaded', () => {
            this.leftCtrl  = document.querySelector('[laser-controls="hand: left"]');
            this.rightCtrl = document.querySelector('[laser-controls="hand: right"]');
          });
        },
        _getGamepad: function (ctrl) {
          if (!ctrl) return null;
          const tc = ctrl.components && ctrl.components['tracked-controls'];
          return (tc && tc.controller && tc.controller.gamepad) || null;
        },
        tick: function (t, dt) {
          if (!this.isVR) return;
          const leftGP  = this._getGamepad(this.leftCtrl);
          const rightGP = this._getGamepad(this.rightCtrl);
          if (leftGP) {
            const stickX   = leftGP.axes[2] || 0;
            const stickY   = leftGP.axes[3] || 0;
            const deadzone = 0.2;
            if (Math.abs(stickX) > deadzone || Math.abs(stickY) > deadzone) {
              const camEl = this.el.sceneEl.camera ? this.el.sceneEl.camera.el : null;
              if (camEl) {
                camEl.object3D.getWorldDirection(this._forward);
                this._forward.y = 0;
                this._forward.negate();
                this._forward.normalize();
                this._right.crossVectors(this._forward, new THREE.Vector3(0, 1, 0)).normalize();
                const speed = 0.004;
                const pos   = this.el.object3D;
                pos.position.addScaledVector(this._forward, -stickY * speed * dt);
                pos.position.addScaledVector(this._right,    stickX * speed * dt);
              }
            }
          }
          if (rightGP) {
            const stickX = rightGP.axes[2] || 0;
            if (Math.abs(stickX) > 0.6 && !this._snapUsed) {
              const snapRad = stickX > 0 ? -THREE.MathUtils.degToRad(45) : THREE.MathUtils.degToRad(45);
              this.el.object3D.rotation.y += snapRad;
              this._snapUsed = true;
            } else if (Math.abs(stickX) < 0.3) {
              this._snapUsed = false;
            }
          }
        }
      });

      AFRAME.registerComponent('vr-grab-rotate', {
        init: function () {
          this.grabbing              = false;
          this.activeController      = null;
          this.previousControllerPos = new THREE.Vector3();
          this.currentControllerPos  = new THREE.Vector3();
          this.triggerHaptic = (intensity, duration) => {
            if (this.activeController && this.activeController.components['tracked-controls']) {
              const controller = this.activeController.components['tracked-controls'].controller;
              if (controller && controller.gamepad && controller.gamepad.hapticActuators.length > 0) {
                controller.gamepad.hapticActuators[0].pulse(intensity, duration);
              }
            }
          };
          this.el.sceneEl.addEventListener('enter-vr', () => { this.isVR = true;  });
          this.el.sceneEl.addEventListener('exit-vr',  () => { this.isVR = false; });
          this.el.addEventListener('mousedown', (evt) => {
            if (this.isVR && evt.detail.cursorEl) {
              this.grabbing         = true;
              this.activeController = evt.detail.cursorEl;
              this.activeController.object3D.getWorldPosition(this.previousControllerPos);
              this.triggerHaptic(0.6, 50);
            }
          });
          const stopGrabbing = () => { this.grabbing = false; this.activeController = null; };
          this.el.addEventListener('mouseup',    stopGrabbing);
          this.el.addEventListener('mouseleave', stopGrabbing);
        },
        tick: function () {
          if (!this.grabbing || !this.activeController) return;
          this.activeController.object3D.getWorldPosition(this.currentControllerPos);
          const deltaX      = this.currentControllerPos.x - this.previousControllerPos.x;
          const deltaY      = this.currentControllerPos.y - this.previousControllerPos.y;
          const sensitivity = 300;
          const rot         = this.el.getAttribute('rotation');
          const nextX       = Math.max(-30, Math.min(30, rot.x + deltaY * sensitivity));
          const nextY       = Math.max(-30, Math.min(30, rot.y - deltaX * sensitivity));
          this.el.setAttribute('rotation', { x: nextX, y: nextY, z: 0 });
          this.previousControllerPos.copy(this.currentControllerPos);
          const movement = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
          if (movement > 0.0001) { this.triggerHaptic(Math.min(0.5, Math.max(0.1, movement * 500)), 20); }
        }
      });

      AFRAME.registerComponent('haptic-button', {
        init: function () {
          this.el.addEventListener('mousedown', (evt) => {
            const controller = evt.detail.cursorEl;
            if (controller && controller.components['tracked-controls']) {
              const gamepad = controller.components['tracked-controls'].controller.gamepad;
              if (gamepad && gamepad.hapticActuators.length > 0) {
                gamepad.hapticActuators[0].pulse(0.4, 30);
              }
            }
          });
        }
      });

      AFRAME.registerComponent('page-curl', {

        init: function () {
          const folio = this.el;
          const scene = folio.sceneEl;

          this.isCurling        = false;
          this.curlSide         = null;
          this.activeController = null;
          this.startX           = 0;
          this.peelProgress     = 0;
          this.isVR             = false;
          this._ctrlPos         = new THREE.Vector3();
          this.R                = 0.04;
          this._animAborted       = false;
          this._watchdog          = null;
          this._mouseX            = 0;
          this._savedTexMap       = null;
          this._skipFirstCurlTick = false;

          // Texture cache: populated at scene load via THREE.TextureLoader.
          // Key = asset selector string e.g. '#manuscript1'.
          // Using THREE.TextureLoader guarantees the texture is fully decoded and
          // GPU-uploadable, unlike new THREE.Texture(img) which may not be on Quest 2.
          this._texCache = {};
          this._texLoader = new THREE.TextureLoader();

          this._trackMouse = (e) => { this._mouseX = e.clientX; };
          window.addEventListener('mousemove', this._trackMouse);

          scene.addEventListener('enter-vr', () => {
            this.isVR = true;
            this.rightCorner.classList.remove('clickable');
            this.leftCorner.classList.remove('clickable');
          });
          scene.addEventListener('exit-vr', () => {
            this.isVR = false;
            if (this.isCurling) { this.resetCurl(); }
            this.rightCorner.classList.add('clickable');
            this.leftCorner.classList.add('clickable');
          });

          // Preload all page textures once the scene has finished loading.
          // This runs before any user interaction, so textures are ready before
          // the first page turn on both desktop and Quest 2 WebXR.
          scene.addEventListener('loaded', () => {
            const pages = scene.pages;
            if (!pages) return;
            pages.forEach(page => {
              const imgEl = document.querySelector(page.src);
              if (!imgEl) return;
              // imgEl.src is the absolute URL e.g. http://192.168.x.x:8080/folio.jpg
              const url = imgEl.src || imgEl.getAttribute('src');
              if (!url) return;
              this._texLoader.load(url, (tex) => {
                // THREE.TextureLoader default flipY=true is correct for standard WebGL.
                this._texCache[page.src] = tex;
              });
            });
          });

          this.curlGeo = new THREE.PlaneGeometry(1.1, 0.8, 60, 40);
          const posAttr = this.curlGeo.attributes.position;
          const vCount  = posAttr.count;
          this.origX = new Float32Array(vCount);
          this.origY = new Float32Array(vCount);
          for (let i = 0; i < vCount; i++) {
            this.origX[i] = posAttr.getX(i);
            this.origY[i] = posAttr.getY(i);
          }

          this.curlMat = new THREE.MeshStandardMaterial({
            side: THREE.FrontSide, roughness: 0.8, metalness: 0.1, transparent: false
          });
          this.curlMesh          = new THREE.Mesh(this.curlGeo, this.curlMat);
          this.curlMesh.position.z = 0.001;
          this.curlMesh.visible    = false;
          folio.object3D.add(this.curlMesh);

          this.backCurlMat = new THREE.MeshStandardMaterial({
            side: THREE.BackSide, roughness: 0.85, metalness: 0.05,
            color: new THREE.Color(0.88, 0.82, 0.68), transparent: false
          });
          this.backCurlMesh          = new THREE.Mesh(this.curlGeo, this.backCurlMat);
          this.backCurlMesh.position.z = 0.001;
          this.backCurlMesh.visible    = false;
          folio.object3D.add(this.backCurlMesh);

          const shadowGeo = new THREE.PlaneGeometry(1.1, 0.8);
          this.shadowMat  = new THREE.MeshBasicMaterial({
            color: 0x000000, transparent: true, opacity: 0, depthWrite: false
          });
          this.shadowMesh          = new THREE.Mesh(shadowGeo, this.shadowMat);
          this.shadowMesh.position.z = 0.0025;
          this.shadowMesh.visible    = false;
          folio.object3D.add(this.shadowMesh);

          this.backPage = document.createElement('a-plane');
          this.backPage.setAttribute('width',    '1.1');
          this.backPage.setAttribute('height',   '0.8');
          this.backPage.setAttribute('position', '0 0 -0.004');
          this.backPage.setAttribute('material',
            'shader: standard; metalness: 0.1; roughness: 0.8; side: double');
          this.backPage.setAttribute('visible', 'false');
          folio.appendChild(this.backPage);

          this.rightCorner = document.createElement('a-plane');
          this.rightCorner.setAttribute('position', '0.4 -0.3 0.01');
          this.rightCorner.setAttribute('width',    '0.25');
          this.rightCorner.setAttribute('height',   '0.25');
          this.rightCorner.setAttribute('material', 'opacity: 0; transparent: true');
          this.rightCorner.classList.add('clickable');
          folio.appendChild(this.rightCorner);

          this.leftCorner = document.createElement('a-plane');
          this.leftCorner.setAttribute('position', '-0.4 -0.3 0.01');
          this.leftCorner.setAttribute('width',    '0.25');
          this.leftCorner.setAttribute('height',   '0.25');
          this.leftCorner.setAttribute('material', 'opacity: 0; transparent: true');
          this.leftCorner.classList.add('clickable');
          folio.appendChild(this.leftCorner);

          const playPageTurn = () => {
            const audio = document.querySelector('#pageturn-track');
            if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
          };

          // Apply the destination texture to the folio mesh before it is revealed.
          // Three-tier fallback to be maximally robust on Quest 2 WebXR:
          //   1. _texCache: loaded by THREE.TextureLoader at scene startup — guaranteed
          //      to be ready by the time any page turn can be triggered.
          //   2. backPage mesh map: A-Frame may have loaded it during the animation.
          //   3. Build directly from the preloaded <img> element as a last resort.
          const applyDestTex = (destSrc) => {
            const fMesh = folio.getObject3D('mesh');
            if (!fMesh || !fMesh.material) return;

            // Tier 1: our own preloaded cache (most reliable in WebXR)
            if (this._texCache[destSrc]) {
              fMesh.material.map         = this._texCache[destSrc];
              fMesh.material.needsUpdate = true;
              return;
            }

            // Tier 2: A-Frame-loaded texture on the backPage
            const bpMesh = this.backPage.getObject3D('mesh');
            if (bpMesh && bpMesh.material && bpMesh.material.map) {
              fMesh.material.map         = bpMesh.material.map;
              fMesh.material.needsUpdate = true;
              return;
            }

            // Tier 3: build directly from the preloaded <img> element
            const imgEl = document.querySelector(destSrc);
            if (imgEl && (imgEl.complete || imgEl.naturalWidth > 0)) {
              const tex = new THREE.Texture(imgEl);
              tex.needsUpdate        = true;
              fMesh.material.map         = tex;
              fMesh.material.needsUpdate = true;
            }
          };

          const easeInOut = (t) => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
          const easeOut   = (t) => 1 - (1-t)*(1-t);

          this._completeCurl = () => {
            playPageTurn();
            this.activeController = null;
            const startProg      = this.peelProgress;
            const capturedSide   = this.curlSide;
            const startTime      = performance.now();
            const duration       = 450;

            // Capture destination src NOW (before any async state changes)
            const pages      = scene.pages;
            const currentIdx = (scene.currentAudioPage || 1) - 1;
            const dir        = capturedSide === 'right' ? 1 : -1;
            const nextIdx    = (currentIdx + dir + pages.length) % pages.length;
            const capturedDestSrc = pages[nextIdx].src;

            const animate = (now) => {
              if (this._animAborted) return;
              const raw   = Math.min((now - startTime) / duration, 1);
              const eased = easeInOut(raw);
              this.peelProgress = startProg + (1 - startProg) * eased;
              this.updateCurl(this.peelProgress, capturedSide);
              if (raw < 1) {
                requestAnimationFrame(animate);
              } else {
                setTimeout(() => {
                  if (this._animAborted) return;

                  // 1. Update page index, text panels and metadata FIRST so UI
                  //    state is consistent before the texture changes.
                  if (scene.doSwap) scene.doSwap(dir, true);

                  // 2. Keep A-Frame's DOM in sync so the inspector and other
                  //    components know the src has changed. This also primes
                  //    A-Frame's internal material reference to the correct
                  //    asset so any subsequent late-firing async callbacks
                  //    reinforce rather than revert the texture.
                  folio.setAttribute('src', capturedDestSrc);

                  // 3. Force the Three.js material map to update immediately
                  //    using the robust Tier-1 WebXR pre-loaded texture cache.
                  //    applyDestTex writes fMesh.material.map synchronously from
                  //    _texCache (populated by THREE.TextureLoader at scene load),
                  //    which is the most reliable texture source on Quest 2 WebXR
                  //    where material-texture-loaded is not guaranteed to fire.
                  applyDestTex(capturedDestSrc);

                  // 4. Safely reveal the folio. Both setAttribute and applyDestTex
                  //    have already run synchronously in this same setTimeout
                  //    callback, so the XR rAF cannot interleave between them.
                  if (this.isCurling) this.resetCurl();

                }, 50);
              }
            };
            requestAnimationFrame(animate);
          };

          this._snapBack = () => {
            this.activeController = null;
            const startProg    = this.peelProgress;
            const capturedSide = this.curlSide;
            const startTime    = performance.now();
            const duration     = 350;
            const animate = (now) => {
              if (this._animAborted) return;
              const raw   = Math.min((now - startTime) / duration, 1);
              const eased = easeOut(raw);
              this.peelProgress = startProg * (1 - eased);
              this.updateCurl(this.peelProgress, capturedSide);
              if (raw < 1) {
                requestAnimationFrame(animate);
              } else {
                setTimeout(() => {
                  if (!this._animAborted) {
                    // Restore original texture directly before revealing
                    const fMesh = folio.getObject3D('mesh');
                    if (fMesh && fMesh.material && this._savedTexMap) {
                      fMesh.material.map         = this._savedTexMap;
                      fMesh.material.needsUpdate = true;
                    }
                    // Texture is restored via _savedTexMap (Three.js direct).
                        // No folio.setAttribute('src') — avoids A-Frame async race on Quest 2.
                    this.resetCurl();
                  }
                }, 50);
              }
            };
            requestAnimationFrame(animate);
          };

          const startCurl = (side, controllerEl) => {
            if (this.isCurling) return;
            const pages      = scene.pages;
            const currentIdx = (scene.currentAudioPage || 1) - 1;
            const dir        = side === 'right' ? 1 : -1;
            const nextIdx    = (currentIdx + dir + pages.length) % pages.length;

            const folioMesh = folio.getObject3D('mesh');
            if (folioMesh && folioMesh.material) {
              // Snapshot current texture so snapBack can restore it
              this._savedTexMap = folioMesh.material.map || null;

              if (folioMesh.material.map) {
                this.curlMat.map             = folioMesh.material.map;
                this.curlMat.map.minFilter   = THREE.LinearFilter;
                this.curlMat.map.anisotropy  = Math.min(16,
                  folio.sceneEl.renderer ? folio.sceneEl.renderer.capabilities.getMaxAnisotropy() : 16);
                this.curlMat.map.needsUpdate = true;
                this.curlMat.needsUpdate     = true;
              }
              this.curlMat.metalness     = folioMesh.material.metalness;
              this.curlMat.roughness     = folioMesh.material.roughness;
              this.backCurlMat.metalness = folioMesh.material.metalness;
              this.backCurlMat.roughness = folioMesh.material.roughness;

              // Hide the folio while the curl animation plays.
              // Using opacity (not .visible) keeps the A-Frame material object stable.
              folioMesh.material.transparent = true;
              folioMesh.material.opacity     = 0;
              folioMesh.material.needsUpdate = true;

              // Texture is applied at commit time via applyDestTex() which uses
              // _texCache (THREE.TextureLoader preloaded at scene startup).
              // We do NOT call folio.setAttribute('src') here: that triggers
              // A-Frame's async material pipeline which races with Three.js on
              // Quest 2, causing delayed callbacks to overwrite the correct texture.
            }

            // backPage provides the visual destination texture backdrop during
            // the animation AND is a secondary source for applyDestTex (Tier 2).
            const _bpDestSrc = pages[nextIdx].src;
            this.backPage.setAttribute('src', _bpDestSrc);
            this.backPage.setAttribute('visible', 'true');
            // Quest 2 WebXR: setAttribute('src') is async — the texture will not be on
            // backPage.material.map in time for the first rendered frame of the curl.
            // Push the pre-cached texture onto the Three.js material immediately, and
            // again on the next frame in case the mesh was not yet initialised this frame.
            const _applyBPTex = () => {
              const bpMesh = this.backPage.getObject3D('mesh');
              if (bpMesh && bpMesh.material && this._texCache[_bpDestSrc]) {
                bpMesh.material.map = this._texCache[_bpDestSrc];
                bpMesh.material.needsUpdate = true;
              }
            };
            _applyBPTex();
            requestAnimationFrame(_applyBPTex);
            this.curlMesh.visible     = true;
            this.backCurlMesh.visible = true;
            this.shadowMesh.visible   = true;
            this._animAborted         = false;
            this._skipFirstCurlTick   = true;
            this.isCurling            = true;
            this.curlSide             = side;
            this.peelProgress         = 0;
            this.activeController     = controllerEl || null;

            if (this.activeController) {
              this.activeController.object3D.getWorldPosition(this._ctrlPos);
              this.startX = this._ctrlPos.x;
            } else {
              this.startMouseX = this._mouseX;
            }

            this.updateCurl(0, side);
            this._watchdog = setTimeout(() => { if (this.isCurling) { this.resetCurl(); } }, 3500);
          };

          this._onMouseMoveCurl = (e) => {
            if (!this.isCurling || this.isVR) return;
            const dx          = this.startMouseX - e.clientX;
            const sensitivity = 1 / (window.innerWidth * 0.4);
            let newProgress;
            if (this.curlSide === 'right') {
              newProgress = Math.max(0, Math.min(1,  dx * sensitivity));
            } else {
              newProgress = Math.max(0, Math.min(1, -dx * sensitivity));
            }
            this.peelProgress = newProgress;
            this.updateCurl(this.peelProgress, this.curlSide);
          };
          this._onMouseUpCurl = () => {
            if (!this.isCurling || this.isVR) return;
            if (this.peelProgress >= 0.25) { this._completeCurl(); } else { this._snapBack(); }
          };
          window.addEventListener('mousemove', this._onMouseMoveCurl);
          window.addEventListener('mouseup',   this._onMouseUpCurl);

          this.rightCorner.addEventListener('mousedown', (evt) => {
            evt.stopPropagation();
            if (this.isVR) return;
            startCurl('right', null);
          });
          this.leftCorner.addEventListener('mousedown', (evt) => {
            evt.stopPropagation();
            if (this.isVR) return;
            startCurl('left', null);
          });

          scene.addEventListener('loaded', () => {
            const rightCtrl = document.querySelector('[laser-controls="hand: right"]');
            const leftCtrl  = document.querySelector('[laser-controls="hand: left"]');

            const isHotspotTargeted = () => {
              const hs = folio.components['folio-hotspots'];
              return hs && hs.targetedPanel !== null;
            };

            const isAudioHovered = () => {
              const ctrls = [rightCtrl, leftCtrl];
              for (const ctrl of ctrls) {
                if (!ctrl) continue;
                const rc = ctrl.components && ctrl.components.raycaster;
                if (!rc || !rc.intersectedEls) continue;
                for (const el of rc.intersectedEls) {
                  let node = el;
                  while (node && node !== document) {
                    if (node.hasAttribute && node.hasAttribute('panel-audio')) return true;
                    node = node.parentNode;
                  }
                }
              }
              return false;
            };

            // Curl must only fire when the controller laser is actually
            // intersecting the folio — pressing A while pointing at empty space
            // or at a non-folio entity must not start a curl (or play the sound).
            const isFolioTargeted = (ctrl) => {
              if (!ctrl) return false;
              const rc = ctrl.components && ctrl.components.raycaster;
              if (!rc || !rc.intersectedEls) return false;
              return rc.intersectedEls.indexOf(folio) >= 0;
            };

            if (rightCtrl) {
              rightCtrl.addEventListener('abuttondown', () => {
                if (!this.isVR || this.isCurling) return;
                if (isHotspotTargeted() || isAudioHovered()) return;
                if (!isFolioTargeted(rightCtrl)) return;
                startCurl('right', rightCtrl);
              });
              rightCtrl.addEventListener('abuttonup', () => {
                if (!this.isCurling || !this.isVR || !this.activeController) return;
                // Mirror desktop mouseup: only complete if peel has meaningful
                // progress; otherwise snap back. This prevents the page-turn sound
                // firing on any brief A press while pointing at the folio.
                if (this.peelProgress >= 0.25) { this._completeCurl(); } else { this._snapBack(); }
              });
            }
            if (leftCtrl) {
              leftCtrl.addEventListener('xbuttondown', () => {
                if (!this.isVR || this.isCurling) return;
                if (isHotspotTargeted() || isAudioHovered()) return;
                if (!isFolioTargeted(leftCtrl)) return;
                startCurl('left', leftCtrl);
              });
              leftCtrl.addEventListener('xbuttonup', () => {
                if (!this.isCurling || !this.isVR || !this.activeController) return;
                if (this.peelProgress >= 0.25) { this._completeCurl(); } else { this._snapBack(); }
              });
            }
          });
        },

        updateCurl: function (peelProgress, side) {
          const R_base  = this.R;
          const posAttr = this.curlGeo.attributes.position;
          const basePeelX = side === 'right'
            ?  0.55 - peelProgress * 1.1
            : -0.55 + peelProgress * 1.1;

          for (let i = 0; i < posAttr.count; i++) {
            const x0 = this.origX[i];
            const y0 = this.origY[i];
            const yN = (y0 + 0.4) / 0.8;
            const diagOffset = 0.09 * peelProgress * (1.0 - yN);
            const localPeelX = side === 'right'
              ? basePeelX - diagOffset
              : basePeelX + diagOffset;
            const R   = R_base * (0.60 + 0.40 * yN);
            const piR = Math.PI * R;
            const bW  = piR * 0.10;
            const d   = side === 'right' ? x0 - localPeelX : localPeelX - x0;
            let nx, ny, nz;
            if (d <= 0) {
              nx = x0; ny = y0; nz = 0;
            } else if (d <= piR) {
              const a = d / R;
              nx = side === 'right' ? localPeelX + R * Math.sin(a) : localPeelX - R * Math.sin(a);
              nz = R * (1.0 - Math.cos(a));
              const liftFrac = nz / (2.0 * R);
              const sagPeak  = Math.sin(peelProgress * Math.PI) * 0.03;
              ny = y0 - liftFrac * sagPeak * yN;
            } else if (d <= piR + bW) {
              const t     = (d - piR) / bW;
              const blend = t * t * (3.0 - 2.0 * t);
              const flatNx = 2.0 * localPeelX - x0;
              nx = localPeelX + (flatNx - localPeelX) * blend;
              nz = 2.0 * R * (1.0 - blend) + (-0.002) * blend;
              ny = y0;
            } else {
              nx = 2.0 * localPeelX - x0;
              ny = y0;
              nz = -0.002;
            }
            posAttr.setXYZ(i, nx, ny, nz);
          }

          posAttr.needsUpdate = true;
          this.curlGeo.computeVertexNormals();
          this.shadowMat.opacity     = Math.sin(peelProgress * Math.PI) * 0.45;
          this.shadowMesh.visible    = peelProgress > 0.005;
          const sweepW               = peelProgress * 1.1;
          const sweepCx              = side === 'right' ? 0.55 - sweepW * 0.5 : -0.55 + sweepW * 0.5;
          this.shadowMesh.scale.x    = Math.max(0.001, sweepW / 1.1);
          this.shadowMesh.position.x = sweepCx;
        },

        resetCurl: function () {
          clearTimeout(this._watchdog);
          this._watchdog    = null;
          this._animAborted = true;

          // Restore folio visibility. applyDestTex (or snapBack) has already
          // set the correct material.map before this is called, so the revealed
          // folio immediately shows the right texture with no flash.
          const folioMesh = this.el.getObject3D('mesh');
          if (folioMesh && folioMesh.material) {
            folioMesh.material.opacity     = 1;
            folioMesh.material.transparent = false;
            folioMesh.material.needsUpdate = true;
          }

          this.curlMesh.visible     = false;
          this.backCurlMesh.visible = false;
          this.shadowMesh.visible   = false;
          this.backPage.setAttribute('visible', 'false');

          const posAttr = this.curlGeo.attributes.position;
          for (let i = 0; i < posAttr.count; i++) {
            posAttr.setXYZ(i, this.origX[i], this.origY[i], 0);
          }
          posAttr.needsUpdate = true;

          this.isCurling         = false;
          this.curlSide          = null;
          this.activeController  = null;
          this.peelProgress      = 0;
          this._savedTexMap      = null;
          this.shadowMat.opacity     = 0;
          this.shadowMesh.scale.x    = 1;
          this.shadowMesh.position.x = 0;
        },

        tick: function () {
          if (!this.isCurling || !this.isVR || !this.activeController) return;
          const tc = this.activeController.components &&
                     this.activeController.components['tracked-controls'];
          if (!tc || !tc.controller || !tc.controller.gamepad) return;
          const gp  = tc.controller.gamepad;
          const btn = gp.buttons[4];
          if (this._skipFirstCurlTick) {
            // Skip button check on the first tick after startCurl.
            // On Quest 2 the gamepad state may not yet reflect the button
            // being held on the same frame as abuttondown, causing tick to
            // see !btn.pressed and immediately fire _completeCurl (and the
            // page turn sound) on the press frame rather than the release frame.
            this._skipFirstCurlTick = false;
          } else if (btn && !btn.pressed) {
            // Null the controller before the branch so abuttonup/xbuttonup
            // events that may fire in the same JS turn cannot double-trigger.
            this.activeController = null;
            if (this.peelProgress >= 0.25) { this._completeCurl(); } else { this._snapBack(); }
            return;
          }
          this.activeController.object3D.getWorldPosition(this._ctrlPos);
          const deltaX      = this._ctrlPos.x - this.startX;
          const sensitivity = 4.0;
          let newProgress;
          if (this.curlSide === 'right') {
            newProgress = Math.max(0, Math.min(1, -deltaX * sensitivity));
          } else {
            newProgress = Math.max(0, Math.min(1,  deltaX * sensitivity));
          }
          this.peelProgress = newProgress;
          this.updateCurl(this.peelProgress, this.curlSide);
        },

        remove: function () {
          window.removeEventListener('mousemove', this._trackMouse);
          window.removeEventListener('mousemove', this._onMouseMoveCurl);
          window.removeEventListener('mouseup',   this._onMouseUpCurl);
        }
      });

      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          this.isVR        = false;
          this.el.sceneEl.addEventListener('enter-vr', () => { this.isVR = true;  });
          this.el.sceneEl.addEventListener('exit-vr',  () => { this.isVR = false; });
          this.onMouseDown   = (e) => { if (!this.isVR && e.button === 2) this.ifMouseDown = true; };
          this.onMouseUp     = ()  => { this.ifMouseDown = false; };
          this.onMouseMove   = (e) => {
            if (!this.ifMouseDown) return;
            const rotation = this.el.getAttribute('rotation');
            const deltaX   = (e.movementX !== undefined ? e.movementX : 0) * 0.15;
            const deltaY   = (e.movementY !== undefined ? e.movementY : 0) * 0.15;
            this.el.setAttribute('rotation', {
              x: Math.max(-30, Math.min(30, rotation.x + deltaY)),
              y: Math.max(-30, Math.min(30, rotation.y + deltaX)),
              z: 0
            });
          };
          this.onContextMenu = (e) => e.preventDefault();
          window.addEventListener('mousedown',   this.onMouseDown);
          window.addEventListener('mouseup',     this.onMouseUp);
          window.addEventListener('mousemove',   this.onMouseMove);
          window.addEventListener('contextmenu', this.onContextMenu);
        },
        remove: function () {
          window.removeEventListener('mousedown',   this.onMouseDown);
          window.removeEventListener('mouseup',     this.onMouseUp);
          window.removeEventListener('mousemove',   this.onMouseMove);
          window.removeEventListener('contextmenu', this.onContextMenu);
        }
      });

      AFRAME.registerComponent('flicker', {
        init: function () {
          const p      = this.el.getAttribute('position');
          this.baseX   = p ? p.x : 0;
          this.baseY   = p ? p.y : 0.5;
          this.baseZ   = p ? p.z : 0.5;
          this.phaseX  = Math.random() * Math.PI * 2;
          this.phaseY  = Math.random() * Math.PI * 2;
          this.lastLightUpdate = 0;
        },
        tick: function (t) {
          const driftX = Math.sin(t*0.0007+this.phaseX)*0.015 + Math.sin(t*0.0019+this.phaseX)*0.008 + (Math.random()-0.5)*0.004;
          const driftY = Math.sin(t*0.0005+this.phaseY)*0.012 + Math.sin(t*0.0023+this.phaseY)*0.006 + (Math.random()-0.5)*0.003;
          this.el.object3D.position.set(this.baseX+driftX, this.baseY+driftY, this.baseZ);
          if (t - this.lastLightUpdate > 50) {
            this.lastLightUpdate = t;
            const intensity = Math.max(0.9, Math.min(1.8,
              1.2 + Math.sin(t*0.00035)*0.25+0.25 + Math.sin(t*0.0023)*0.10 + (Math.random()-0.5)*0.15));
            const t_col = (intensity-0.9)/0.9;
            this.el.setAttribute('light', {
              intensity: intensity,
              color: 'rgb(255,'+Math.round(119+t_col*119)+','+Math.round(51+t_col*85)+')'
            });
          }
        }
      });

      AFRAME.registerComponent('folio-hotspots', {
        init: function () {
          const folio         = this.el;
          this.targetedPanel  = null;
          this.zones          = [];
          this._localPt       = new THREE.Vector3();
          this.rightCtrl      = null;
          this.leftCtrl       = null;
          this.desktopCursor  = null;
          this.isVR           = false;
          const scene         = this.el.sceneEl;
          scene.addEventListener('enter-vr', () => { this.isVR = true;  });
          scene.addEventListener('exit-vr',  () => { this.isVR = false; });

          const makeHotspot = (cx, cy, panelPos, labelText, page) => {
            const panel = document.createElement('a-entity');
            panel.setAttribute('position', panelPos);
            panel.setAttribute('visible', 'false');
            const bg = document.createElement('a-plane');
            bg.setAttribute('width', '0.36'); bg.setAttribute('height', '0.18');
            bg.setAttribute('material', 'color: #1a1a2e; opacity: 0.92; side: double');
            panel.appendChild(bg);
            const txt = document.createElement('a-text');
            txt.setAttribute('value', labelText); txt.setAttribute('color', '#FFD700');
            txt.setAttribute('align', 'center'); txt.setAttribute('width', '0.32');
            txt.setAttribute('position', '0 0 0.01');
            panel.appendChild(txt);
            folio.appendChild(panel);
            this.zones.push({ cx, cy, halfW: 0.125, halfH: 0.10, panel, panelOpen: false, page });
          };

          // Folio 1 hotspots
          makeHotspot( 0.24, -0.02,  '0.24 0.17 0.06', 'Test info. box 1', 1);
          makeHotspot(-0.24, -0.02, '-0.24 0.17 0.06', 'Test info. box 2', 1);
          // Folio 2 hotspots
          makeHotspot( 0.24, -0.02,  '0.24 0.17 0.06', 'Test info. box 3', 2);
          makeHotspot(-0.24, -0.02, '-0.24 0.17 0.06', 'Test info. box 4', 2);

          const toggle = () => {
            if (!this.targetedPanel) return;
            const zone = this.zones.find(z => z.panel === this.targetedPanel && z.page === (scene.currentAudioPage || 1));
            if (!zone) return;
            zone.panelOpen = !zone.panelOpen;
            zone.panel.setAttribute('visible', zone.panelOpen);
          };

          folio.addEventListener('click', () => { if (!this.isVR) toggle(); });
          scene.addEventListener('loaded', () => {
            this.rightCtrl     = document.querySelector('[laser-controls="hand: right"]');
            this.leftCtrl      = document.querySelector('[laser-controls="hand: left"]');
            this.desktopCursor = document.querySelector('#cursor');
            if (this.rightCtrl) this.rightCtrl.addEventListener('abuttondown', toggle);
            if (this.leftCtrl)  this.leftCtrl.addEventListener('xbuttondown',  toggle);
          });
        },
        tick: function () {
          const folio    = this.el;
          let hitZoneIdx = -1;
          const ctrls    = [this.rightCtrl, this.leftCtrl];
          for (let c = 0; c < ctrls.length; c++) {
            const ctrl = ctrls[c]; if (!ctrl) continue;
            const rc   = ctrl.components && ctrl.components.raycaster;
            if (!rc || !rc.intersectedEls) continue;
            const idx = rc.intersectedEls.indexOf(folio);
            if (idx < 0 || !rc.intersections[idx]) continue;
            this._localPt.copy(rc.intersections[idx].point);
            folio.object3D.worldToLocal(this._localPt);
            for (let i = 0; i < this.zones.length; i++) {
              const z = this.zones[i];
              if (z.page !== (this.el.sceneEl.currentAudioPage || 1)) continue;
              if (Math.abs(this._localPt.x-z.cx) <= z.halfW && Math.abs(this._localPt.y-z.cy) <= z.halfH) {
                hitZoneIdx = i; break;
              }
            }
            if (hitZoneIdx >= 0) break;
          }
          if (hitZoneIdx < 0 && !this.isVR && this.desktopCursor) {
            const rc = this.desktopCursor.components && this.desktopCursor.components.raycaster;
            if (rc && rc.intersectedEls) {
              const idx = rc.intersectedEls.indexOf(folio);
              if (idx >= 0 && rc.intersections[idx]) {
                this._localPt.copy(rc.intersections[idx].point);
                folio.object3D.worldToLocal(this._localPt);
                for (let i = 0; i < this.zones.length; i++) {
                  const z = this.zones[i];
                  if (z.page !== (this.el.sceneEl.currentAudioPage || 1)) continue;
                  if (Math.abs(this._localPt.x-z.cx) <= z.halfW && Math.abs(this._localPt.y-z.cy) <= z.halfH) {
                    hitZoneIdx = i; break;
                  }
                }
              }
            }
          }
          this.targetedPanel = hitZoneIdx >= 0 ? this.zones[hitZoneIdx].panel : null;
        }
      });

      AFRAME.registerComponent('panel-audio', {
        schema: { type: { type: 'string', default: 'latin' } },
        init: function () {
          const panel = this.el;
          const scene = this.el.sceneEl;
          let isTargeted = false;
          const zone = document.createElement('a-plane');
          zone.setAttribute('width', '1.0'); zone.setAttribute('height', '1.2');
          zone.setAttribute('position', '0 -0.1 0.02');
          zone.setAttribute('material', 'opacity: 0; transparent: true; side: double');
          zone.classList.add('clickable');
          panel.appendChild(zone);
          const pulseHaptic = (evt) => {
            const ctrl = evt && evt.detail && evt.detail.cursorEl; if (!ctrl) return;
            const tc   = ctrl.components && ctrl.components['tracked-controls']; if (!tc) return;
            const gp   = tc.controller && tc.controller.gamepad;
            if (gp && gp.hapticActuators && gp.hapticActuators.length > 0) gp.hapticActuators[0].pulse(0.65, 80);
          };
          zone.addEventListener('mouseenter', (evt) => { isTargeted = true;  pulseHaptic(evt); });
          zone.addEventListener('mouseleave', ()     => { isTargeted = false; });
          const getAudio = () => {
            const pages = scene.pages; if (!pages) return null;
            const page  = pages[(scene.currentAudioPage||1)-1]; if (!page) return null;
            const srcId = this.data.type === 'latin' ? page.latinSrc : page.englishSrc;
            return srcId ? document.querySelector(srcId) : null;
          };
          const toggle = () => {
            if (!isTargeted) return;
            const audio = getAudio(); if (!audio) return;
            if (scene.currentPanelAudio && scene.currentPanelAudio !== audio) {
              scene.currentPanelAudio.pause(); scene.currentPanelAudio.currentTime = 0;
              scene.currentPanelAudio = null;
            }
            if (audio.paused) { audio.play(); scene.currentPanelAudio = audio; }
            else { audio.pause(); audio.currentTime = 0; scene.currentPanelAudio = null; }
          };
          scene.addEventListener('loaded', () => {
            const rightCtrl = document.querySelector('[laser-controls="hand: right"]');
            const leftCtrl  = document.querySelector('[laser-controls="hand: left"]');
            if (rightCtrl) rightCtrl.addEventListener('abuttondown', toggle);
            if (leftCtrl)  leftCtrl.addEventListener('xbuttondown',  toggle);
          });
        }
      });

      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          const folio        = document.querySelector('#folio-object');
          const zoomAnchor   = document.querySelector('#zoom-anchor');
          const infoPanel    = document.querySelector('#info-panel');
          const soundEl      = document.querySelector('#ambient-sound');
          const clickSoundEl = document.querySelector('#click-sound');
          const transcrText     = document.querySelector('#transcr-text');
          const translText      = document.querySelector('#transl-text');
          const infoRightText   = document.querySelector('#info-right-text');
          const infoRightHeader = document.querySelector('#info-right-header');
          const muteBtn      = document.querySelector('#mute-button');
          const muteLabel    = document.querySelector('#mute-label');
          const hoverTooltip = document.querySelector('#hover-tooltip');
          const cursor       = document.querySelector('#cursor');

          this.el.addEventListener('enter-vr', () => cursor.setAttribute('visible', false));
          this.el.addEventListener('exit-vr',  () => cursor.setAttribute('visible', true));

          let zoomed          = false;
          let materialityMode = false;
          let currentPage     = 1;
          this.el.currentAudioPage = 1;
          let isMuted = false;

          const playClick = () => {
            if (clickSoundEl && clickSoundEl.components.sound) {
              clickSoundEl.components.sound.stopSound();
              clickSoundEl.components.sound.playSound();
            }
          };

          const lat1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus . xi . annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes et eos cum quidem maturitati proximi essent sponte sua decider. alios in terram. alios in aquam. et in terra deiectos putrescere. in aquam vero dimersos mox aviatos enatare sub aquis et in aera plumis plenisque euestigio euolare. De quare cum aidius inuestigaremus didicimus miracula spe remotius fugere famosamque arborem non in scocia sed apud olchades insulas inueniri. Illud tamen nobis in scocia miraculum praesentatum est. nam pauperes pene nudos ad ecclesias mendicantes acceptis lapidibus elemosine gratia datis letos abiisse conspeximus. Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";

          const eng1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. [King] James [IV] reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household, among whom, vengeance having been settled, his son took up the kingdom. We had once heard that there was in Scotland a tree which, growing above the banks of a river, produced fruits having the form of ducks, and these indeed, when they were near maturity, fell of their own accord, some onto the land, others into the water. And those cast onto the land rot; but those plunged into the water, however, soon become birds, swim beneath the waters, and fly into the air with feathers and full plumage. About the matter, therefore, when we investigated more eagerly, we learned that marvels flee closer scrutiny, and that the famous tree is found not in Scotland but among the Orkney Islands. Yet this marvel was shown to us in Scotland: for we saw poor people, almost naked, begging at the churches, who went away rejoicing after receiving stones given as alms. This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";

          const lat2 = "Quorum cateruis sic gloriose circumuallatus et in gloria humane potencie sic confisus usque ad locum qui bannokburn dicitur perueniens tentoria sua fixit Cui rex robertus cum paucis respectu multitudinis eius in domino confidens et in deum virtutem faciens ac beatum andream apostolum et sanctum iohannem baptistam in eius auxilium ad miserabilem populum scocie de seruitute indebita liberandum postulans cum dicto rege anglie mortale commisit bellum ac ipsum cum omni pompa sua et innumerabili potencia auxiliante altissimo cuius est victoriam dare, et in cuius manu sunt omnes fines terre in fugam conuertit ubi comes glouernie et multi nobiles anglie ceciderunt interfecti... alii fugati . alii capti . alii occisi... . per captiuos enim non solum regina scocie cum suis liberati sunt dimissa est ymmo eciam omnes alii scoti in carceribus deputati sine redempcione liberati sunt . Ac eciam omnes alii in dicto bello existentes inestimabiliter sunt ditati Inter quos captus est ille ditissimus iohannes de britania per quem liberata fuit regina scocie captiua quod absurdum esset audire reginam captiuam esse Item pro ipso liberatus est episcopus de glasguw vir venerabilis et magne senectutis in carceribus similiter per tirannum detentus londoniis [.]";

          const eng2 = "Surrounded so gloriously by his companies, and trusting so confidently in the glory of human power, he [King Edward II of England] came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men, compared with his multitude, trusting in the Lord and taking strength in God, and calling upon Blessed Andrew the Apostle and Saint John the Baptist for aid in freeing the wretched people of Scotland from unjust servitude, joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting - whose prerogative it is to grant victory, and in whose hand are all the ends of the earth - he turned to flight. There the Earl of Gloucester and many nobles of England fell slain.... Others were put to flight; others were captured; others were killed... For by means of the captives not only was the queen of Scotland, with her people, set free; indeed (what is more), all the other Scots who had been assigned to prisons were freed without ransom. And also all the others who were present in the said battle were enriched beyond measure. Among these was captured that very rich man, John of Brittany, through whom the queen of Scotland was freed from captivity, something which it would be absurd even to hear, namely that a queen should be held captive. Likewise, in exchange for him, the bishop of Glasgow, a venerable man of great age, who had similarly been held in prison by the tyrant, was freed at London [.]";

          const pages = [
            {
              src: '#manuscript1', lat: lat1, eng: eng1,
              title: 'Liber Chronicarum, 1493,\nHartmann Schedel',
              hover: 'Liber Chronicarum',
              latinSrc: '#latin1-track', englishSrc: '#english1-track',
              infoRight: 'Information about the Liber Chronicarum'
            },
            {
              src: '#manuscript2', lat: lat2, eng: eng2,
              title: 'Liber Pluscardensis,\nbefore 1500',
              hover: 'Liber Pluscardensis',
              latinSrc: '#latin2-track', englishSrc: '#english2-track',
              infoRight: 'Information about the Liber Pluscardensis'
            }
          ];

          this.el.pages = pages;
          transcrText.setAttribute('value', pages[0].lat);
          translText.setAttribute('value',  pages[0].eng);
          infoRightText.setAttribute('value', pages[0].infoRight);
          infoRightHeader.setAttribute('value', 'Test 1');

          folio.addEventListener('mouseenter', () => hoverTooltip.setAttribute('visible', 'true'));
          folio.addEventListener('mouseleave', () => hoverTooltip.setAttribute('visible', 'false'));

          // doSwap: updates page counter, metadata, and text panels.
          //
          // When silent=true (called from the curl animation):
            //   Texture was already applied by applyDestTex() via _texCache.
            //   folio.setAttribute('src') is NOT called in the curl path —
            //   this eliminates the A-Frame async race condition on Quest 2.
            //
            // When silent=false (called from the SWAP PAGE button):
            //   Normal A-Frame setAttribute handles the texture load, same as before.
          const doSwap = (dir, silent) => {
            if (!silent) playClick();
            // Close all open hotspot panels before the swap so no stale
            // info box from the outgoing folio remains visible on the new one.
            const hs = folio.components && folio.components['folio-hotspots'];
            if (hs && hs.zones) {
                hs.zones.forEach(z => { z.panelOpen = false; z.panel.setAttribute('visible', 'false'); });
            }
            currentPage = ((currentPage - 1 + dir + pages.length) % pages.length) + 1;
            this.el.currentAudioPage = currentPage;
            if (this.el.currentPanelAudio) {
              this.el.currentPanelAudio.pause();
              this.el.currentPanelAudio.currentTime = 0;
              this.el.currentPanelAudio = null;
            }
            const page = pages[currentPage - 1];
            if (!silent) {
              // Button swap: rely on A-Frame's normal texture pipeline
              folio.setAttribute('src', page.src);
            }
            // Always update all metadata
            document.querySelector('#hover-text').setAttribute('value', page.hover);
            transcrText.setAttribute('value', page.lat);
            translText.setAttribute('value',  page.eng);
            infoRightText.setAttribute('value', page.infoRight);
            infoRightHeader.setAttribute('value', currentPage === 1 ? 'Test 1' : 'Test 2');
            document.querySelector('#info-text').setAttribute('value', page.title);
          };

          this.el.doSwap = doSwap;

          document.querySelector('#zoom-button').addEventListener('click', () => {
            playClick(); zoomed = !zoomed;
            infoPanel.setAttribute('visible', !zoomed);
            zoomAnchor.setAttribute('animation', {
              property: 'position', to: zoomed ? '0 1.5 -0.6' : '0 1.1 -1.4', dur: 800, easing: 'easeInOutQuad'
            });
          });

          document.querySelector('#mat-button').addEventListener('click', () => {
            playClick(); materialityMode = !materialityMode;
            folio.setAttribute('material', {
              metalness: materialityMode ? 0.9 : 0.1,
              roughness: materialityMode ? 0.1 : 0.8
            });
          });

          document.querySelector('#swap-button').addEventListener('click', () => { doSwap(1, false); });

          document.querySelector('#scale-button').addEventListener('click', () => {
            playClick();
            const s = folio.getAttribute('scale');
            folio.setAttribute('scale', s.x > 1.3 ? '0.7 0.7 0.7' : (s.x < 0.8 ? '1 1 1' : '1.5 1.5 1.5'));
          });

          muteBtn.addEventListener('click', () => {
            playClick(); isMuted = !isMuted;
            if (soundEl.components.sound) {
              isMuted ? soundEl.components.sound.pauseSound() : soundEl.components.sound.playSound();
            }
            muteBtn.setAttribute('color', isMuted ? '#8B0000' : '#FF4500');
            muteLabel.setAttribute('value', isMuted ? 'UNMUTE' : 'MUTE');
          });

          window.addEventListener('click', () => {
            if (soundEl.components.sound) soundEl.components.sound.playSound();
            document.querySelector('#sound-ui').setAttribute('visible', 'false');
          }, { once: true });
        }
      });

    </script>
  </head>

  <body>

    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">

      <a-assets>
        <!-- Medieval library room model — loaded before any interaction is possible -->
        <a-asset-item id="library-gltf" src="medievallibrary1.glb" response-type="arraybuffer"></a-asset-item>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="music-track"    src="chant.mp3"      preload="auto"></audio>
        <audio id="click-track"    src="click.mp3"      preload="auto"></audio>
        <audio id="pageturn-track" src="pageturn1.mp3"  preload="auto"></audio>
        <audio id="latin1-track"   src="latin1.mp3"     preload="auto"></audio>
        <audio id="english1-track" src="english1.mp3"   preload="auto"></audio>
        <audio id="latin2-track"   src="latin2.mp3"     preload="auto"></audio>
        <audio id="english2-track" src="english2.mp3"   preload="auto"></audio>
      </a-assets>

      <!-- ── Starry backdrop ─────────────────────────────────────────────────
           lighting:none keeps A-Frame from generating its own directional
           light — we provide all lights manually below so the library model
           and the folio are lit consistently. The starry sky appears above
           the library model wherever the ceiling is open or absent.
      -->
      <a-entity environment="preset: starry; lighting: none;"></a-entity>

      <!-- ── Medieval library kit ────────────────────────────────────────────
           Placed at y=0 so its floor sits flush with the aframe-environment
           ground plane. Scale 1 1 1 assumes the GLB was exported in metres,
           which matches the existing assets (folio 1.1 m wide, player 1.6 m
           tall). Rotated 180° on Y so the model's natural "entrance" faces
           the player standing at origin looking toward −Z.

           The folio lectern (0, 1.1, −1.4), button panel (+0.9, 1.1, −1.3),
           info panel (−0.9, 1.1, −1.3) and text panels (−2.1, 1.5, −1.0 /
           −2.1, 1.5, 0.2) all sit inside the open floor area of a typical
           medieval library room — clear of bookshelves along the walls.

           If the model appears too large:  set scale="0.5 0.5 0.5"
           If the model faces the wrong way: set rotation="0 0 0"
           If the floor appears raised:      set position="0 -N 0"
      -->
      <a-gltf-model
        id="library-room"
        src="#library-gltf"
        position="0 0 4"
        rotation="0 180 0"
        scale="17 17 17">
      </a-gltf-model>

      <!-- Shared lighting ───────────────────────────────────────────────────
           Warm candle-white ambient keeps both the library model and the
           folio illuminated without harsh shadows on Quest 2.
           Two amber point lights simulate wall torches / sconces on either
           side of the room, placed well above and outside the interaction
           zone so they never intersect any interactive entity.
      -->
      <a-entity light="type: ambient; color: #ffe4b5; intensity: 0.5;"></a-entity>
      <a-entity light="type: point; color: #e8823a; intensity: 1.2; distance: 9; decay: 2;"
                position="-3.5 2.5 -2.0"></a-entity>
      <a-entity light="type: point; color: #e8823a; intensity: 1.2; distance: 9; decay: 2;"
                position=" 3.5 2.5 -2.0"></a-entity>
      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.5;"></a-entity>
      <a-entity id="click-sound"   sound="src: #click-track; volume: 1.0; poolSize: 5;"></a-entity>
      <a-text id="sound-ui" value="CLICK TO START" position="0 2.2 -2" align="center" color="#FFD700" width="3"></a-text>

      <a-entity id="rig" vr-locomotion>
        <a-entity camera look-controls wasd-controls position="0 1.6 0">
          <a-cursor id="cursor" position="0 0 -0.4" scale="0.4 0.4 0.4"
                    raycaster="objects: .clickable" color="#FFD700"
                    animation__fusing="property: scale; from: 0.4 0.4 0.4; to: 0.04 0.04 0.04; dur: 1500; startEvents: fusing;"
                    animation__reset="property: scale; to: 0.4 0.4 0.4; dur: 500; startEvents: mouseleave;">
          </a-cursor>
        </a-entity>
        <a-entity laser-controls="hand: left"  raycaster="objects: .clickable; far: 10;"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 10;"></a-entity>
      </a-entity>

      <a-entity id="zoom-anchor" position="0 1.1 -1.4">

          <a-plane id="folio-object" class="clickable"
                   drag-rotate vr-grab-rotate page-curl folio-hotspots
                   src="#manuscript1"
                   position="0 0 0" rotation="0 0 0" width="1.1" height="0.8"
                   material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">

              <a-entity id="candle" light="type: point; color: #ffcc77; intensity: 1.6; distance: 4;"
                        position="0 0.5 0.5" flicker></a-entity>

              <a-entity id="hover-tooltip" position="0 0.55 0.05" visible="false">
                  <a-plane width="0.8" height="0.15" color="black" opacity="0.8"></a-plane>
                  <a-text id="hover-text" value="Liber Chronicarum" color="white"
                          align="center" width="0.8" position="0 0 0.05"></a-text>
              </a-entity>

          </a-plane>

          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -25 0">
              <a-sphere id="zoom-button"  class="clickable" haptic-button position="0 0.25 0"  radius="0.04" color="#FFD700"><a-text value="ZOOM/RESET" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="mat-button"   class="clickable" haptic-button position="0 0.12 0"  radius="0.04" color="#C0C0C0"><a-text value="MATERIAL"   position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="swap-button"  class="clickable" haptic-button position="0 0 0"     radius="0.04" color="#cd7f32"><a-text value="SWAP PAGE"  position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-sphere id="scale-button" class="clickable" haptic-button position="0 -0.12 0" radius="0.04" color="#4CC3D9"><a-text value="SCALE"      position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text></a-sphere>
              <a-box id="mute-button" class="clickable" haptic-button
                     position="0 -0.25 0" width="0.06" height="0.06" depth="0.06" color="#FF4500">
                  <a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-box>
          </a-entity>

          <a-entity id="info-panel" position="-0.9 0 0.1" rotation="0 35 0">
              <a-plane width="0.6" height="0.4" color="#111" opacity="0.9"></a-plane>
              <a-text id="info-text" value="Liber Chronicarum, 1493,\nHartmann Schedel"
                      color="#FFD700" align="center" width="0.7" position="0 0 0.05"></a-text>
          </a-entity>

      </a-entity>

      <a-entity id="translation-panel"
                position="-1.5 1.5 -0.6" look-at-user
                panel-audio="type: english">
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>
          <a-text id="transl-text" color="white" align="center" baseline="top"
                  width="1.05" position="0 0.6 0.02" wrap-count="50"></a-text>
      </a-entity>

      <a-entity id="transcription-panel"
                position="-1.5 1.5 0.6" look-at-user
                panel-audio="type: latin">
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="1.1" position="0 0.8 0.02"></a-text>
          <a-text id="transcr-text" color="white" align="center" baseline="top"
                  width="1.05" position="0 0.6 0.02" wrap-count="50"></a-text>
      </a-entity>

      <a-entity id="info-right-panel"
                position="1.5 1.5 -0.4" look-at-user>
          <a-plane width="1.2" height="1.8" color="#111" opacity="0.9" material="side: double;"></a-plane>
          <a-text id="info-right-header" value="Test 1" color="#FFD700" align="center"
                  width="1.1" position="0 0.8 0.02"></a-text>
          <a-text id="info-right-text" color="white" align="center" baseline="top"
                  width="1.05" position="0 0.6 0.02" wrap-count="50"></a-text>
      </a-entity>

    </a-scene>

</html>
