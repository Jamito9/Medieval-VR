<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval Scriptorium - VR & UI Fixed</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/super-hands/dist/super-hands.min.js"></script>

    <script>
      // 1. TILT COMPONENT (Clamped to 30°, Mouse & VR Compatible)
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          this.x_cord = 0; this.y_cord = 0;

          this.el.addEventListener('mousedown', (e) => {
            // Only enable mouse drag if not in VR
            if (this.el.sceneEl.is('vr')) return;
            this.ifMouseDown = true;
            this.x_cord = e.detail.cursorEl ? 0 : e.clientX;
            this.y_cord = e.detail.cursorEl ? 0 : e.clientY;
          });

          window.addEventListener('mouseup', () => { this.ifMouseDown = false; });

          window.addEventListener('mousemove', (e) => {
            if (this.ifMouseDown) {
              let rotation = this.el.getAttribute('rotation');
              let deltaX = (e.clientX - this.x_cord) * 0.15;
              let deltaY = (e.clientY - this.y_cord) * 0.15;

              this.el.setAttribute('rotation', {
                x: Math.max(-30, Math.min(30, rotation.x + deltaY)),
                y: Math.max(-30, Math.min(30, rotation.y + deltaX)),
                z: 0
              });

              this.x_cord = e.clientX;
              this.y_cord = e.clientY;
            }
          });

          // Clamp rotation when using VR hands
          this.el.addEventListener('componentchanged', (evt) => {
            if (evt.detail.name === 'rotation') {
              let r = evt.detail.newData;
              this.el.setAttribute('rotation', {
                x: Math.max(-30, Math.min(30, r.x)),
                y: Math.max(-30, Math.min(30, r.y)),
                z: 0
              });
            }
          });
        }
      });

      // 2. Flickering candle
      AFRAME.registerComponent('flicker', {
        tick: function () {
          if (Math.random() > 0.8) {
            this.el.setAttribute('light', 'intensity', 1.0 + (Math.random() * 0.5));
          }
        }
      });

      // 3. Scriptorium logic (UI, audio, pages)
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          const folio = document.querySelector('#folio-object');
          const zoomAnchor = document.querySelector('#zoom-anchor');
          const soundEl = document.querySelector('#ambient-sound');
          const transcrText = document.querySelector('#transcr-text');
          const translText = document.querySelector('#transl-text');
          const muteBtn = document.querySelector('#mute-button');
          const muteLabel = document.querySelector('#mute-label');
          const hoverTooltip = document.querySelector('#hover-tooltip');
          const infoText = document.querySelector('#info-text');
          
          let zoomed = false; let materialityMode = false;
          let currentPage = 1; let isMuted = false;

          const lat1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus . xi . annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes... Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";
          const eng1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. [King] James [IV] reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household... This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";
          const lat2 = "Quorum cateruis sic gloriose circumuallatus... Cui rex robertus cum paucis respectu multitudinis eius in domino confidens... cum dicto rege anglie mortale commisit bellum ac ipsum cum omni pompa sua et innumerabili potencia auxiliante altissimo cuius est victoriam dare... ubi comes glouernie et multi nobiles anglie ceciderunt interfecti… alii fugati . alii capti . alii occisi… per captiuos enim non solum regina scocie cum suis liberati sunt... Ac eciam omnes alii in dicto bello existentes inestimabiliter sunt ditati.";
          const eng2 = "Surrounded so gloriously by his companies... he came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men... trusting in the Lord and taking strength in God... joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting... he turned to flight. There the Earl of Gloucester and many nobles of England fell slain…. Others were put to flight; others were captured; others were killed.";

          // Initial text
          transcrText.setAttribute('value', lat1);
          translText.setAttribute('value', eng1);

          folio.addEventListener('mouseenter', () => hoverTooltip.setAttribute('visible', 'true'));
          folio.addEventListener('mouseleave', () => hoverTooltip.setAttribute('visible', 'false'));

          // Buttons
          document.querySelector('#zoom-button').addEventListener('click', () => {
            zoomed = !zoomed;
            zoomAnchor.setAttribute('animation', {
              property: 'position', 
              to: zoomed ? '0 1.5 -0.6' : '0 1.1 -1.4', 
              dur: 800,
              easing: 'easeInOutQuad'
            });
          });

          document.querySelector('#mat-button').addEventListener('click', () => {
            materialityMode = !materialityMode;
            folio.setAttribute('material', { metalness: materialityMode ? 0.9 : 0.1, roughness: materialityMode ? 0.1 : 0.8 });
          });

          document.querySelector('#swap-button').addEventListener('click', () => {
            currentPage = (currentPage === 1) ? 2 : 1;
            folio.setAttribute('src', currentPage === 1 ? '#manuscript1' : '#manuscript2');
            document.querySelector('#hover-text').setAttribute('value', currentPage === 1 ? 'Liber Chronicarum' : 'Liber Pluscardensis');
            infoText.setAttribute('value', currentPage === 1 ? '1493 Edition\nHartmann Schedel' : 'Before 1500\nLiber Pluscardensis');
            transcrText.setAttribute('value', currentPage === 1 ? lat1 : lat2);
            translText.setAttribute('value', currentPage === 1 ? eng1 : eng2);
          });

          document.querySelector('#scale-button').addEventListener('click', () => {
            let s = folio.getAttribute('scale');
            let nextScale = s.x > 1.3 ? "0.7 0.7 0.7" : (s.x < 0.8 ? "1 1 1" : "1.5 1.5 1.5");
            folio.setAttribute('scale', nextScale);
          });

          muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            soundEl.components.sound[isMuted ? 'pauseSound' : 'playSound']();
            muteBtn.setAttribute('color', isMuted ? '#8B0000' : '#FF4500'); 
            muteLabel.setAttribute('value', isMuted ? 'UNMUTE' : 'MUTE');
          });

          // Play on first click
          window.addEventListener('click', () => { 
            if (soundEl.components.sound) soundEl.components.sound.playSound(); 
            document.querySelector('#sound-ui').setAttribute('visible', 'false'); 
          }, { once: true });

          // Page corner grab for VR
          const corner = document.querySelector('#page-corner');
          corner.addEventListener('grab-end', () => {
            document.querySelector('#swap-button').emit('click'); // flip page
          });
        }
      });
    </script>
  </head>

  <body>
    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="music-track" src="chant.mp3" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: starry; lighting: none;"></a-entity>
      <a-entity light="type: ambient; intensity: 0.4;"></a-entity>
      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.5;"></a-entity>
      <a-text id="sound-ui" value="CLICK TO START" position="0 2.2 -2" align="center" color="#FFD700" width="3"></a-text>

      <!-- VR rig -->
      <a-entity id="rig">
        <a-entity camera look-controls wasd-controls position="0 1.6 0">
          <a-cursor id="cursor" raycaster="objects: .clickable" color="#FFD700" fuse="true" fuse-timeout="1500"></a-cursor>
        </a-entity>
        <a-entity hand-controls="left" super-hands></a-entity>
        <a-entity hand-controls="right" super-hands></a-entity>
      </a-entity>

      <!-- Folio + buttons -->
      <a-entity id="zoom-anchor" position="0 1.1 -1.4">
          <a-plane id="folio-object" class="clickable grabbable" drag-rotate src="#manuscript1"
                   position="0 0 0" rotation="0 0 0" width="1.1" height="0.8"
                   material="shader: standard; metalness: 0.1; roughness: 0.8; side: double;">
              <a-entity id="candle" light="type: point; color: #ffcc77; intensity: 1.6; distance: 4;" position="0 0.5 0.5" flicker></a-entity>
              <a-entity id="hover-tooltip" position="0 0.55 0.05" visible="false">
                  <a-plane width="0.8" height="0.15" color="black" opacity="0.8"></a-plane>
                  <a-text id="hover-text" value="Liber Chronicarum" color="white" align="center" width="0.8" position="0 0 0.01"></a-text>
              </a-entity>
          </a-plane>

          <!-- Page corner for VR grab -->
          <a-plane id="page-corner" class="clickable grabbable" width="0.2" height="0.2" position="0.55 -0.35 0.01" opacity="0"></a-plane>

          <!-- Buttons -->
          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -25 0">
              <a-sphere id="zoom-button" class="clickable" position="0 0.25 0" radius="0.04" color="#FFD700">
                <a-text value="ZOOM/RESET" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-sphere>
              <a-sphere id="mat-button" class="clickable" position="0 0.12 0" radius="0.04" color="#C0C0C0">
                <a-text value="MATERIAL" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-sphere>
              <a-sphere id="swap-button" class="clickable" position="0 0 0" radius="0.04" color="#cd7f32">
                <a-text value="SWAP PAGE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-sphere>
              <a-sphere id="scale-button" class="clickable" position="0 -0.12 0" radius="0.04" color="#4CC3D9">
                <a-text value="SCALE" position="0.07 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-sphere>
              <a-box id="mute-button" class="clickable" position="0 -0.25 0" width="0.06" height="0.06" depth="0.06" color="#FF4500">
                <a-text id="mute-label" value="MUTE" position="0.08 0 0" scale="0.22 0.22 0.22" color="white"></a-text>
              </a-box>
          </a-entity>

          <a-entity id="info-panel" position="-0.9 0 0.1" rotation="0 35 0">
              <a-plane width="0.5" height="0.4" color="#111" opacity="0.9"></a-plane>
              <a-text id="info-text" value="1493 Edition\nHartmann Schedel" color="#FFD700" align="center" width="0.6" position="0 0 0.02"></a-text>
          </a-entity>
      </a-entity>

      <!-- Translation and transcription panels -->
      <a-entity id="translation-panel" position="-1.9 1.1 -0.5" rotation="0 80 0">
          <a-plane width="1.0" height="1.8" color="#111" opacity="0.9"></a-plane>
          <a-text value="ENGLISH TRANSLATION" color="#FFD700" align="center" width="0.9" position="0 0.8 0.02"></a-text>
          <a-text id="transl-text" color="white" align="left" width="0.85" position="-0.42 0 0.02" wrap-count="28"></a-text>
      </a-entity>

      <a-entity id="transcription-panel" position="-2.2 1.1 0.5" rotation="0 120 0">
          <a-plane width="1.0" height="1.8" color="#111" opacity="0.9"></a-plane>
          <a-text value="LATIN TRANSCRIPTION" color="#FFD700" align="center" width="0.9" position="0 0.8 0.02"></a-text>
          <a-text id="transcr-text" color="white" align="left" width="0.85" position="-0.42 0 0.02" wrap-count="28"></a-text>
      </a-entity>
    </a-scene>
  </body>
</html>
