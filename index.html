<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval - DH Project</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      // 1. STABLE ROTATION COMPONENT
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          this.x_cord = 0;
          this.y_cord = 0;

          this.el.addEventListener('mousedown', (e) => {
            this.ifMouseDown = true;
            this.x_cord = e.detail.cursorEl ? 0 : e.clientX;
            this.y_cord = e.detail.cursorEl ? 0 : e.clientY;
          });

          window.addEventListener('mouseup', () => { this.ifMouseDown = false; });

          window.addEventListener('mousemove', (e) => {
            if (this.ifMouseDown) {
              var rotation = this.el.getAttribute('rotation');
              var deltaX = (e.clientX - this.x_cord) * 0.1;
              var deltaY = (e.clientY - this.y_cord) * 0.1;

              this.el.setAttribute('rotation', {
                x: Math.max(-60, Math.min(10, rotation.x + deltaY)),
                y: Math.max(-30, Math.min(30, rotation.y + deltaX)),
                z: rotation.z
              });
              this.x_cord = e.clientX;
              this.y_cord = e.clientY;
            }
          });
        }
      });

      // 2. MAIN APP LOGIC
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          const wrapper = document.querySelector('#manuscript-wrapper');
          const folio = document.querySelector('#folio-object');
          const ambientSound = document.querySelector('#ambient-sound');
          const clickSound = document.querySelector('#click-sound-el');
          const hoverTooltip = document.querySelector('#hover-tooltip');
          const btnGroup = document.querySelector('#button-group');
          const infoPanel = document.querySelector('#info-panel');
          const infoText = document.querySelector('#info-text');
         
          let zoomed = false;
          let materialityMode = false;
          let currentPage = 1;
          let scaleState = 0;
          let isMuted = false;

          // HELPER: Play Click Sound
          const playClick = () => {
            if (clickSound.components.sound) clickSound.components.sound.playSound();
          };

          // Audio Unlock
          window.addEventListener('click', () => {
            if (ambientSound.components.sound) ambientSound.components.sound.playSound();
            document.querySelector('#sound-ui').setAttribute('visible', 'false');
          }, { once: true });

          // Hover Titles
          folio.addEventListener('mouseenter', () => hoverTooltip.setAttribute('visible', 'true'));
          folio.addEventListener('mouseleave', () => hoverTooltip.setAttribute('visible', 'false'));

          // GOLD BUTTON: ZOOM / RESET
          document.querySelector('#zoom-button').addEventListener('click', () => {
            playClick();
            if (!zoomed) {
              wrapper.setAttribute('animation', {property: 'position', to: '0 1.5 -0.9', dur: 800});
              wrapper.setAttribute('animation__rot', {property: 'rotation', to: '0 0 0', dur: 800});
              zoomed = true;
            } else {
              wrapper.setAttribute('animation', {property: 'position', to: '0 1.1 -1.5', dur: 800});
              wrapper.setAttribute('animation__rot', {property: 'rotation', to: '-20 0 0', dur: 800});
              zoomed = false;
            }
          });

          // SILVER BUTTON: MATERIAL
          document.querySelector('#mat-button').addEventListener('click', () => {
            playClick();
            materialityMode = !materialityMode;
            folio.setAttribute('material', 'metalness', materialityMode ? 0.9 : 0.1);
            folio.setAttribute('material', 'roughness', materialityMode ? 0.1 : 0.8);
          });

          // BRONZE BUTTON: SWAP PAGE & INFO
          document.querySelector('#swap-button').addEventListener('click', () => {
            playClick();
            currentPage = (currentPage === 1) ? 2 : 1;
            if (currentPage === 1) {
              folio.setAttribute('src', '#manuscript1');
              document.querySelector('#hover-text').setAttribute('value', 'Liber Chronicarum');
              infoText.setAttribute('value', 'Liber Chronicarum, 1493, Hartmann Schedel\n\nUse buttons to explore.\nClick & Drag folio to tilt.');
            } else {
              folio.setAttribute('src', '#manuscript2');
              document.querySelector('#hover-text').setAttribute('value', 'Liber Pluscardensis');
              infoText.setAttribute('value', 'Liber Pluscardensis, before 1500\n\nUse buttons to explore.\nClick & Drag folio to tilt.');
            }
          });

          // BLUE BUTTON: SCALE (With UI Protection)
          document.querySelector('#scale-button').addEventListener('click', () => {
            playClick();
            scaleState = (scaleState + 1) % 3;
            const scales = ['1 1 1', '1.6 1.6 1.6', '0.6 0.6 0.6'];
            const btnPos = ['0.9 0 0.1', '1.25 0 0.1', '0.7 0 0.1'];
            const infoPos = ['-1.2 0 0.1', '-1.55 0 0.1', '-1.0 0 0.1'];
            
            folio.setAttribute('animation__scale', {property: 'scale', to: scales[scaleState], dur: 500});
            btnGroup.setAttribute('animation__pos', {property: 'position', to: btnPos[scaleState], dur: 500});
            infoPanel.setAttribute('animation__pos', {property: 'position', to: infoPos[scaleState], dur: 500});
          });

          // RED BUTTON: MUTE/UNMUTE
          document.querySelector('#mute-button').addEventListener('click', () => {
            playClick();
            isMuted = !isMuted;
            const muteCube = document.querySelector('#mute-button');
            const muteLabel = muteCube.querySelector('a-text');
            if (isMuted) {
              ambientSound.components.sound.pauseSound();
              muteCube.setAttribute('color', '#8B0000');
              muteLabel.setAttribute('value', 'UNMUTE');
            } else {
              ambientSound.components.sound.playSound();
              muteCube.setAttribute('color', '#FF4500');
              muteLabel.setAttribute('value', 'MUTE');
            }
          });
        }
      });

      // 3. CANDLE FLICKER
      AFRAME.registerComponent('flicker', {
        tick: function () {
          if (Math.random() > 0.8) {
            this.el.setAttribute('light', 'intensity', 1.5 + (Math.random() * 1.0));
          }
        }
      });
    </script>
  </head>

  <body>
    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">
     
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="music-track" src="chant.mp3" preload="auto"></audio>
        <audio id="click-asset" src="click.mp3" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: starry; lighting: none;"></a-entity>
      <a-entity light="type: ambient; intensity: 0.2; color: #fff"></a-entity>

      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.5;"></a-entity>
      <a-entity id="click-sound-el" sound="src: #click-asset; volume: 0.8; poolSize: 5;"></a-entity>
      
      <a-text id="sound-ui" value="CLICK TO START MUSIC" position="0 2.2 -2" align="center" color="#FFD700" width="3"></a-text>

      <a-entity id="manuscript-wrapper" position="0 1.1 -1.5" rotation="-20 0 0">

          <a-plane id="folio-object" class="clickable" drag-rotate src="#manuscript1"
                   position="0 0 0" rotation="0 0 0" width="1.2" height="0.85"
                   material="shader: standard; metalness: 0.1; roughness: 0.8;">
             
              <a-entity id="candle" light="type: point; color: #ffcc77; intensity: 2; distance: 5;" position="0 0.5 0.5" flicker></a-entity>

              <a-entity id="hover-tooltip" position="0 0.55 0.05" visible="false">
                  <a-plane width="0.8" height="0.15" color="black" opacity="0.8"></a-plane>
                  <a-text id="hover-text" value="Liber Chronicarum" color="white" align="center" width="0.8" position="0 0 0.01"></a-text>
              </a-entity>
          </a-plane>

          <a-entity id="info-panel" position="-1.2 0 0.1" rotation="0 20 0">
              <a-plane width="0.9" height="0.6" color="#111" opacity="0.9"></a-plane>
              <a-text id="info-text" value="Liber Chronicarum, 1493, Hartmann Schedel\n\nUse buttons to explore.\nClick & Drag folio to tilt." 
                      color="white" align="center" width="0.7" position="0 0 0.02"></a-text>
          </a-entity>

          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -20 0">
              <a-sphere id="zoom-button" class="clickable" position="0 0.3 0" radius="0.04" color="#FFD700">
                <a-text value="ZOOM/RESET" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
              </a-sphere>
              <a-sphere id="mat-button" class="clickable" position="0 0.15 0" radius="0.04" color="#C0C0C0">
                <a-text value="MATERIAL" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
              </a-sphere>
              <a-sphere id="swap-button" class="clickable" position="0 0 0" radius="0.04" color="#cd7f32">
                <a-text value="SWAP PAGE" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
              </a-sphere>
              <a-sphere id="scale-button" class="clickable" position="0 -0.15 0" radius="0.04" color="#4CC3D9">
                <a-text value="SCALE" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
              </a-sphere>
              <a-box id="mute-button" class="clickable" position="0 -0.3 0" width="0.07" height="0.07" depth="0.07" color="#FF4500">
                <a-text value="MUTE" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
              </a-box>
          </a-entity>

      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor id="cursor" position="0 0 -0.7" raycaster="objects: .clickable" color="#FFD700" 
                  fuse="true" fuse-timeout="1500"
                  animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                  animation__mouseleave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 100">
        </a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
