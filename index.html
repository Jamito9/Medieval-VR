<!DOCTYPE html><html>
<head>
  <meta charset="utf-8">
  <title>Medieval Scriptorium (VR Advanced - Page Turn)</title> <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script> <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script> <script src="https://unpkg.com/super-hands@4.0.2/dist/super-hands.min.js"></script> <script>

  const MANUSCRIPTS = [
    {
      title: "Liber Chronicarum, 1493, Hartmann Schedel",
      img: "#manuscript1",
      lat: "De Scocia...",
      eng: "Concerning Scotland..."
    },
    {
      title: "Liber Pluscardensis, before 1500",
      img: "#manuscript2",
      lat: "Quorum cateruis...",
      eng: "Surrounded so gloriously..."
    }
  ];

  // -----------------------------
  // VR MODE DETECTION
  // -----------------------------
  AFRAME.registerComponent('vr-mode-toggle', {
    init: function () {
      this.el.sceneEl.addEventListener('enter-vr', () => this.el.sceneEl.addState('vr-mode'));
      this.el.sceneEl.addEventListener('exit-vr', () => this.el.sceneEl.removeState('vr-mode'));
    }
  });

  // -----------------------------
  // DRAG ROTATE (DISABLED IN VR)
  // -----------------------------
  AFRAME.registerComponent('drag-rotate', {
    schema: { maxRotation: { default: 30 } },
    init: function () {
      this.dragging = false;
      this.prev = { x: 0, y: 0 };

      this.onMouseDown = (e) => {
        if (this.el.sceneEl.is('vr-mode')) return;
        this.dragging = true;
        this.prev.x = e.clientX;
        this.prev.y = e.clientY;
      };

      this.onMouseUp = () => this.dragging = false;

      this.onMouseMove = (e) => {
        if (!this.dragging || this.el.sceneEl.is('vr-mode')) return;

        const dx = (e.clientX - this.prev.x) * 0.2;
        const dy = (e.clientY - this.prev.y) * 0.2;

        let rot = this.el.getAttribute('rotation');

        let nextX = rot.x + dy;
        let nextY = rot.y + dx;

        const max = this.data.maxRotation;
        nextX = Math.max(-max, Math.min(max, nextX));
        nextY = Math.max(-max, Math.min(max, nextY));

        this.el.setAttribute('rotation', { x: nextX, y: nextY, z: 0 });

        this.prev.x = e.clientX;
        this.prev.y = e.clientY;
      };

      this.el.addEventListener('mousedown', this.onMouseDown);
      window.addEventListener('mouseup', this.onMouseUp);
      window.addEventListener('mousemove', this.onMouseMove);
    }
  });

  // -----------------------------
  // CLAMP ROTATION (VR SAFE)
  // -----------------------------
  AFRAME.registerComponent('clamp-rotation', {
    schema: { max: { default: 30 } },
    tick: function () {
      const rot = this.el.getAttribute('rotation');
      const max = this.data.max;

      const x = Math.max(-max, Math.min(max, rot.x));
      const y = Math.max(-max, Math.min(max, rot.y));

      this.el.setAttribute('rotation', { x: x, y: y, z: 0 });
    }
  });

  // -----------------------------
  // PAGE CONTROLLER + ANIMATION
  // -----------------------------
  AFRAME.registerComponent('page-controller', {
    init: function () {
      this.index = 0;

      this.folio = this.el.querySelector('#folio-object');
      this.transcr = this.el.querySelector('#transcr-text');
      this.transl = this.el.querySelector('#transl-text');
      this.titleBox = this.el.querySelector('#info-text');

      this.update();

      document.querySelector('#swap-button').addEventListener('click', () => this.turnPage());

      // CORNER GESTURE
      const corner = this.el.querySelector('#page-corner');

      corner.addEventListener('grab-end', (e) => {
        this.turnPage();
      });
    },

    turnPage: function () {
      // simple believable page flip animation (hinge on left edge)
      this.folio.setAttribute('animation__turn', {
        property: 'rotation',
        from: '0 0 0',
        to: '0 -160 0',
        dur: 400,
        easing: 'easeInOutQuad'
      });

      setTimeout(() => {
        this.index = (this.index + 1) % MANUSCRIPTS.length;
        this.update();

        // reset rotation after flip
        this.folio.setAttribute('rotation', '0 0 0');
      }, 200);
    },

    update: function () {
      const m = MANUSCRIPTS[this.index];

      this.folio.setAttribute('src', m.img);
      this.transcr.setAttribute('value', m.lat);
      this.transl.setAttribute('value', m.eng);
      this.titleBox.setAttribute('value', m.title);
    }
  });

  // -----------------------------
  // ZOOM
  // -----------------------------
  AFRAME.registerComponent('zoom-controller', {
    init: function () {
      const anchor = this.el.querySelector('#zoom-anchor');
      const ui = this.el.querySelector('#ui-group');
      let zoomed = false;

      document.querySelector('#zoom-button').addEventListener('click', () => {
        zoomed = !zoomed;

        anchor.setAttribute('animation', {
          property: 'position',
          to: zoomed ? '0 1.5 -0.7' : '0 1.1 -1.4',
          dur: 800
        });

        ui.setAttribute('animation', {
          property: 'position',
          to: zoomed ? '0.6 0.3 0' : '0.9 1.1 -1.2',
          dur: 800
        });
      });
    }
  });

  </script></head><body>
  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-toggle
    page-controller
    zoom-controller><a-assets>
  <img id="manuscript1" src="folio.jpg">
  <img id="manuscript2" src="folio2.jpg">
</a-assets>

<a-entity environment="preset: starry"></a-entity>

<a-entity id="zoom-anchor" position="0 1.1 -1.4">

  <!-- FOLIO -->
  <a-plane id="folio-object"
           class="grabbable stretchable draggable clickable"
           drag-rotate
           clamp-rotation
           width="1.1" height="0.8">
  </a-plane>

  <!-- PAGE CORNER (TURN HOTSPOT) -->
  <a-plane id="page-corner"
           class="grabbable"
           position="0.5 -0.35 0.01"
           width="0.2" height="0.2"
           opacity="0">
  </a-plane>

  <!-- UI -->
  <a-entity id="ui-group" position="0.9 1.1 -1.2">
    <a-sphere id="zoom-button" radius="0.04"></a-sphere>
    <a-sphere id="swap-button" position="0 -0.15 0" radius="0.04"></a-sphere>
  </a-entity>

</a-entity>

<!-- INFO PANEL -->
<a-entity position="-1.0 1.1 -1.2">
  <a-plane width="0.6" height="0.3" color="#111"></a-plane>
  <a-text id="info-text"
          value="Liber Chronicarum, 1493, Hartmann Schedel"
          align="center"
          width="0.55"
          position="0 0 0.02"></a-text>
</a-entity>

<!-- TEXT -->
<a-entity position="-1.9 1.1 -0.5">
  <a-plane width="0.9" height="1.8" color="#111"></a-plane>
  <a-text id="transl-text" width="0.8" position="-0.4 0 0.02"></a-text>
</a-entity>

<a-entity position="-2.2 1.1 0.5">
  <a-plane width="0.9" height="1.8" color="#111"></a-plane>
  <a-text id="transcr-text" width="0.8" position="-0.4 0 0.02"></a-text>
</a-entity>

<!-- HANDS -->
<a-entity hand-controls="left" super-hands></a-entity>
<a-entity hand-controls="right" super-hands></a-entity>

<!-- CAMERA -->
<a-entity camera look-controls position="0 1.6 0">
  <a-cursor raycaster="objects: .clickable" fuse="true"></a-cursor>
</a-entity>

  </a-scene>
</body>
</html>
