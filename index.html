<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Medieval - DH Project</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>

    <script>
      AFRAME.registerComponent('drag-rotate', {
        init: function () {
          this.ifMouseDown = false;
          this.x_cord = 0;
          this.y_cord = 0;
          this.el.addEventListener('mousedown', (e) => {
            this.ifMouseDown = true;
            this.x_cord = e.detail.cursorEl ? 0 : e.clientX;
            this.y_cord = e.detail.cursorEl ? 0 : e.clientY;
          });
          window.addEventListener('mouseup', () => { this.ifMouseDown = false; });
          window.addEventListener('mousemove', (e) => {
            if (this.ifMouseDown) {
              var rotation = this.el.getAttribute('rotation');
              this.el.setAttribute('rotation', {
                x: Math.max(-60, Math.min(10, rotation.x + (e.clientY - this.y_cord) * 0.1)),
                y: Math.max(-30, Math.min(30, rotation.y + (e.clientX - this.x_cord) * 0.1)),
                z: rotation.z
              });
              this.x_cord = e.clientX;
              this.y_cord = e.clientY;
            }
          });
        }
      });

      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          const wrapper = document.querySelector('#manuscript-wrapper');
          const folio = document.querySelector('#folio-object');
          const ambientSound = document.querySelector('#ambient-sound');
          const clickSound = document.querySelector('#click-sound-el');
          const btnGroup = document.querySelector('#button-group');
          
          const infoPanel = document.querySelector('#info-panel');
          const transcrPanel = document.querySelector('#transcription-panel');
          const translPanel = document.querySelector('#translation-panel');
          
          const infoText = document.querySelector('#info-text');
          const transcrText = document.querySelector('#transcr-text');
          const translText = document.querySelector('#transl-text');
         
          let zoomed = false;
          let materialityMode = false;
          let currentPage = 1;
          let scaleState = 0;
          let isMuted = false;

          // Scroll Tracking
          let transcrY = 0;
          let translY = 0;
          const scrollStep = 0.15;
          const scrollMax = 1.5; // Limits how far they can scroll up

          const playClick = () => { if (clickSound.components.sound) clickSound.components.sound.playSound(); };

          // TEXT CONTENT
          const lat1 = "De Scocia\n\nScocia est insule in quo est anglia suprema portio et in aquilone versa. Flumibus haud magnis et monte quodam ab anglia discreta. Hic nos brunali tempore fuimus cum sol paulo amplius quam tris horis terram illusiaret. Jacobus eo tempore regnabat quadratus et multo abdomine grauis. qui cum olim in anglia captus . xi . annis in custodia fuisset. ac dimissus tandem suscepta ex anglica coniuge domum reuersus plures regulos gladio percussisset. et ipse tandem a suis domesticis interfectus est. Inter quos vltione pacata filius eius regnum suscepit. Audiueramus nos olim arborem esse in scocia quae supra ripas fluminis enata fructus produceret anetarum formam habentes et eos cum quidem maturitati proximi essent sponte sua decider. alios in terra. alios in aquam. et in terra deiectos putrescere. in aquam vero dimersos mox aviatos enatare sub aquis et in aera plumis plenisque euestigio euolare. De quare cum aidius inuestigaremus didicimus miracula spe remotius fugere famosamque arborem non in scocia sed apud olchades insulas inueniri. Illud tamen nobis in scocia miraculum praesentatum est. nam pauperes pene nudos ad ecclesias mendicantes acceptis lapidibus elemosine gratia datis letos abiisse conspeximus. Id genus lapidis siue sulphurea siue alia pingues materia praeditum pro ligno quo regio nuda est comburitur.";
          const eng1 = "Concerning Scotland\n\nScotland is of the island in which England is the upper part, and it lies toward the north. It is separated from England by rivers not large and by a certain mountain. We were here in the winter season, when the sun shone upon the earth for a little more than three hours. [King] James [IV] reigned at that time, square-built and burdened with a very large belly. He, having once been captured in England and kept in custody for eleven years, and at last released, after taking an English wife, returned home and struck down several petty rulers with the sword. And he himself was at last killed by his own household, among whom, vengeance having been settled, his son took up the kingdom. We had once heard that there was in Scotland a tree which, growing above the banks of a river, produced fruits having the form of ducks, and these indeed, when they were near maturity, fell of their own accord, some onto the land, others into the water. And those cast onto the land rot; but those plunged into the water, however, soon become birds, swim beneath the waters, and fly into the air with feathers and full plumage. About the matter, therefore, when we investigated more eagerly, we learned that marvels flee closer scrutiny, and that the famous tree is found not in Scotland but among the Orkney Islands. Yet this marvel was shown to us in Scotland: for we saw poor people, almost naked, begging at the churches, who went away rejoicing after receiving stones given as alms. This kind of stone, endowed with a sulphurous or other rich material, is burned in place of wood, of which the region is bare.";

          const lat2 = "Quorum cateruis sic gloriose circumuallatus et in gloria humane potencie sic confisus usque ad locum qui bannokburn dicitur perueniens tentoria sua fixit Cui rex robertus cum paucis respectu multitudinis eius in domino confidens et in deum virtutem faciens ac beatum andream apostolum et sanctum iohannem baptistam in eius auxilium ad miserabilem populum scocie de seruitute indebita liberandum postulans cum dicto rege anglie mortale commisit bellum ac ipsum cum omni pompa sua et innumerabili potencia auxiliante altissimo cuius est victoriam dare, et in cuius manu sunt omnes fines terre in fugam conuertit ubi comes glouernie et multi nobiles anglie ceciderunt interfecti… alii fugati . alii capti . alii occisi… . per captiuos enim non solum regina scocie cum suis liberati sunt dimissa est ymmo eciam omnes alii scoti in carceribus deputati sine redempcione liberati sunt . Ac eciam omnes alii in dicto bello existentes inestimabiliter sunt ditati Inter quos captus est ille ditissimus iohannes de britania per quem liberata fuit regina scocie captiua quod absurdum esset audire reginam captiuam esse Item pro ipso liberatus est episcopus de glasguw vir venerabilis et magne senectutis in carceribus similiter per tirannum detentus londoniis [.]";
          const eng2 = "Surrounded so gloriously by his companies, and trusting so confidently in the glory of human power, he [King Edward II of England] came as far as the place called Bannockburn and pitched his tents there. Against him King Robert, with only a few men, compared with his multitude, trusting in the Lord and taking strength in God, and calling upon Blessed Andrew the Apostle and Saint John the Baptist for aid in freeing the wretched people of Scotland from unjust servitude, joined mortal battle with the said king of England. And him, with all his pomp and his innumerable power, the Most High assisting – whose prerogative it is to grant victory, and in whose hand are all the ends of the earth – he turned to flight. There the Earl of Gloucester and many nobles of England fell slain…. Others were put to flight; others were captured; others were killed… For by means of the captives not only was the queen of Scotland, with her people, set free; indeed (what is more), all the other Scots who had been assigned to prisons were freed without ransom. And also all the others who were present in the said battle were enriched beyond measure. Among these was captured that very rich man, John of Brittany, through whom the queen of Scotland was freed from captivity, something which it would be absurd even to hear, namely that a queen should be held captive. Likewise, in exchange for him, the bishop of Glasgow, a venerable man of great age, who had similarly been held in prison by the tyrant, was freed at London [.]";

          // SWAP PAGE FUNCTION
          document.querySelector('#swap-button').addEventListener('click', () => {
            playClick();
            currentPage = (currentPage === 1) ? 2 : 1;
            
            // Reset Scrolls
            transcrY = 0; translY = 0;
            transcrText.setAttribute('position', {x: -0.45, y: -0.05, z: 0.02});
            translText.setAttribute('position', {x: -0.45, y: -0.05, z: 0.02});

            folio.setAttribute('src', (currentPage === 1) ? '#manuscript1' : '#manuscript2');
            infoText.setAttribute('value', (currentPage === 1) ? "Liber Chronicarum, 1493, Hartmann Schedel\n\nUse buttons to explore." : "Liber Pluscardensis, before 1500\n\nUse buttons to explore.");
            transcrText.setAttribute('value', (currentPage === 1) ? lat1 : lat2);
            translText.setAttribute('value', (currentPage === 1) ? eng1 : eng2);
          });

          // SCROLL LISTENERS
          document.querySelector('#btn-transcr-up').addEventListener('click', () => { playClick(); transcrY = Math.max(0, transcrY - scrollStep); transcrText.setAttribute('position', 'y', -0.05 + transcrY); });
          document.querySelector('#btn-transcr-down').addEventListener('click', () => { playClick(); transcrY = Math.min(scrollMax, transcrY + scrollStep); transcrText.setAttribute('position', 'y', -0.05 + transcrY); });
          
          document.querySelector('#btn-transl-up').addEventListener('click', () => { playClick(); translY = Math.max(0, translY - scrollStep); translText.setAttribute('position', 'y', -0.05 + translY); });
          document.querySelector('#btn-transl-down').addEventListener('click', () => { playClick(); translY = Math.min(scrollMax, translY + scrollStep); translText.setAttribute('position', 'y', -0.05 + translY); });

          // SCALE LOGIC
          document.querySelector('#scale-button').addEventListener('click', () => {
            playClick();
            scaleState = (scaleState + 1) % 3;
            const scales = ['1 1 1', '1.6 1.6 1.6', '0.6 0.6 0.6'];
            const btnX = ['0.9', '1.35', '0.7'];
            const infoX = ['-1.2', '-1.6', '-1.0'];
            const translX = ['-2.2', '-2.7', '-1.9'];
            const transcrX = ['-3.2', '-3.8', '-2.8'];

            folio.setAttribute('animation__scale', {property: 'scale', to: scales[scaleState], dur: 500});
            btnGroup.setAttribute('animation__p', {property: 'position', x: btnX[scaleState], dur: 500});
            infoPanel.setAttribute('animation__p', {property: 'position', x: infoX[scaleState], dur: 500});
            translPanel.setAttribute('animation__p', {property: 'position', x: translX[scaleState], dur: 500});
            transcrPanel.setAttribute('animation__p', {property: 'position', x: transcrX[scaleState], dur: 500});
          });

          // REUSABLE UI STUFF
          document.querySelector('#zoom-button').addEventListener('click', () => { playClick(); zoomed = !zoomed; wrapper.setAttribute('animation', {property: 'position', to: zoomed ? '0 1.5 -0.9' : '0 1.1 -1.5', dur: 800}); });
          document.querySelector('#mute-button').addEventListener('click', () => { playClick(); isMuted = !isMuted; if (isMuted) { ambientSound.components.sound.pauseSound(); } else { ambientSound.components.sound.playSound(); } });
          window.addEventListener('click', () => { if (ambientSound.components.sound) ambientSound.components.sound.playSound(); document.querySelector('#sound-ui').setAttribute('visible', 'false'); }, { once: true });
        }
      });
    </script>
  </head>

  <body>
    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="music-track" src="chant.mp3" preload="auto"></audio>
        <audio id="click-asset" src="click.mp3" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: starry; lighting: none;"></a-entity>
      <a-entity light="type: ambient; intensity: 0.3;"></a-entity>
      <a-entity id="ambient-sound" sound="src: #music-track; loop: true; volume: 0.4;"></a-entity>
      <a-entity id="click-sound-el" sound="src: #click-asset; volume: 0.8; poolSize: 5;"></a-entity>
      <a-text id="sound-ui" value="CLICK TO START" position="0 2.2 -2" align="center" color="#FFD700" width="3"></a-text>

      <a-entity id="manuscript-wrapper" position="0 1.1 -1.5" rotation="-20 0 0">
          
          <a-plane id="folio-object" class="clickable" drag-rotate src="#manuscript1" width="1.2" height="0.85"></a-plane>

          <a-entity id="info-panel" position="-1.2 0 0.1" rotation="0 20 0">
              <a-plane width="0.9" height="0.8" color="#111" opacity="0.9"></a-plane>
              <a-text id="info-text" value="Liber Chronicarum, 1493, Hartmann Schedel\n\nUse buttons to explore." color="#FFD700" align="center" width="0.8" position="0 0.2 0.02"></a-text>
          </a-entity>

          <a-entity id="translation-panel" position="-2.2 0 0.3" rotation="0 35 0">
              <a-plane width="1" height="0.8" color="#111" opacity="0.9"></a-plane>
              <a-text value="ENGLISH" color="#FFD700" align="center" width="0.8" position="0 0.35 0.02"></a-text>
              
              <a-text id="transl-text" value="Concerning Scotland..." color="white" align="left" width="0.85" position="-0.45 -0.05 0.02" wrap-count="38"></a-text>
              
              <a-triangle id="btn-transl-up" class="clickable" color="#FFD700" scale="0.1 0.1 0.1" position="0.42 0.15 0.03" rotation="0 0 0"></a-triangle>
              <a-triangle id="btn-transl-down" class="clickable" color="#FFD700" scale="0.1 0.1 0.1" position="0.42 -0.15 0.03" rotation="0 0 180"></a-triangle>
          </a-entity>

          <a-entity id="transcription-panel" position="-3.2 0 0.8" rotation="0 50 0">
              <a-plane width="1" height="0.8" color="#111" opacity="0.9"></a-plane>
              <a-text value="LATIN" color="#FFD700" align="center" width="0.8" position="0 0.35 0.02"></a-text>
              
              <a-text id="transcr-text" value="De Scocia..." color="white" align="left" width="0.85" position="-0.45 -0.05 0.02" wrap-count="38"></a-text>
              
              <a-triangle id="btn-transcr-up" class="clickable" color="#FFD700" scale="0.1 0.1 0.1" position="0.42 0.15 0.03" rotation="0 0 0"></a-triangle>
              <a-triangle id="btn-transcr-down" class="clickable" color="#FFD700" scale="0.1 0.1 0.1" position="0.42 -0.15 0.03" rotation="0 0 180"></a-triangle>
          </a-entity>

          <a-entity id="button-group" position="0.9 0 0.1" rotation="0 -20 0">
              <a-sphere id="zoom-button" class="clickable" position="0 0.3 0" radius="0.04" color="#FFD700"><a-text value="ZOOM" position="0.07 0 0" scale="0.2 0.2 0.2"></a-text></a-sphere>
              <a-sphere id="mat-button" class="clickable" position="0 0.15 0" radius="0.04" color="#C0C0C0"><a-text value="MATERIAL" position="0.07 0 0" scale="0.2 0.2 0.2"></a-text></a-sphere>
              <a-sphere id="swap-button" class="clickable" position="0 0 0" radius="0.04" color="#cd7f32"><a-text value="SWAP PAGE" position="0.07 0 0" scale="0.2 0.2 0.2"></a-text></a-sphere>
              <a-sphere id="scale-button" class="clickable" position="0 -0.15 0" radius="0.04" color="#4CC3D9"><a-text value="SCALE" position="0.07 0 0" scale="0.2 0.2 0.2"></a-text></a-sphere>
              <a-box id="mute-button" class="clickable" position="0 -0.3 0" width="0.06" height="0.06" depth="0.06" color="#FF4500"><a-text value="MUTE" position="0.07 0 0" scale="0.2 0.2 0.2"></a-text></a-box>
          </a-entity>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor position="0 0 -0.7" raycaster="objects: .clickable" color="#FFD700" fuse="true" fuse-timeout="1500"></a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
