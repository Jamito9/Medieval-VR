<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Arthurian Manuscript VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      // Logic for the Zoom Button
      AFRAME.registerComponent('zoom-logic', {
        init: function () {
          var el = this.el;
          var folio = document.querySelector('#folio-object');
          var zoomed = false;

          el.addEventListener('click', function () {
            if (!zoomed) {
              // Zoom In
              folio.setAttribute('animation', {
                property: 'position', to: '0 1.4 -0.8', dur: 1200, easing: 'easeInOutQuad'
              });
              folio.setAttribute('animation__rot', {
                property: 'rotation', to: '0 0 0', dur: 1200, easing: 'easeInOutQuad'
              });
              el.setAttribute('color', '#FF4500'); // Turn button red to "Reset"
              zoomed = true;
            } else {
              // Zoom Out (Back to desk)
              folio.setAttribute('animation', {
                property: 'position', to: '0 0.95 -1.5', dur: 1200, easing: 'easeInOutQuad'
              });
              folio.setAttribute('animation__rot', {
                property: 'rotation', to: '-20 0 0', dur: 1200, easing: 'easeInOutQuad'
              });
              el.setAttribute('color', '#FFD700'); // Turn button gold
              zoomed = false;
            }
          });
        }
      });
    </script>
  </head>

  <body>
    <a-scene renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <img id="manuscript" src="folio.jpg">
      </a-assets>

      <a-entity environment="preset: library; lighting: point; groundColor: #1a1a1a; grid: none"></a-entity>
      <a-box position="0 0.8 -1.5" width="1.8" height="0.1" depth="1.2" color="#3d2b1f"></a-box>

      <a-plane id="folio-object" src="#manuscript" position="0 0.95 -1.5" rotation="-20 0 0" 
               width="1.2" height="0.8" material="shader: standard; metalness: 0.4; roughness: 0.3;">
      </a-plane>

      <a-sphere id="zoom-button" class="clickable" zoom-logic
                position="0.8 1.1 -1.2" radius="0.1" color="#FFD700"
                animation="property: position; dir: alternate; dur: 2000; loop: true; to: 0.8 1.15 -1.2">
        <a-text value="ZOOM" align="center" position="0 0.15 0" scale="0.5 0.5 0.5"></a-text>
      </a-sphere>

      <a-light type="spot" color="#fff9e0" intensity="2" position="0 3 -0.5" target="#folio-object"></a-light>
      
      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor id="cursor" raycaster="objects: .clickable" color="white"
                  animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500">
        </a-cursor>
      </a-entity>
    </a-scene>
  </body>
</html>
