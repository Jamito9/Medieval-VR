<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Arthurian DH - Controlled Inspection</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      // 1. CLAMPED ROTATION COMPONENT
      AFRAME.registerComponent('drag-rotate', {
        schema: { 
          speed: { default: 1.5 },
          minX: { default: -50 }, // Allow some tilt up/down
          maxX: { default: 10 },
          minY: { default: -30 }, // Restrict side-to-side
          maxY: { default: 30 }
        },
        init: function () {
          this.ifMouseDown = false;
          this.x_cord = 0;
          this.y_cord = 0;

          this.el.addEventListener('mousedown', e => {
            this.ifMouseDown = true;
            this.x_cord = e.clientX;
            this.y_cord = e.clientY;
          });

          window.addEventListener('mouseup', () => { this.ifMouseDown = false; });

          window.addEventListener('mousemove', e => {
            if (this.ifMouseDown) {
              var temp_x = e.clientX - this.x_cord;
              var temp_y = e.clientY - this.y_cord;
              var rotation = this.el.getAttribute('rotation');
              
              // Apply rotation
              var newY = rotation.y + (temp_x * this.data.speed * 0.1);
              var newX = rotation.x + (temp_y * this.data.speed * 0.1);
              
              // CLAMPING: Keeps the folio from flipping over
              rotation.y = Math.max(this.data.minY, Math.min(this.data.maxY, newY));
              rotation.x = Math.max(this.data.minX, Math.min(this.data.maxX, newX));
              
              this.el.setAttribute('rotation', rotation);
              this.x_cord = e.clientX;
              this.y_cord = e.clientY;
            }
          });
        }
      });

      // 2. MAIN LOGIC
      AFRAME.registerComponent('scriptorium-logic', {
        init: function () {
          var folio = document.querySelector('#folio-object');
          var info = document.querySelector('#info-panel');
          var btns = document.querySelector('#button-group');
          var folioText = document.querySelector('#folio-text');
          var soundEl = document.querySelector('#ambient-sound');
          var hoverTooltip = document.querySelector('#hover-tooltip');
          var hoverText = document.querySelector('#hover-text');
          var soundUI = document.querySelector('#sound-ui');
          
          var zoomed = false;
          var materialityMode = false;
          var currentPage = 1;
          var scaleState = 0; 

          // Audio Unlock Logic
          var unlock = function() {
            if (soundEl.components.sound) {
              soundEl.components.sound.playSound();
              soundUI.setAttribute('visible', 'false');
            }
            window.removeEventListener('click', unlock);
          };
          window.addEventListener('click', unlock);

          // Hover Tooltips
          folio.addEventListener('mouseenter', function () { hoverTooltip.setAttribute('visible', 'true'); });
          folio.addEventListener('mouseleave', function () { hoverTooltip.setAttribute('visible', 'false'); });

          // BUTTON 1: ZOOM / RESET (GOLD)
          document.querySelector('#zoom-button').addEventListener('click', function () {
            if (!zoomed) {
              folio.setAttribute('animation', {property: 'position', to: '0 1.5 -0.8', dur: 1000, easing: 'easeInOutQuad'});
              folio.setAttribute('animation__rot', {property: 'rotation', to: '0 0 0', dur: 1000, easing: 'easeInOutQuad'});
              btns.setAttribute('animation', {property: 'position', to: '1.2 0.2 -0.6', dur: 1000, easing: 'easeInOutQuad'});
              info.setAttribute('visible', 'true');
              this.setAttribute('color', '#AA0000'); 
              zoomed = true;
            } else {
              folio.setAttribute('animation', {property: 'position', to: '0 1.1 -1.5', dur: 1000, easing: 'easeInOutQuad'});
              folio.setAttribute('animation__rot', {property: 'rotation', to: '-20 0 0', dur: 1000, easing: 'easeInOutQuad'});
              btns.setAttribute('animation', {property: 'position', to: '0.9 0 -1.2', dur: 1000, easing: 'easeInOutQuad'});
              info.setAttribute('visible', 'false');
              this.setAttribute('color', '#FFD700'); 
              zoomed = false;
            }
          });

          // BUTTON 2: MATERIAL (SILVER)
          document.querySelector('#mat-button').addEventListener('click', function () {
            materialityMode = !materialityMode;
            folio.setAttribute('material', materialityMode ? 
              {color: '#888', metalness: 0.9, roughness: 0.1} : 
              {color: '#FFF', metalness: 0.1, roughness: 0.8});
            this.setAttribute('color', materialityMode ? '#333' : '#C0C0C0');
          });

          // BUTTON 3: SWAP (BRONZE)
          document.querySelector('#swap-button').addEventListener('click', function () {
            currentPage = (currentPage === 1) ? 2 : 1;
            var title = (currentPage === 1) ? 'Liber Chronicarum' : 'Liber Pluscardensis';
            folio.setAttribute('src', (currentPage === 1) ? '#manuscript1' : '#manuscript2');
            folioText.setAttribute('value', title + '\n\n- GOLD: Zoom View\n- SILVER: Surface Analysis\n- BRONZE: Toggle Page\n- BLUE: Change Scale');
            hoverText.setAttribute('value', title);
          });

          // BUTTON 4: SCALE (BLUE)
          document.querySelector('#scale-button').addEventListener('click', function () {
            scaleState = (scaleState + 1) % 3;
            var scales = ['1 1 1', '1.8 1.8 1.8', '0.6 0.6 0.6'];
            folio.setAttribute('scale', scales[scaleState]);
          });
        }
      });

      AFRAME.registerComponent('flicker', {
        tick: function () {
          if (Math.random() > 0.8) {
            this.el.setAttribute('light', 'intensity', 1.5 + (Math.random() * 1.2));
          }
        }
      });
    </script>
  </head>

  <body>
    <a-scene scriptorium-logic renderer="antialias: true; colorManagement: true;">
      
      <a-assets>
        <img id="manuscript1" src="folio.jpg">
        <img id="manuscript2" src="folio2.jpg">
        <audio id="chant" src="https://cdn.pixabay.com/audio/2022/03/10/audio_c33b76a666.mp3" preload="auto"></audio>
      </a-assets>

      <a-entity environment="preset: starry; lighting: none; groundColor: #050505;"></a-entity>
      <a-entity light="type: ambient; intensity: 0.15; color: #333"></a-entity>
      <a-entity id="ambient-sound" sound="src: #chant; loop: true; volume: 0.5; autoplay: false;"></a-entity>
      <a-text id="sound-ui" value="CLICK TO ENABLE SOUND" position="0 2.2 -2" align="center" color="#FFD700" width="3"></a-text>

      <a-plane id="folio-object" class="clickable" drag-rotate src="#manuscript1" 
               position="0 1.1 -1.5" rotation="-20 0 0" width="1.2" height="0.85"
               material="shader: standard; metalness: 0.1; roughness: 0.8;">
          
          <a-entity id="candle" light="type: point; color: #ffcc77; intensity: 2; distance: 5;" 
                    position="0 0.5 0.5" flicker></a-entity>

          <a-entity id="hover-tooltip" position="0 0.55 0.05" visible="false">
              <a-plane width="0.8" height="0.15" color="#000" opacity="0.85"></a-plane>
              <a-text id="hover-text" value="Liber Chronicarum" color="white" align="center" width="0.8" position="0 0 0.01"></a-text>
          </a-entity>
      </a-plane>

      <a-entity id="info-panel" position="-1.2 1.3 -0.7" visible="false">
          <a-plane width="0.9" height="0.6" color="#111" opacity="0.95"></a-plane>
          <a-text id="folio-text" value="Liber Chronicarum\n\n- GOLD: Zoom View\n- SILVER: Surface Analysis\n- BRONZE: Toggle Page\n- BLUE: Change Scale" color="white" align="center" width="0.7" position="0 0 0.02"></a-text>
      </a-entity>

      <a-entity id="button-group" position="0.9 0 -1.2">
          <a-sphere id="zoom-button" class="clickable" position="0 1.15 0" radius="0.04" color="#FFD700">
            <a-text value="ZOOM / RESET" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-sphere>
          <a-sphere id="mat-button" class="clickable" position="0 1.05 0" radius="0.04" color="#C0C0C0">
            <a-text value="MATERIAL" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-sphere>
          <a-sphere id="swap-button" class="clickable" position="0 0.95 0" radius="0.04" color="#cd7f32">
            <a-text value="SWAP PAGE" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-sphere>
          <a-sphere id="scale-button" class="clickable" position="0 0.85 0" radius="0.04" color="#4CC3D9">
            <a-text value="SCALE" align="left" position="0.07 0 0" scale="0.25 0.25 0.25" color="white"></a-text>
          </a-sphere>
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0">
        <a-cursor id="cursor" raycaster="objects: .clickable" color="#FFD700" fuse="true" fuse-timeout="1500"
                  animation__fusing="property: scale; startEvents: fusing; from: 1 1 1; to: 0.1 0.1 0.1; dur: 1500"
                  animation__mouseleave="property: scale; startEvents: mouseleave; to: 1 1 1; dur: 100">
        </a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
